name: Backup de anexos (Storage)

# Faz backup semanal dos arquivos do Storage do Supabase (buckets "anexos" e "logos")
# para o repositório PRIVADO de backups. Complementa o backup do banco de dados.
#
# PRÉ-REQUISITOS (mesmos do backup do banco, mais a service role key):
#  - Secret  SUPABASE_URL              -> ex.: https://ulkvxnulvbyifeihznem.supabase.co
#  - Secret  SUPABASE_SERVICE_ROLE_KEY -> a chave service_role (Settings > API)
#  - Secret  BACKUP_REPO_TOKEN         -> token com acesso ao repo privado de backups
#  - Variable BACKUP_REPO              -> ex.: seu-usuario/registro-backups
#  - Variable BACKUP_ENABLED           -> true
#
# IMPORTANTE: a service_role key é sensível. Só use em repositório PRIVADO,
# e somente como Secret (nunca no código do app).

on:
  schedule:
    - cron: '0 4 * * 0'   # todo domingo às 04:00 UTC
  workflow_dispatch: {}    # permite rodar manualmente

jobs:
  backup-storage:
    if: ${{ vars.BACKUP_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Instalar Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz -o sb.tar.gz
          tar -xzf sb.tar.gz
          sudo mv supabase /usr/local/bin/ || mv supabase ./supabase

      - name: Baixar arquivos dos buckets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -e
          STAMP=$(date +%Y-%m-%d)
          mkdir -p "backup-$STAMP"
          # Script Python que lista e baixa todos os objetos dos buckets via API REST do Storage
          python3 - <<'PY'
          import os, json, urllib.request, pathlib
          base = os.environ["SUPABASE_URL"].rstrip("/")
          key  = os.environ["SERVICE_KEY"]
          stamp = __import__("datetime").date.today().isoformat()
          out = pathlib.Path(f"backup-{stamp}")
          def api(path, body=None):
              url = f"{base}/storage/v1{path}"
              data = json.dumps(body).encode() if body is not None else None
              req = urllib.request.Request(url, data=data, method="POST" if body is not None else "GET",
                  headers={"Authorization": f"Bearer {key}", "apikey": key, "Content-Type":"application/json"})
              return urllib.request.urlopen(req)
          def listar(bucket, prefix=""):
              r = api(f"/object/list/{bucket}", {"prefix": prefix, "limit": 1000, "offset": 0})
              return json.loads(r.read())
          def baixar(bucket, name, destino):
              url = f"{base}/storage/v1/object/{bucket}/{name}"
              req = urllib.request.Request(url, headers={"Authorization": f"Bearer {key}", "apikey": key})
              destino.parent.mkdir(parents=True, exist_ok=True)
              with urllib.request.urlopen(req) as resp, open(destino, "wb") as fh:
                  fh.write(resp.read())
          def varrer(bucket, prefix=""):
              for item in listar(bucket, prefix):
                  nome = item.get("name")
                  if not nome: continue
                  caminho = f"{prefix}{nome}"
                  if item.get("id") is None:  # pasta -> desce um nível
                      varrer(bucket, caminho + "/")
                  else:
                      try:
                          baixar(bucket, caminho, out / bucket / caminho)
                          print("ok:", bucket, caminho)
                      except Exception as e:
                          print("falha:", bucket, caminho, e)
          for b in ["anexos", "logos"]:
              try: varrer(b)
              except Exception as e: print("bucket erro:", b, e)
          print("Concluído em", out)
          PY

      - name: Enviar para o repositório de backups
        env:
          TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
          REPO: ${{ vars.BACKUP_REPO }}
        run: |
          set -e
          STAMP=$(date +%Y-%m-%d)
          git clone --depth 1 "https://x-access-token:${TOKEN}@github.com/${REPO}.git" repo
          mkdir -p "repo/storage"
          # mantém só os 8 backups de storage mais recentes
          ls -1dt repo/storage/backup-* 2>/dev/null | tail -n +8 | xargs rm -rf || true
          cp -r "backup-$STAMP" "repo/storage/backup-$STAMP"
          cd repo
          git config user.name "backup-bot"
          git config user.email "backup@local"
          git add -A
          git commit -m "Backup de anexos $STAMP" || echo "nada a commitar"
          git push
