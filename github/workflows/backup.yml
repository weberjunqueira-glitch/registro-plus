name: Backup do banco Supabase

# Quando rodar:
#  - todo dia às 03:00 UTC (00:00 no horário de Brasília)
#  - e também manualmente pelo botão "Run workflow"
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    # Só roda se a variável BACKUP_ENABLED estiver "true"
    if: ${{ vars.BACKUP_ENABLED == 'true' }}
    steps:
      - name: Baixar o repositório PRIVADO de backups
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.BACKUP_REPO }}     # ex.: weberjunqueira-glitch/registro-backups
          token: ${{ secrets.BACKUP_REPO_TOKEN }} # token com acesso ao repo privado

      - name: Instalar a CLI da Supabase
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Gerar backup (papéis, estrutura e dados)
        run: |
          mkdir -p backups
          DATA=$(date +%Y-%m-%d)
          supabase db dump --db-url "$SUPABASE_DB_URL" -f "backups/roles_${DATA}.sql" --role-only
          supabase db dump --db-url "$SUPABASE_DB_URL" -f "backups/schema_${DATA}.sql"
          supabase db dump --db-url "$SUPABASE_DB_URL" -f "backups/data_${DATA}.sql" --data-only
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

      - name: Manter só os 14 backups mais recentes de cada tipo
        run: |
          cd backups || exit 0
          for tipo in roles schema data; do
            ls -1t ${tipo}_*.sql 2>/dev/null | tail -n +15 | xargs -r rm -f
          done

      - name: Salvar o backup no repositório privado
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Backup automático do Supabase'
          file_pattern: 'backups/*.sql'
