function MembersPanel({orgId,myId,isAdmin}){
  const [members,setMembers]=useState([]);const[loading,setLoading]=useState(true);const[busy,setBusy]=useState(false);const[q,setQ]=useState('');
  const [showForm,setShowForm]=useState(false);
  const [nf,setNf]=useState({full_name:'',email:'',password:'',role:'member'});
  const setF=(k,v)=>setNf(p=>({...p,[k]:v}));
  const load=useCallback(async()=>{try{setMembers(await D.fetchMembers(orgId));}finally{setLoading(false);}},[orgId]);
  useEffect(()=>{load();},[load]);
  const changeRole=async(id,role)=>{setBusy(true);try{await D.setMemberRole(id,role);await load();}catch(e){alert(e.message);}finally{setBusy(false);}};
  const createUser=async()=>{if(!nf.full_name||!nf.email||!nf.password){alert('Preencha nome, e-mail e senha.');return;}
    setBusy(true);try{const _nome=nf.full_name,_papel=nf.role;await D.callManageUser({action:'create_user',email:nf.email,password:nf.password,full_name:nf.full_name,role:nf.role});
      await D.audit('usuario.criar','usuario',null,'Criou o usuário '+_nome+' ('+(_papel==='admin'?'Administrador':'Usuário')+')');
      setNf({full_name:'',email:'',password:'',role:'member'});setShowForm(false);await load();alert('Usuário criado com sucesso!');}
    catch(e){alert('Erro: '+e.message);}finally{setBusy(false);}};
  const removeUser=async(uid,nome)=>{if(!confirm('Remover o usuário '+nome+'? Esta ação não pode ser desfeita.'))return;
    setBusy(true);try{await D.callManageUser({action:'delete_user',target_user_id:uid});await D.audit('usuario.excluir','usuario',uid,'Removeu o usuário '+nome);await load();}
    catch(e){alert('Erro: '+e.message);}finally{setBusy(false);}};
  const resetPass=async(uid,nome)=>{const np=prompt('Nova senha para '+nome+' (mínimo 6 caracteres):');if(!np)return;if(np.length<6){alert('Senha muito curta.');return;}
    setBusy(true);try{await D.callManageUser({action:'reset_password',target_user_id:uid,new_password:np});await D.audit('usuario.senha','usuario',uid,'Redefiniu a senha de '+nome);alert('Senha redefinida com sucesso.');}
    catch(e){alert('Erro: '+e.message);}finally{setBusy(false);}};
  if(loading)return <div className="spinner"/>;
  return <>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4,flexWrap:'wrap',gap:8}}>
      <div style={{fontWeight:800,fontSize:17,color:'#1E293B'}}>Usuários da empresa</div>
      {isAdmin&&<button className="btn btn-primary" style={{fontSize:13}} onClick={()=>setShowForm(s=>!s)}>{showForm?'Cancelar':'+ Novo usuário'}</button>}
    </div>
    <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>Vários usuários compartilham os dados da empresa.</div>
    {showForm&&isAdmin&&<div className="card" style={{padding:16,marginBottom:14,border:'2px solid var(--navy)'}}>
      <div style={{fontWeight:700,fontSize:13,color:'var(--navy)',marginBottom:10}}>Criar novo usuário</div>
      <div style={{marginBottom:10}}><label className="label">Nome completo</label><input className="input" value={nf.full_name} onChange={e=>setF('full_name',e.target.value)}/></div>
      <div style={{marginBottom:10}}><label className="label">E-mail</label><input className="input" type="email" value={nf.email} onChange={e=>setF('email',e.target.value)}/></div>
      <div style={{marginBottom:10}}><label className="label">Senha (mínimo 6)</label><PasswordInput value={nf.password} onChange={v=>setF('password',v)} placeholder="defina uma senha"/></div>
      <div style={{marginBottom:12}}><label className="label">Papel</label><select className="input" value={nf.role} onChange={e=>setF('role',e.target.value)}><option value="member">Usuário</option><option value="admin">Administrador</option></select></div>
      <button className="btn btn-success" style={{width:'100%'}} disabled={busy} onClick={createUser}>{busy?'Criando…':'Criar usuário'}</button>
    </div>}
    <SearchBox value={q} onChange={setQ} placeholder="Buscar usuário por nome…"/>
    {members.filter(m=>{const t=q.trim().toLowerCase();return !t||String(m.full_name||'').toLowerCase().includes(t);}).map(m=><div key={m.id} className="card" style={{padding:14,marginBottom:8}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
        <div><div style={{fontWeight:700,fontSize:14,color:'#1E293B'}}>{m.full_name}{m.id===myId&&<span style={{fontSize:11,color:'var(--muted)',marginLeft:6}}>(você)</span>}</div>
          <div style={{fontSize:11,color:'var(--muted)'}}>{m.role==='admin'?'Administrador':'Usuário'}</div></div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          {isAdmin&&m.id!==myId&&<select className="input" style={{width:'auto',padding:'5px 8px',fontSize:12}} value={m.role} disabled={busy} onChange={e=>changeRole(m.id,e.target.value)}>
            <option value="admin">Administrador</option><option value="member">Usuário</option></select>}
          {isAdmin&&m.id!==myId&&<button className="btn btn-ghost" style={{fontSize:12,padding:'6px 10px'}} disabled={busy} onClick={()=>resetPass(m.user_id,m.full_name)}>Resetar senha</button>}
          {isAdmin&&m.id!==myId&&<button className="btn btn-danger" style={{fontSize:12,padding:'6px 10px'}} disabled={busy} onClick={()=>removeUser(m.user_id,m.full_name)}>Remover</button>}
        </div>
      </div></div>)}
  </>;
}

// ============================ MODAIS DE PROJETO =============================
const Field=({label,req,children})=><div style={{marginBottom:12}}><label className="label">{label}{req&&<span style={{color:'#DC2626'}}> *</span>}</label>{children}</div>;
function NewProjectModal({onClose,onCreated,tier,linkId,userId,fabricanteId,activeCount}){
  const [fabMarcas,setFabMarcas]=useState(null);
  useEffect(()=>{(async()=>{if(fabricanteId){try{setFabMarcas(await D.fetchOrgMarcas(fabricanteId));}catch(e){setFabMarcas({});}}})();},[fabricanteId]);
  const [step,setStep]=useState(0);const[cat,setCat]=useState('');
  const [form,setForm]=useState({title:'',clientName:'',clientCnpj:'',address:'',buildingType:'',stage:'',estimatedQty:'',products:'',distributor:'',notes:'',contactName:'',contactEmail:'',contactPhone:'',contactRole:''});
  const [systems,setSystems]=useState({});  // {cftv:{cameras:'16'},...}
  const toggleSys=(k)=>setSystems(p=>{const n={...p};if(n[k])delete n[k];else n[k]={};return n;});
  const setSysItem=(sk,ik,v)=>setSystems(p=>({...p,[sk]:{...p[sk],[ik]:v}}));
  const [evs,setEvs]=useState([]);const[busy,setBusy]=useState(false);const[err,setErr]=useState('');
  const [evFiles,setEvFiles]=useState({});  // {evId: File}
  const setEvFile=(id,file)=>setEvFiles(p=>({...p,[id]:file}));
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));const toggle=(id)=>setEvs(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const ci=cat?CATS[cat]:null;
  const enough=cat==='cat1'?evs.some(e=>['visita','email','projetista'].includes(e)):(evs.includes('proposta')&&evs.some(e=>['visita','email','projetista'].includes(e)));
  const formOk=form.title&&form.clientName&&form.clientCnpj&&form.address&&form.buildingType&&form.stage&&form.distributor&&form.contactName&&form.contactEmail&&form.contactPhone&&form.contactRole;
  const save=async()=>{const semArq=evs.filter(id=>!evFiles[id]);if(semArq.length){setErr('Anexe o PDF de cada evidência marcada antes de registrar.');return;}setBusy(true);setErr('');try{const sysArr=Object.entries(systems).map(([s,itens])=>({sistema:s,itens}));const proj=await D.createProject({...form,category:cat,systems:sysArr},evs,linkId,userId);for(const id of evs){const f=evFiles[id];if(f){try{await D.uploadAttachment(proj.id,f);}catch(upErr){console.error('anexo',upErr);}}}onCreated();}catch(e){setErr(e.message);setBusy(false);}};
  if(activeCount>=MAX_ACTIVE) return <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="modal" style={{maxWidth:440}}>
    <div style={{padding:28,textAlign:'center'}}><div style={{fontSize:40,marginBottom:12}}>⛔</div>
      <div style={{fontWeight:800,fontSize:16,color:'#DC2626',marginBottom:8}}>Limite atingido</div>
      <p style={{fontSize:13,color:'var(--muted)',marginBottom:20}}>Você atingiu {MAX_ACTIVE} registros ativos neste canal.</p>
      <button className="btn btn-primary" onClick={onClose}>Entendi</button></div></div></div>;
  return <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="modal">
    <div style={{padding:'16px 22px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div><div style={{fontWeight:800,fontSize:16,color:'var(--navy)'}}>Novo Registro</div>
        <div style={{display:'flex',gap:6,marginTop:3}}>{['Categoria','Dados','Evidências'].map((s,i)=>
          <span key={s} style={{fontSize:10,fontWeight:i===step?700:400,color:i===step?'var(--navy)':i<step?'#10B981':'var(--muted)'}}>{i<step?'✓ ':''}{s}{i<2?' →':''}</span>)}</div></div>
      <button onClick={onClose} style={{background:'none',border:'none',fontSize:18,color:'var(--muted)'}}>✕</button>
    </div>
    <div style={{padding:22}}>
      {step===0&&<><p style={{fontSize:12,color:'var(--slate)',marginBottom:14}}>Escolha a categoria (seu desconto: {tier}).</p>
        {Object.entries(CATS).map(([k,c])=><button key={k} onClick={()=>setCat(k)} style={{display:'block',width:'100%',textAlign:'left',padding:13,borderRadius:10,border:`2px solid ${cat===k?c.color:'var(--border)'}`,background:cat===k?c.bg:'#fff',marginBottom:9}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:18}}>{c.icon}</span>
              <div><div style={{fontWeight:800,fontSize:13,color:c.color}}>{c.label}</div><div style={{fontSize:10,color:'var(--muted)'}}>{c.cycle} · validade {c.validityDays}d</div></div></div>
            <div style={{textAlign:'right'}}><div style={{fontSize:9,color:'var(--muted)'}}>Seu desconto</div><div style={{fontSize:15,fontWeight:900,color:c.color}}>{c.discounts[tier]}</div></div>
          </div></button>)}
        <div style={{display:'flex',justifyContent:'space-between',gap:10,marginTop:16}}>
          <button className="btn btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" disabled={!cat} onClick={()=>setStep(1)}>Continuar →</button></div></>}
      {step===1&&ci&&<><div style={{background:ci.bg,border:`1px solid ${ci.color}40`,borderRadius:8,padding:'9px 13px',marginBottom:16,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontWeight:700,fontSize:12,color:ci.color}}>{ci.icon} {ci.label}</div>
          <div style={{fontSize:11,color:'var(--slate)'}}>Desconto: <strong style={{color:ci.color}}>{ci.discounts[tier]}</strong></div></div>
        <Field label="Nome do Projeto" req><input className="input" value={form.title} onChange={e=>set('title',e.target.value)}/></Field>
        <Field label="Razão Social do Cliente" req><input className="input" value={form.clientName} onChange={e=>set('clientName',e.target.value)}/></Field>
        <Field label="CNPJ do Cliente" req><input className="input" value={form.clientCnpj} onChange={e=>set('clientCnpj',e.target.value)}/></Field>
        <Field label="Endereço da Instalação" req><input className="input" value={form.address} onChange={e=>set('address',e.target.value)}/></Field>
        <div className="grid grid-2">
          <Field label="Edificação" req><select className="input" value={form.buildingType} onChange={e=>set('buildingType',e.target.value)}><option value="">Selecione…</option>{BUILDING_TYPES.map(b=><option key={b}>{b}</option>)}</select></Field>
          <Field label="Estágio" req><select className="input" value={form.stage} onChange={e=>set('stage',e.target.value)}><option value="">Selecione…</option>{ci.stages.map(s=><option key={s}>{s}</option>)}</select></Field></div>
        <Field label="Distribuidor Indicado" req><input className="input" value={form.distributor} onChange={e=>set('distributor',e.target.value)}/></Field>
        <div style={{marginTop:4,marginBottom:4}}><label className="label" style={{fontWeight:700}}>Contato do cliente</label></div>
        <div className="grid grid-2">
          <Field label="Nome do contato" req><input className="input" value={form.contactName} onChange={e=>set('contactName',e.target.value)}/></Field>
          <Field label="Função do contato" req><input className="input" value={form.contactRole} onChange={e=>set('contactRole',e.target.value)} placeholder="Ex.: Engenheiro, Comprador"/></Field></div>
        <div className="grid grid-2">
          <Field label="E-mail do contato" req><input className="input" type="email" value={form.contactEmail} onChange={e=>set('contactEmail',e.target.value)}/></Field>
          <Field label="Telefone do contato" req><input className="input" type="tel" value={form.contactPhone} onChange={e=>set('contactPhone',e.target.value)}/></Field></div>
        <Field label="Observações"><textarea className="input" rows={2} value={form.notes} onChange={e=>set('notes',e.target.value)}/></Field>
        <div style={{marginTop:6,marginBottom:4}}><label className="label">Sistemas do projeto (selecione e informe as quantidades)</label></div>
        {Object.entries(SISTEMAS).map(([sk,sd])=>{const on=!!systems[sk];return <div key={sk} style={{border:`2px solid ${on?'var(--navy)':'var(--border)'}`,borderRadius:10,padding:10,marginBottom:8,background:on?'#EAF2FB':'#fff'}}>
          <button type="button" onClick={()=>toggleSys(sk)} style={{display:'flex',alignItems:'center',gap:8,width:'100%',background:'none',border:'none',textAlign:'left'}}>
            <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${on?'var(--navy)':'#CBD5E1'}`,background:on?'var(--navy)':'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{on&&<span style={{color:'#fff',fontSize:11}}>✓</span>}</div>
            <span style={{fontSize:13,fontWeight:700,color:'#1E293B'}}>{sd.icon} {sd.label}</span></button>
          {on&&<><div style={{marginTop:10}}><label style={{fontSize:10,color:'var(--muted)',fontWeight:600,display:'block',marginBottom:3}}>Marca</label>
            <select className="input" value={systems[sk]._marca||''} onChange={e=>setSysItem(sk,'_marca',e.target.value)}>
              <option value="">Selecione a marca…</option>{((fabMarcas&&fabMarcas[sk]&&fabMarcas[sk].length)?fabMarcas[sk]:(sd.marcas||['Outro'])).map(m=><option key={m} value={m}>{m}</option>)}</select>
              {fabMarcas&&(!fabMarcas[sk]||!fabMarcas[sk].length)&&<div style={{fontSize:10,color:'var(--muted)',marginTop:3}}>Este fabricante ainda não definiu marcas para este sistema.</div>}</div>
          <div className="grid grid-3" style={{marginTop:10}}>{sd.itens.map(it=><div key={it.key}><label style={{fontSize:10,color:'var(--muted)',fontWeight:600,display:'block',marginBottom:3}}>{it.label}</label>
            <input className="input" type="number" min="0" value={systems[sk][it.key]||''} onChange={e=>setSysItem(sk,it.key,e.target.value)} placeholder="0"/></div>)}</div></>}
        </div>;})}
        <div style={{display:'flex',justifyContent:'space-between',gap:10,marginTop:16}}>
          <button className="btn btn-ghost" onClick={()=>setStep(0)}>← Voltar</button>
          <button className="btn btn-primary" disabled={!formOk} onClick={()=>setStep(2)}>Continuar →</button></div></>}
      {step===2&&ci&&<><div style={{background:'#FEF3C7',border:'1px solid #D97706',borderRadius:8,padding:'9px 13px',marginBottom:14,fontSize:11,color:'#92400E'}}>
          {cat==='cat1'?'CAT 1: ao menos 1 das 3 primeiras evidências.':'CAT 2/3: Proposta obrigatória + 1 das demais.'}</div>
        <div style={{fontSize:11,color:'var(--muted)',marginBottom:10}}>Para cada evidência marcada, anexe o PDF correspondente (obrigatório).</div>
        {EVIDENCE_TYPES.map(ev=>{const ok=ev.cats.includes(cat);const chk=evs.includes(ev.id);const file=evFiles[ev.id];
          return <div key={ev.id} style={{borderRadius:9,border:`2px solid ${chk?'var(--navy)':'var(--border)'}`,background:chk?'#EAF2FB':'#fff',opacity:ok?1:.4,marginBottom:8,padding:'10px 13px'}}>
            <button type="button" onClick={()=>{if(ok){toggle(ev.id);if(chk)setEvFile(ev.id,null);}}} disabled={!ok} style={{display:'flex',alignItems:'center',gap:9,width:'100%',textAlign:'left',background:'none',border:'none'}}>
              <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${chk?'var(--navy)':'#CBD5E1'}`,background:chk?'var(--navy)':'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{chk&&<span style={{color:'#fff',fontSize:11}}>✓</span>}</div>
              <div style={{fontSize:12,fontWeight:700,color:'#1E293B'}}>{ev.label}{ev.mandatoryFor?.includes(cat)&&<span style={{color:'#DC2626',marginLeft:4}}>*</span>}</div></button>
            {chk&&<div style={{marginTop:10,paddingLeft:27}}>
              {file?<div style={{display:'flex',alignItems:'center',gap:8,fontSize:12,color:'var(--slate)'}}>📄 {file.name} <button type="button" onClick={()=>setEvFile(ev.id,null)} style={{background:'none',border:'none',color:'#DC2626',cursor:'pointer'}}>remover</button></div>
              :<label className="btn btn-ghost" style={{fontSize:12,display:'inline-block',cursor:'pointer'}}>+ Anexar PDF
                <input type="file" accept="application/pdf" style={{display:'none'}} onChange={e=>{const f=e.target.files?.[0];if(f){if(f.type!=='application/pdf'){alert('Apenas PDF.');return;}if(f.size>26214400){alert('Máximo 25 MB.');return;}setEvFile(ev.id,f);}e.target.value='';}}/></label>}
            </div>}
          </div>;})}
        {err&&<div style={{background:'#FEE2E2',borderRadius:8,padding:'8px 12px',fontSize:12,color:'#7F1D1D',marginTop:8}}>{err}</div>}
        <div style={{display:'flex',justifyContent:'space-between',gap:10,marginTop:16}}>
          <button className="btn btn-ghost" onClick={()=>setStep(1)}>← Voltar</button>
          <button className="btn btn-primary" disabled={!enough||busy} onClick={save}>{busy?'Salvando…':'Registrar'}</button></div></>}
    </div></div></div>;
}

function ProjectDetailModal({project:init,onClose,onChanged,isFabricante,currentUserId}){
  const [project,setProject]=useState(init);const[note,setNote]=useState('');
  const[busy,setBusy]=useState(false);const[noteType,setNoteType]=useState('');const[atts,setAtts]=useState([]);const[upBusy,setUpBusy]=useState(false);
  const [descSys,setDescSys]=useState(init.descontos_sistema||{});const[editDesc,setEditDesc]=useState(false);
  const setDS=(k,v)=>setDescSys(p=>({...p,[k]:v}));
  const c=CATS[project.category];const days=daysLeft(project.expires_at);
  const reload=async()=>{const f=await D.fetchProjectById(project.id);setProject(f);onChanged?.();};
  const loadAtts=async()=>{try{setAtts(await D.listAttachments(project.id));}catch(e){console.error(e);}};
  useEffect(()=>{loadAtts();},[]);
  const onUpload=async(e)=>{const file=e.target.files?.[0];if(!file)return;setUpBusy(true);try{await D.uploadAttachment(project.id,file);await loadAtts();}catch(err){alert('Erro: '+err.message);}finally{setUpBusy(false);e.target.value='';}};
  const openAtt=async(name)=>{try{const u=await D.signedUrl(project.id+'/'+name);window.open(u,'_blank');}catch(err){alert('Erro: '+err.message);}};
  const delAtt=async(name)=>{if(!confirm('Remover este anexo?'))return;try{await D.deleteAttachment(project.id,name);await loadAtts();}catch(err){alert('Erro: '+err.message);}};
  const submitNote=async()=>{if(!note.trim())return;setBusy(true);try{const txt=(noteType?'['+noteType+'] ':'')+note.trim();await D.addUpdate(project.id,txt);setNote('');setNoteType('');await reload();}catch(e){alert('Erro ao salvar: '+e.message);}finally{setBusy(false);}};
  const doApprove=async()=>{const algum=Object.values(descSys).some(v=>v&&String(v).trim());if(!algum){alert('Informe ao menos um desconto por sistema.');return;}setBusy(true);try{await D.approveProject(project.id,descSys,project);await reload();}catch(e){alert('Erro ao aprovar: '+e.message);}finally{setBusy(false);}};
  const saveDescEdit=async()=>{setBusy(true);try{const antes=project.descontos_sistema||{};const mudancas=[];Object.keys(SISTEMAS).forEach(k=>{const a=antes[k]||'—';const d=descSys[k]||'—';if(a!==d&&(antes[k]||descSys[k]))mudancas.push((SISTEMAS[k]?SISTEMAS[k].label:k)+': '+a+' → '+d);});await D.updateProject(project.id,{descontos_sistema:descSys});await D.audit('projeto.editar_desconto','projeto',project.id,'Alterou descontos de "'+(project.title||'')+'"'+(mudancas.length?' — '+mudancas.join('; '):''));setEditDesc(false);await reload();}catch(e){alert('Erro: '+e.message);}finally{setBusy(false);}};
  const [rejReason,setRejReason]=useState('');const[showRej,setShowRej]=useState(false);
  const doReject=async()=>{if(!rejReason.trim()){alert('Informe o motivo da reprovação.');return;}setBusy(true);try{await D.rejectProject(project.id,rejReason.trim(),project.title);setShowRej(false);await reload();}catch(e){alert('Erro: '+e.message);}finally{setBusy(false);}};
  const mark=async(status)=>{setBusy(true);try{const f={status};if(['convertido','encerrado'].includes(status))f.closed_at=new Date().toISOString();await D.updateProject(project.id,f);await reload();}catch(e){alert('Erro: '+e.message);}finally{setBusy(false);}};
  const evids=EVIDENCE_TYPES.filter(e=>(project.evidences||[]).some(pe=>pe.type===e.id));
  const updates=(project.project_updates||[]).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  return <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="modal" style={{maxWidth:680}}>
    <div style={{padding:'16px 22px',borderBottom:'1px solid var(--border)'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
        <div><div style={{display:'flex',gap:6,marginBottom:4,flexWrap:'wrap'}}><CatBadge cat={project.category}/><StatusBadge status={project.status}/></div>
          <div style={{fontWeight:800,fontSize:17,color:'#1E293B'}}>{project.title}</div>
          <div style={{fontSize:11,color:'var(--muted)'}}>Registrado {new Date(project.registered_at).toLocaleDateString('pt-BR')}</div></div>
        <button onClick={onClose} style={{background:'none',border:'none',fontSize:18,color:'var(--muted)'}}>✕</button></div>
    </div>
    <div style={{padding:20,display:'flex',flexDirection:'column',gap:14}}>
      {isFabricante&&project.status==='pendente'&&<div style={{background:'#EAF2FB',border:'1px solid var(--blue)',borderRadius:10,padding:14}}>
        <div style={{fontWeight:700,fontSize:13,color:'var(--navy)',marginBottom:8}}>Analisar Registro</div>
        <label className="label">Desconto por sistema</label>
        {(project.systems||[]).length>0?<div className="grid grid-2" style={{gap:8,marginBottom:10}}>{(project.systems||[]).map(s=>{const sd=SISTEMAS[s.sistema];if(!sd)return null;return <div key={s.sistema}>
            <label style={{fontSize:11,color:'var(--muted)',fontWeight:600,display:'block',marginBottom:3}}>{sd.icon} {sd.label}{s.itens?._marca?(' · '+s.itens._marca):''}</label>
            <input className="input" style={{fontSize:12}} placeholder="Ex.: 10%" value={descSys[s.sistema]||''} onChange={e=>setDS(s.sistema,e.target.value)}/></div>;})}</div>
          :<div style={{fontSize:12,color:'var(--muted)',marginBottom:10}}>Este projeto não tem sistemas cadastrados.</div>}
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-success" disabled={busy} onClick={doApprove}>Aprovar</button>
          <button className="btn btn-danger" disabled={busy} onClick={()=>setShowRej(s=>!s)}>Reprovar</button></div>
        {showRej&&<div style={{marginTop:10,background:'#fff',borderRadius:8,padding:12,border:'1px solid var(--border)'}}>
          <label className="label">Motivo da reprovação (obrigatório)</label>
          <textarea className="input" rows={2} value={rejReason} onChange={e=>setRejReason(e.target.value)} placeholder="Explique o motivo para o integrador…" style={{resize:'none',marginBottom:8}}/>
          <button className="btn btn-danger" style={{fontSize:12}} disabled={busy||!rejReason.trim()} onClick={doReject}>Confirmar reprovação</button></div>}</div>}
      {project.status==='reprovado'&&project.reject_reason&&<div style={{background:'#FEE2E2',border:'1px solid #FCA5A5',borderRadius:10,padding:13}}><div style={{fontWeight:700,fontSize:12,color:'#991B1B',marginBottom:3}}>❌ Motivo da reprovação</div><div style={{fontSize:12,color:'#7F1D1D'}}>{project.reject_reason}</div></div>}
      {project.status==='aprovado'&&c&&<div style={{background:c.bg,border:`1.5px solid ${c.color}40`,borderRadius:10,padding:13}}>
        <div style={{fontWeight:700,fontSize:12,color:c.color,marginBottom:8}}>💰 Descontos Autorizados <span style={{fontWeight:400,color:'var(--muted)'}}>· válidos só para este projeto</span></div>
        {(project.descontos_sistema&&Object.values(project.descontos_sistema).some(v=>v))?
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>{Object.entries(project.descontos_sistema).filter(([k,v])=>v).map(([k,v])=>{const sd=SISTEMAS[k];return <span key={k} style={{fontSize:13,background:'#fff',border:`1.5px solid ${c.color}`,borderRadius:8,padding:'6px 12px',color:c.color,fontWeight:700}}>{sd?sd.icon+' '+sd.label:k}: {v}</span>;})}</div>
          :<div style={{fontSize:12,color:'var(--muted)'}}>Sem desconto por sistema definido.</div>}
        {isFabricante&&<div style={{marginTop:10}}>
          {!editDesc?<button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>{setEditDesc(true);setDescSys(project.descontos_sistema||{});}}>✏️ Editar descontos</button>
          :<div style={{background:'#fff',borderRadius:8,padding:12,border:'1px solid var(--border)'}}>
            <label className="label">Desconto por sistema</label>
            {(project.systems||[]).length>0&&<div className="grid grid-2" style={{gap:8,marginBottom:10}}>{(project.systems||[]).map(s=>{const sd=SISTEMAS[s.sistema];if(!sd)return null;return <div key={s.sistema}>
                <label style={{fontSize:11,color:'var(--muted)',fontWeight:600,display:'block',marginBottom:3}}>{sd.icon} {sd.label}</label>
                <input className="input" style={{fontSize:12}} placeholder="Ex.: 10%" value={descSys[s.sistema]||''} onChange={e=>setDS(s.sistema,e.target.value)}/></div>;})}</div>}
            <div style={{display:'flex',gap:8}}><button className="btn btn-primary" style={{fontSize:12}} disabled={busy} onClick={saveDescEdit}>Salvar</button>
              <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>setEditDesc(false)}>Cancelar</button></div>
          </div>}</div>}</div>}
      <div className="grid grid-2">
        {[['Cliente',project.client_name],['CNPJ',project.client_cnpj],['Edificação',project.building_type],['Estágio',project.stage],['Distribuidor',project.distributor||'—'],['Endereço',project.address],['Contato',project.contact_name||'—'],['Função',project.contact_role||'—'],['E-mail',project.contact_email||'—'],['Telefone',project.contact_phone||'—']].map(([l,v])=>
          <div key={l} style={{background:'#F8FAFC',borderRadius:7,padding:'9px 11px'}}><div style={{fontSize:10,color:'var(--muted)',fontWeight:600}}>{l}</div><div style={{fontSize:12,color:'#1E293B',fontWeight:500}}>{v}</div></div>)}
      </div>
      {evids.length>0&&<div><div style={{fontWeight:700,fontSize:12,color:'#1E293B',marginBottom:5}}>Evidências</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{evids.map(e=><span key={e.id} style={{fontSize:11,fontWeight:600,color:'#0D9488',background:'#E8F8F5',padding:'3px 9px',borderRadius:99}}>✓ {e.label}</span>)}</div></div>}
      {(project.systems||[]).length>0&&<div><div style={{fontWeight:700,fontSize:12,color:'#1E293B',marginBottom:5}}>Sistemas</div>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>{project.systems.map((s,idx)=>{const sd=SISTEMAS[s.sistema];if(!sd)return null;
          const marca=s.itens?._marca;
          const itens=Object.entries(s.itens||{}).filter(([k,v])=>k!=='_marca'&&v&&Number(v)>0);
          return <div key={idx} style={{background:'#F8FAFC',borderRadius:7,padding:'8px 11px'}}>
            <div style={{fontSize:12,fontWeight:700,color:'#1E293B'}}>{sd.icon} {sd.label}{marca?<span style={{fontWeight:400,color:'var(--muted)'}}> · {marca}</span>:''}</div>
            <div style={{fontSize:11,color:'var(--slate)',marginTop:2}}>{itens.length?itens.map(([k,v])=>{const il=sd.itens.find(x=>x.key===k);return `${il?il.label:k}: ${v}`;}).join(' · '):'sem quantidades'}</div>
          </div>;})}</div></div>}
      {project.notes&&<div style={{background:'#F8FAFC',borderRadius:7,padding:'9px 11px',fontSize:12,color:'var(--slate)'}}>{project.notes}</div>}
      {!isFabricante&&project.status==='aprovado'&&<div style={{display:'flex',gap:8}}>
        <button className="btn btn-success" style={{flex:1,fontSize:12}} disabled={busy} onClick={()=>mark('convertido')}>✅ Convertido</button>
        <button className="btn btn-ghost" style={{flex:1,fontSize:12}} disabled={busy} onClick={()=>mark('encerrado')}>Encerrar</button></div>}
      <div><div style={{fontWeight:700,fontSize:12,color:'#1E293B',marginBottom:6}}>Anexos (PDF, até 25 MB)</div>
        {atts.length>0&&<div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:8}}>{atts.map(a=><div key={a.name} style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'#F8FAFC',borderRadius:7,padding:'7px 11px'}}>
          <button type="button" onClick={()=>openAtt(a.name)} style={{background:'none',border:'none',color:'var(--blue)',fontSize:12,fontWeight:600,textAlign:'left',flex:1,cursor:'pointer'}}>📄 {a.name.replace(/^\d+_/,'')}</button>
          {!isFabricante&&<button type="button" onClick={()=>delAtt(a.name)} style={{background:'none',border:'none',color:'var(--red)',fontSize:11,cursor:'pointer'}}>remover</button>}
        </div>)}</div>}
        {!isFabricante&&<label className="btn btn-ghost" style={{fontSize:12,display:'inline-block',cursor:'pointer'}}>{upBusy?'Enviando…':'+ Anexar PDF'}
          <input type="file" accept="application/pdf" style={{display:'none'}} disabled={upBusy} onChange={onUpload}/></label>}
        {atts.length===0&&isFabricante&&<div style={{fontSize:11,color:'var(--muted)'}}>Nenhum anexo.</div>}
      </div>
      {!isFabricante&&<div><div style={{fontWeight:700,fontSize:12,color:'#1E293B',marginBottom:6}}>Adicionar Atualização</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>{TIPOS_ATUALIZACAO.map(t=><button key={t} type="button" onClick={()=>setNoteType(noteType===t?'':t)} style={{padding:'4px 10px',borderRadius:99,border:'1.5px solid',borderColor:noteType===t?'var(--navy)':'var(--border)',background:noteType===t?'#EAF2FB':'#fff',color:noteType===t?'var(--navy)':'var(--muted)',fontSize:11,fontWeight:600}}>{t}</button>)}</div>
        <div style={{display:'flex',gap:8}}><textarea className="input" rows={2} value={note} onChange={e=>setNote(e.target.value)} style={{resize:'none'}} placeholder={noteType?('Detalhe sobre: '+noteType):'Descreva a atualização…'}/>
          <button className="btn btn-primary" style={{alignSelf:'flex-end',fontSize:12}} disabled={!note.trim()||busy} onClick={submitNote}>Salvar</button></div></div>}
      {updates.length>0&&<div><div style={{fontWeight:700,fontSize:12,color:'#1E293B',marginBottom:6}}>Histórico</div>
        {updates.map(u=><div key={u.id} style={{borderLeft:'3px solid var(--blue)',paddingLeft:10,marginBottom:7}}>
          <div style={{fontSize:10,color:'var(--muted)'}}>{new Date(u.created_at).toLocaleString('pt-BR')}</div>
          <div style={{fontSize:12,color:'var(--slate)'}}>{u.text}</div></div>)}</div>}
    </div></div></div>;
}

// ============================ ROW / EMPTY HELPERS ===========================
const Empty=({text})=><div style={{textAlign:'center',padding:'40px 0',color:'var(--muted)'}}><div style={{fontSize:32,marginBottom:8}}>📁</div><div style={{fontWeight:600,fontSize:13}}>{text}</div></div>;
function ProjectRow({p,onSelect,showInt}){const c=CATS[p.category];const days=daysLeft(p.expires_at);const intName=p.channel_links?.integrador?.name;
  return <div onClick={()=>onSelect(p)} className="card" style={{padding:'11px 14px',cursor:'pointer',marginBottom:8,borderLeft:`4px solid ${c?.color||'#ccc'}`}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10}}>
      <div><div style={{display:'flex',gap:5,marginBottom:3,flexWrap:'wrap'}}><CatBadge cat={p.category}/><StatusBadge status={p.status}/>
        {p.status==='aprovado'&&p.descontos_sistema&&Object.values(p.descontos_sistema).some(v=>v)&&<span style={{fontSize:10,fontWeight:800,color:'#059669',background:'#D1FAE5',padding:'2px 7px',borderRadius:99}}>💰 {Object.entries(p.descontos_sistema).filter(([k,v])=>v).map(([k,v])=>v).join(' / ')}</span>}</div>
        <div style={{fontWeight:700,fontSize:13,color:'#1E293B'}}>{p.title}</div>
        <div style={{fontSize:11,color:'var(--muted)'}}>{p.client_name} · {p.stage}{showInt&&intName?` · ${intName}`:''}</div></div>
      <div style={{textAlign:'right',flexShrink:0}}><div style={{fontSize:10,color:'var(--muted)'}}>Expira</div>
        <div style={{fontSize:12,fontWeight:700,color:days<=15?'#DC2626':'var(--slate)'}}>{days>0?`${days}d`:'Expirado'}</div></div>
    </div></div>;}
const Filter=({active,onClick,children})=><button onClick={onClick} style={{padding:'4px 10px',borderRadius:6,border:'1.5px solid',borderColor:active?'var(--navy)':'var(--border)',background:active?'#EAF2FB':'#fff',color:active?'var(--navy)':'var(--muted)',fontSize:11,fontWeight:600}}>{children}</button>;

// ============================ INTEGRADOR DASHBOARD =========================
function IntegradorDashboard(){
  const {org,membership,isAdmin}=useAuth();
  const [tab,setTab]=useState('canais');const[links,setLinks]=useState([]);const[activeLink,setActiveLink]=useState(null);
  const [projects,setProjects]=useState([]);const[loading,setLoading]=useState(true);const[showNew,setShowNew]=useState(false);const[selected,setSelected]=useState(null);
  const loadLinks=useCallback(async()=>{try{const d=await D.fetchMyFabricantes(org.id);setLinks(d);setActiveLink(cur=>cur||d.find(l=>l.status==='aprovado')||null);}catch(e){console.error(e);}},[org.id]);
  const loadProjects=useCallback(async()=>{if(!activeLink){setProjects([]);return;}try{setProjects(await D.fetchProjects(activeLink.id));}catch(e){console.error(e);}},[activeLink]);
  const [allProj,setAllProj]=useState([]);
  useEffect(()=>{if(tab==='relatorios'){(async()=>{try{setAllProj(await D.fetchMyProjectsAll(org.id));}catch(e){console.error(e);}})();}},[tab,org.id]);
  useEffect(()=>{(async()=>{await loadLinks();setLoading(false);})();return D.subLinks(loadLinks);},[loadLinks]);
  useEffect(()=>{loadProjects();return D.subProjects(loadProjects);},[loadProjects]);
  const activeProjects=projects.filter(p=>!['encerrado','expirado','reprovado'].includes(p.status));
  const stats={total:projects.length,aprovados:projects.filter(p=>p.status==='aprovado').length,pendentes:projects.filter(p=>p.status==='pendente').length,expirando:projects.filter(p=>p.status==='aprovado'&&daysLeft(p.expires_at)<=15).length};
  const converted=projects.filter(p=>p.status==='convertido').length;
  const closed=projects.filter(p=>['convertido','encerrado','reprovado','expirado'].includes(p.status)).length;
  const score=useMemo(()=>calcScore({converted,closed}),[converted,closed]);
  const atLimit=activeProjects.length>=MAX_ACTIVE;const tier=activeLink?.tier||'silver';
  const tabs=[['canais','🤝 Fabricantes'],['dashboard','📊 Dashboard'],['projetos','📁 Projetos'],['beneficios','🎁 Benefícios'],['relatorios','📑 Relatórios']];
  if(isAdmin){tabs.push(['faturas','🧾 Faturas']);tabs.push(['usuarios','👤 Usuários']);tabs.push(['historico','🕓 Histórico']);}
  const ScoreGauge=({score})=>{const col=score>=50?'#10B981':score>=20?'#D97706':'#DC2626';
    return <div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:52,height:52,borderRadius:'50%',border:`4px solid ${col}`,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:14,fontWeight:900,color:col}}>{score}%</span></div>
      <div><div style={{fontSize:12,fontWeight:700,color:col}}>Score {score>=50?'Alto':score>=20?'Médio':'Baixo'}</div><div style={{fontSize:10,color:'var(--muted)'}}>neste canal</div></div></div>;};
  return <div style={{minHeight:'100vh'}}><Header tabs={tabs} active={tab} onTab={setTab}/>
    <main className="container" style={{padding:'18px 16px 40px'}}>
      {tab!=='canais'&&tab!=='usuarios'&&links.filter(l=>l.status==='aprovado').length>0&&
        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:16,flexWrap:'wrap'}}>
          <span style={{fontSize:12,color:'var(--muted)',fontWeight:600}}>Fabricante:</span>
          {links.filter(l=>l.status==='aprovado').map(l=><button key={l.id} onClick={()=>setActiveLink(l)} style={{padding:'6px 12px',borderRadius:8,border:'1.5px solid',borderColor:activeLink?.id===l.id?'var(--navy)':'var(--border)',background:activeLink?.id===l.id?'#EAF2FB':'#fff',fontSize:12,fontWeight:700,color:activeLink?.id===l.id?'var(--navy)':'var(--slate)'}}>🏭 {l.fabricante?.name} <span style={{fontWeight:400,color:'var(--muted)'}}>· {l.tier}</span></button>)}
        </div>}
      {loading?<div className="spinner"/>:<>
        {tab==='canais'&&<CanaisTab org={org} links={links} onChanged={loadLinks} onGo={(l)=>{setActiveLink(l);setTab('projetos');}}/>}
        {tab==='usuarios'&&<MembersPanel orgId={org.id} myId={membership.id} isAdmin={isAdmin}/>}
        {tab==='historico'&&isAdmin&&<AuditPanel orgId={org.id}/>}
        {tab==='relatorios'&&<ReportsPanel projects={allProj} ints={[]} isFabricante={false} orgName={org.name}/>}
        {!activeLink&&['dashboard','projetos','descontos'].includes(tab)&&<Empty text="Selecione ou solicite vínculo a um fabricante na aba Fabricantes."/>}
        {activeLink&&tab==='dashboard'&&<>
          <div className="grid grid-2" style={{marginBottom:14}}>
            <div className="card" style={{padding:16}}><div style={{fontWeight:700,fontSize:12,color:'#1E293B',marginBottom:10}}>Score de Conversão</div><ScoreGauge score={score}/></div>
            <div className="card" style={{padding:16}}><div style={{fontWeight:700,fontSize:12,color:'#1E293B',marginBottom:10}}>Seu nível neste canal</div><TierBadge tier={tier}/></div></div>
          <div className="grid grid-4" style={{marginBottom:14}}>
            {[['Total','📁',stats.total,'#1A3C6E'],['Aprovados','✅',stats.aprovados,'#10B981'],['Pendentes','⏳',stats.pendentes,'#D97706'],['Expirando','🔔',stats.expirando,'#8B5CF6']].map(([l,ic,v,co])=>
              <div key={l} className="card" style={{padding:'11px 13px'}}><div style={{fontSize:22,fontWeight:800,color:co}}>{v}</div><div style={{fontSize:10,color:'var(--muted)',marginTop:1}}>{ic} {l}</div></div>)}</div>
          {(()=>{const ins=[];
            const vencendo=projects.filter(p=>p.status==='aprovado'&&daysLeft(p.expires_at)<=15&&daysLeft(p.expires_at)>=0);
            const vencidos=projects.filter(p=>p.status==='aprovado'&&daysLeft(p.expires_at)<0);
            const pend=projects.filter(p=>p.status==='pendente');
            const semAtualiz=projects.filter(p=>p.status==='aprovado'&&(!p.project_updates||p.project_updates.length===0));
            if(vencendo.length)ins.push(['⏰','#D97706','Você tem '+vencendo.length+' projeto(s) a vencer nos próximos 15 dias. Atualize-os para não perder o registro.']);
            if(vencidos.length)ins.push(['⚠️','#DC2626',vencidos.length+' projeto(s) com prazo vencido. Registre uma atualização ou renove o registro com o fabricante.']);
            if(pend.length)ins.push(['⏳','#2E6CA8',pend.length+' registro(s) aguardando aprovação do fabricante.']);
            if(semAtualiz.length)ins.push(['📝','#8B5CF6',semAtualiz.length+' projeto(s) aprovados sem nenhuma atualização. Adicione o andamento (reunião, visita, proposta).']);
            if(activeProjects.length>=MAX_ACTIVE)ins.push(['🚦','#DC2626','Você atingiu o limite de '+MAX_ACTIVE+' projetos ativos neste canal. Encerre ou converta projetos para liberar espaço.']);
            if(!ins.length)ins.push(['✅','#10B981','Tudo em dia! Nenhum alerta no momento.']);
            return <div style={{marginBottom:16}}><div style={{fontWeight:700,fontSize:13,color:'#1E293B',marginBottom:8}}>💡 Insights</div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>{ins.map(([ic,co,txt],i)=><div key={i} style={{display:'flex',gap:10,alignItems:'flex-start',background:'#F8FAFC',borderLeft:`4px solid ${co}`,borderRadius:7,padding:'10px 13px'}}>
                <span style={{fontSize:16}}>{ic}</span><span style={{fontSize:12,color:'var(--slate)',lineHeight:1.4}}>{txt}</span></div>)}</div></div>;
          })()}
          <div style={{fontWeight:700,fontSize:13,color:'#1E293B',marginBottom:8}}>Projetos Recentes</div>
          {projects.slice(0,5).map(p=><ProjectRow key={p.id} p={p} onSelect={setSelected}/>)}
          {projects.length===0&&<Empty text="Nenhum projeto neste canal ainda."/>}</>}
        {activeLink&&tab==='projetos'&&<>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}}>
            <div style={{fontSize:12,color:'var(--muted)'}}>{activeProjects.length}/{MAX_ACTIVE} ativos neste canal</div>
            <button className="btn btn-primary" disabled={atLimit} onClick={()=>setShowNew(true)}>+ Novo Registro</button></div>
          <ProjectsTab projects={projects} onSelect={setSelected}/></>}
        {activeLink&&tab==='beneficios'&&<>
          <div style={{fontSize:12,color:'var(--muted)',marginBottom:12}}>Seu nível neste canal: <TierBadge tier={tier}/>. Os benefícios aumentam conforme o nível.</div>
          {activeLink.descontos&&Object.values(activeLink.descontos).some(v=>v)&&<div className="card" style={{overflow:'hidden',marginBottom:12}}>
            <div style={{background:'var(--teal)',padding:'10px 16px',fontWeight:700,fontSize:13,color:'#fff'}}>💰 Descontos por sistema definidos pelo fabricante</div>
            <div style={{padding:14}}>{Object.entries(SISTEMAS).filter(([sk])=>activeLink.descontos[sk]).map(([sk,sd])=><div key={sk} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #F1F5F9'}}>
              <span style={{fontSize:12,color:'#1E293B',fontWeight:600}}>{sd.icon} {sd.label}</span><span style={{fontSize:16,fontWeight:800,color:'var(--teal)'}}>{activeLink.descontos[sk]}</span></div>)}</div>
          </div>}
          {['silver','gold','platinum'].map(tk=>{const t=TIERS[tk];const atual=tk===tier;return <div key={tk} className="card" style={{overflow:'hidden',marginBottom:12,border:atual?`2px solid ${t?.color||'var(--navy)'}`:'1px solid var(--border)'}}>
            <div style={{background:t?.color||'var(--navy)',padding:'10px 16px',fontWeight:700,fontSize:13,color:'#fff',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span>{t?.icon||'🏅'} {t?.label||tk}</span>{atual&&<span style={{fontSize:10,background:'rgba(255,255,255,.25)',padding:'2px 8px',borderRadius:99}}>seu nível</span>}</div>
            <div style={{padding:14}}>{(BENEFICIOS[tk]||[]).map((b,i)=><div key={i} style={{display:'flex',gap:8,alignItems:'flex-start',padding:'5px 0',fontSize:12,color:'var(--slate)'}}><span style={{color:'#10B981'}}>✓</span><span>{b}</span></div>)}</div>
          </div>;})}</>}
      </>}
    </main>
    {showNew&&activeLink&&<NewProjectModal onClose={()=>setShowNew(false)} onCreated={()=>{setShowNew(false);loadProjects();}} tier={tier} linkId={activeLink.id} userId={membership.id} fabricanteId={activeLink.fabricante_id} activeCount={activeProjects.length}/>}
    {selected&&<ProjectDetailModal project={selected} onClose={()=>setSelected(null)} onChanged={loadProjects} isFabricante={false} currentUserId={membership.id}/>}
  </div>;
}
function SearchBox({value,onChange,placeholder}){
  return <div style={{position:'relative',marginBottom:12}}>
    <span style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',fontSize:14,color:'var(--muted)'}}>🔍</span>
    <input className="input" style={{paddingLeft:34}} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder||'Buscar…'}/>
    {value&&<button onClick={()=>onChange('')} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',color:'var(--muted)',fontSize:16,cursor:'pointer'}}>×</button>}

function ProjectsTab({projects,onSelect}){const[cat,setCat]=useState('todas');const[status,setStatus]=useState('todos');const[q,setQ]=useState('');
  const term=q.trim().toLowerCase();

    <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:14}}>

    {[['todos','Todos'],['pendente','Pendente'],['aprovado','Aprovado'],['conflito','Conflito']].map(([k,l])=><Filter key={k} active={status===k} onClick={()=>setStatus(k)}>{l}</Filter>)}</div>
    {f.map(p=><ProjectRow key={p.id} p={p} onSelect={onSelect}/>)}{f.length===0&&<Empty text="Nenhum projeto encontrado."/>}</>;}
function CanaisTab({org,links,onChanged,onGo}){
  const [fabs,setFabs]=useState([]);const[sel,setSel]=useState('');const[term,setTerm]=useState('');const[busy,setBusy]=useState(false);const[loading,setLoading]=useState(true);
  const linkedIds=new Set(links.map(l=>l.fabricante_id));
  useEffect(()=>{(async()=>{try{setFabs(await D.listAllFabricantes());}catch(e){console.error(e);}finally{setLoading(false);}})();},[]);
  const askById=async(id)=>{if(!id)return;setBusy(true);try{await D.requestLink(id,org.id);await onChanged();setSel('');}catch(e){alert(e.message);}finally{setBusy(false);}};
  const askByName=async()=>{const t=term.trim();if(!t)return;setBusy(true);try{const r=await D.searchFabricantes(t);if(!r||r.length===0){alert('Nenhum fabricante encontrado com "'+t+'". Confira o nome com o fabricante.');return;}
    if(r.length===1){await D.requestLink(r[0].id,org.id);await onChanged();setTerm('');}
    else{alert('Vários fabricantes correspondem a "'+t+'". Use a lista suspensa acima para escolher.');}}catch(e){alert(e.message);}finally{setBusy(false);}};

          <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13,color:'#1E293B'}}>{f.name}</div><div style={{fontSize:11,color:'var(--muted)'}}>{f.cnpj||''}</div></div>
          <button className="btn btn-primary" style={{fontSize:12}} disabled={busy} onClick={()=>askById(f.id)}>Solicitar</button>
        </div>;})}

        <div><div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontWeight:700,fontSize:14}}>{l.fabricante?.name}</span><StatusBadge status={l.status}/>{l.status==='aprovado'&&<TierBadge tier={l.tier}/>}</div>
        <div style={{fontSize:11,color:'var(--muted)'}}>{l.fabricante?.cnpj||''}</div></div></div>

// ============================ FABRICANTE DASHBOARD =========================
function ReportsPanel({projects,ints,isFabricante,orgName}){
  const [opts,setOpts]=useState({status:true,categoria:true,ranking:true,vencendo:true,lista:true});
  const [de,setDe]=useState('');const[ate,setAte]=useState('');
  const [fInt,setFInt]=useState('');const[fSis,setFSis]=useState('');const[fMarca,setFMarca]=useState('');const[fProj,setFProj]=useState('');
  const tog=(k)=>setOpts(p=>({...p,[k]:!p[k]}));
  const STLAB={pendente:'Pendentes',aprovado:'Aprovados',reprovado:'Reprovados',convertido:'Convertidos',encerrado:'Encerrados',conflito:'Conflitos'};

  // marcas presentes nos projetos (para o filtro)
  const marcasDisp=(()=>{const s=new Set();projects.forEach(p=>(p.systems||[]).forEach(sy=>{if(sy.itens?._marca)s.add(sy.itens._marca);}));return [...s].sort();})();
  const intsDisp=(()=>{const s=new Set();projects.forEach(p=>{const n=p.channel_links?.integrador?.name;if(n)s.add(n);});return [...s].sort();})();
  const fabsDisp=(()=>{const s=new Set();projects.forEach(p=>{if(p._fabricante)s.add(p._fabricante);});return [...s].sort();})();
  const [fFab,setFFab]=useState('');

  const passaFiltro=(p)=>{
    const d=new Date(p.registered_at);
    if(de&&d<new Date(de))return false;
    if(ate&&d>new Date(ate+'T23:59:59'))return false;
    if(fInt&&(p.channel_links?.integrador?.name||'')!==fInt)return false;
    if(fFab&&(p._fabricante||'')!==fFab)return false;
    if(fProj){const t=fProj.toLowerCase();if(!String(p.title||'').toLowerCase().includes(t)&&!String(p.client_name||'').toLowerCase().includes(t))return false;}
    if(fSis&&!(p.systems||[]).some(sy=>sy.sistema===fSis))return false;
    if(fMarca&&!(p.systems||[]).some(sy=>sy.itens?._marca===fMarca))return false;
    return true;
  };
  const ps=projects.filter(passaFiltro);
  const byStatus=()=>{const m={};ps.forEach(p=>{m[p.status]=(m[p.status]||0)+1;});return m;};
  const byCat=()=>{const m={};ps.forEach(p=>{m[p.category]=(m[p.category]||0)+1;});return m;};
  const ranking=()=>{const m={};ps.forEach(p=>{const n=p.channel_links?.integrador?.name||'—';if(!m[n])m[n]={total:0,aprov:0,conv:0};m[n].total++;if(p.status==='aprovado')m[n].aprov++;if(p.status==='convertido')m[n].conv++;});return Object.entries(m).sort((a,b)=>b[1].total-a[1].total);};
  const vencendo=()=>ps.filter(p=>p.status==='aprovado'&&daysLeft(p.expires_at)<=30&&daysLeft(p.expires_at)>=0);
  const descTxt=(p)=>{if(!p.descontos_sistema)return '—';const e=Object.entries(p.descontos_sistema).filter(([k,v])=>v);return e.length?e.map(([k,v])=>(SISTEMAS[k]?SISTEMAS[k].label:k)+' '+v).join(', '):'—';};

  const filtrosTxt=()=>{const a=[];if(de||ate)a.push('período '+(de||'início')+' a '+(ate||'hoje'));if(fInt)a.push('integrador: '+fInt);if(fFab)a.push('fabricante: '+fFab);if(fSis)a.push('sistema: '+(SISTEMAS[fSis]?SISTEMAS[fSis].label:fSis));if(fMarca)a.push('marca: '+fMarca);if(fProj)a.push('busca: '+fProj);return a.length?a.join(' · '):'sem filtros';};

  const gerarHTML=()=>{
    const hoje=new Date().toLocaleString('pt-BR');
    let h='<html><head><meta charset="utf-8"><title>Relatório</title><style>body{font-family:Arial,sans-serif;color:#1E293B;padding:24px;max-width:820px;margin:auto}h1{color:#1A3C6E;font-size:22px;margin-bottom:2px}h2{color:#2E6CA8;font-size:15px;margin-top:24px;border-bottom:2px solid #EAF2FB;padding-bottom:4px}.sub{color:#64748B;font-size:12px;margin-bottom:18px}table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}th,td{text-align:left;padding:7px 9px;border-bottom:1px solid #E2E8F0}th{background:#F8FAFC;color:#475569}.row{display:flex;gap:16px;flex-wrap:wrap}.box{background:#F8FAFC;border-radius:8px;padding:12px 16px;min-width:110px}.box .n{font-size:22px;font-weight:800;color:#1A3C6E}.box .l{font-size:11px;color:#64748B}</style></head><body>';
    h+='<h1>Relatório — '+(orgName||'')+'</h1><div class="sub">Gerado em '+hoje+' · '+filtrosTxt()+' · '+ps.length+' projeto(s)</div>';
    if(opts.status){const m=byStatus();h+='<h2>Projetos por status</h2><div class="row">'+Object.keys(STLAB).map(k=>'<div class="box"><div class="n">'+(m[k]||0)+'</div><div class="l">'+STLAB[k]+'</div></div>').join('')+'</div>';}
    if(opts.categoria){const m=byCat();h+='<h2>Por categoria</h2><div class="row">'+['cat1','cat2','cat3'].map(k=>'<div class="box"><div class="n">'+(m[k]||0)+'</div><div class="l">'+(CATS[k]?CATS[k].label:k)+'</div></div>').join('')+'</div>';}
    if(opts.ranking&&isFabricante){h+='<h2>Ranking de integradores</h2><table><tr><th>Integrador</th><th>Total</th><th>Aprovados</th><th>Convertidos</th></tr>'+ranking().map(([n,v])=>'<tr><td>'+n+'</td><td>'+v.total+'</td><td>'+v.aprov+'</td><td>'+v.conv+'</td></tr>').join('')+'</table>';}
    if(opts.vencendo){const v=vencendo();h+='<h2>Projetos a vencer (30 dias)</h2>'+(v.length?'<table><tr><th>Projeto</th><th>Cliente</th><th>Dias restantes</th></tr>'+v.map(p=>'<tr><td>'+(p.title||'')+'</td><td>'+(p.client_name||'')+'</td><td>'+daysLeft(p.expires_at)+'</td></tr>').join('')+'</table>':'<div class="sub">Nenhum projeto a vencer.</div>');}
    if(opts.lista){h+='<h2>Lista de projetos</h2><table><tr><th>Projeto</th><th>Cliente</th>'+(isFabricante?'<th>Integrador</th>':'<th>Fabricante</th>')+'<th>Categoria</th><th>Status</th><th>Descontos</th></tr>'+ps.map(p=>'<tr><td>'+(p.title||'')+'</td><td>'+(p.client_name||'')+'</td><td>'+(isFabricante?(p.channel_links?.integrador?.name||'—'):(p._fabricante||'—'))+'</td><td>'+(CATS[p.category]?CATS[p.category].label:p.category)+'</td><td>'+(STLAB[p.status]||p.status)+'</td><td>'+descTxt(p)+'</td></tr>').join('')+'</table>';}
    h+='</body></html>';return h;};

  const imprimir=()=>{const w=window.open('','_blank');if(!w){alert('Permita pop-ups para imprimir/salvar o PDF.');return;}w.document.write(gerarHTML());w.document.close();setTimeout(()=>w.print(),400);};
  const enviarEmail=()=>{const m=byStatus();const corpo='Relatório '+(orgName||'')+'%0D%0A'+filtrosTxt()+'%0D%0A%0D%0ATotal: '+ps.length+'%0D%0APendentes: '+(m.pendente||0)+'%0D%0AAprovados: '+(m.aprovado||0)+'%0D%0AConvertidos: '+(m.convertido||0)+'%0D%0A%0D%0A(Use Imprimir > Salvar como PDF no app para o relatório completo.)';window.location.href='mailto:?subject='+encodeURIComponent('Relatório - '+(orgName||''))+'&body='+corpo;};

  const checks=[['status','Projetos por status'],['categoria','Por categoria'],...(isFabricante?[['ranking','Ranking de integradores']]:[]),['vencendo','Projetos a vencer'],['lista','Lista completa de projetos']];
  const stsel=Object.entries(byStatus());

  return <>
    <div style={{fontWeight:800,fontSize:17,color:'#1E293B',marginBottom:4}}>Relatórios</div>
    <div style={{fontSize:12,color:'var(--muted)',marginBottom:14}}>Defina filtros, veja o preview e clique em Imprimir para salvar como PDF ou enviar por e-mail.</div>

    <div className="card" style={{padding:16,marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:13,color:'#1E293B',marginBottom:10}}>Período</div>
      <div className="grid grid-2" style={{gap:8,marginBottom:12}}>
        <div><label style={{fontSize:11,color:'var(--muted)',fontWeight:600}}>De</label><input className="input" type="date" value={de} onChange={e=>setDe(e.target.value)}/></div>
        <div><label style={{fontSize:11,color:'var(--muted)',fontWeight:600}}>Até</label><input className="input" type="date" value={ate} onChange={e=>setAte(e.target.value)}/></div>
      </div>
      <div style={{fontWeight:700,fontSize:13,color:'#1E293B',marginBottom:10}}>Filtros</div>
      <div className="grid grid-2" style={{gap:8}}>
        {isFabricante&&<div><label style={{fontSize:11,color:'var(--muted)',fontWeight:600}}>Integrador</label>
          <select className="input" value={fInt} onChange={e=>setFInt(e.target.value)}><option value="">Todos</option>{intsDisp.map(n=><option key={n} value={n}>{n}</option>)}</select></div>}
        {!isFabricante&&<div><label style={{fontSize:11,color:'var(--muted)',fontWeight:600}}>Fabricante</label>
          <select className="input" value={fFab} onChange={e=>setFFab(e.target.value)}><option value="">Todos</option>{fabsDisp.map(n=><option key={n} value={n}>{n}</option>)}</select></div>}
        <div><label style={{fontSize:11,color:'var(--muted)',fontWeight:600}}>Sistema</label>
          <select className="input" value={fSis} onChange={e=>setFSis(e.target.value)}><option value="">Todos</option>{Object.entries(SISTEMAS).map(([k,sd])=><option key={k} value={k}>{sd.label}</option>)}</select></div>
        <div><label style={{fontSize:11,color:'var(--muted)',fontWeight:600}}>Marca</label>
          <select className="input" value={fMarca} onChange={e=>setFMarca(e.target.value)}><option value="">Todas</option>{marcasDisp.map(m=><option key={m} value={m}>{m}</option>)}</select></div>
        <div><label style={{fontSize:11,color:'var(--muted)',fontWeight:600}}>Projeto / cliente</label>
          <input className="input" value={fProj} onChange={e=>setFProj(e.target.value)} placeholder="Digite parte do nome…"/></div>
      </div>
    </div>

    <div className="card" style={{padding:16,marginBottom:14}}>
      <div style={{fontWeight:700,fontSize:13,color:'#1E293B',marginBottom:10}}>Incluir no relatório</div>
      {checks.map(([k,l])=><label key={k} style={{display:'flex',alignItems:'center',gap:10,padding:'6px 0',cursor:'pointer'}}>
        <div onClick={()=>tog(k)} style={{width:20,height:20,borderRadius:5,border:`2px solid ${opts[k]?'var(--navy)':'#CBD5E1'}`,background:opts[k]?'var(--navy)':'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{opts[k]&&<span style={{color:'#fff',fontSize:12}}>✓</span>}</div>
        <span style={{fontSize:13,color:'#1E293B'}}>{l}</span></label>)}
    </div>

    <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:16}}>
      <button className="btn btn-primary" onClick={imprimir}>🖨️ Imprimir / Salvar PDF</button>
      <button className="btn btn-ghost" onClick={enviarEmail}>✉️ Enviar resumo por e-mail</button>
    </div>

    {/* PREVIEW AO VIVO */}
    <div style={{fontWeight:700,fontSize:13,color:'#1E293B',marginBottom:8}}>Pré-visualização</div>
    <div className="card" style={{padding:18}}>
      <div style={{fontWeight:800,fontSize:16,color:'var(--navy)'}}>Relatório — {orgName}</div>
      <div style={{fontSize:11,color:'var(--muted)',marginBottom:12}}>{filtrosTxt()} · {ps.length} projeto(s)</div>
      {opts.status&&<><div style={{fontSize:12,fontWeight:700,color:'var(--blue)',marginTop:10,marginBottom:6}}>Projetos por status</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>{Object.keys(STLAB).map(k=>{const m=byStatus();return <div key={k} style={{background:'#F8FAFC',borderRadius:7,padding:'8px 12px',minWidth:90}}><div style={{fontSize:18,fontWeight:800,color:'var(--navy)'}}>{m[k]||0}</div><div style={{fontSize:10,color:'var(--muted)'}}>{STLAB[k]}</div></div>;})}</div></>}
      {opts.categoria&&<><div style={{fontSize:12,fontWeight:700,color:'var(--blue)',marginTop:14,marginBottom:6}}>Por categoria</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>{['cat1','cat2','cat3'].map(k=>{const m=byCat();return <div key={k} style={{background:'#F8FAFC',borderRadius:7,padding:'8px 12px',minWidth:90}}><div style={{fontSize:18,fontWeight:800,color:'var(--navy)'}}>{m[k]||0}</div><div style={{fontSize:10,color:'var(--muted)'}}>{CATS[k]?CATS[k].label:k}</div></div>;})}</div></>}
      {opts.ranking&&isFabricante&&<><div style={{fontSize:12,fontWeight:700,color:'var(--blue)',marginTop:14,marginBottom:6}}>Ranking de integradores</div>
        {ranking().length?ranking().map(([n,v])=><div key={n} style={{display:'flex',justifyContent:'space-between',fontSize:12,padding:'5px 0',borderBottom:'1px solid #F1F5F9'}}><span>{n}</span><span style={{color:'var(--muted)'}}>{v.total} proj · {v.aprov} aprov · {v.conv} conv</span></div>):<div style={{fontSize:12,color:'var(--muted)'}}>Sem dados.</div>}</>}
      {opts.vencendo&&<><div style={{fontSize:12,fontWeight:700,color:'var(--blue)',marginTop:14,marginBottom:6}}>Projetos a vencer (30 dias)</div>
        {vencendo().length?vencendo().map(p=><div key={p.id} style={{display:'flex',justifyContent:'space-between',fontSize:12,padding:'5px 0',borderBottom:'1px solid #F1F5F9'}}><span>{p.title} · {p.client_name}</span><span style={{color:daysLeft(p.expires_at)<=7?'#DC2626':'var(--muted)'}}>{daysLeft(p.expires_at)}d</span></div>):<div style={{fontSize:12,color:'var(--muted)'}}>Nenhum a vencer.</div>}</>}
      {opts.lista&&<><div style={{fontSize:12,fontWeight:700,color:'var(--blue)',marginTop:14,marginBottom:6}}>Lista de projetos</div>
        {ps.length?<div style={{overflowX:'auto'}}><table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}><tbody>
          <tr style={{background:'#F8FAFC'}}><th style={{textAlign:'left',padding:'6px 8px'}}>Projeto</th><th style={{textAlign:'left',padding:'6px 8px'}}>Cliente</th><th style={{textAlign:'left',padding:'6px 8px'}}>{isFabricante?'Integrador':'Fabricante'}</th><th style={{textAlign:'left',padding:'6px 8px'}}>Status</th><th style={{textAlign:'left',padding:'6px 8px'}}>Descontos</th></tr>
          {ps.map(p=><tr key={p.id} style={{borderBottom:'1px solid #F1F5F9'}}><td style={{padding:'6px 8px'}}>{p.title}</td><td style={{padding:'6px 8px'}}>{p.client_name}</td><td style={{padding:'6px 8px'}}>{isFabricante?(p.channel_links?.integrador?.name||'—'):(p._fabricante||'—')}</td><td style={{padding:'6px 8px'}}>{STLAB[p.status]||p.status}</td><td style={{padding:'6px 8px'}}>{descTxt(p)}</td></tr>)}
        </tbody></table></div>:<div style={{fontSize:12,color:'var(--muted)'}}>Nenhum projeto com esses filtros.</div>}</>}
    </div>
  </>;
}
function FaturasPanel({orgId}){
  const [invs,setInvs]=useState([]);const[loading,setLoading]=useState(true);
  useEffect(()=>{(async()=>{try{setInvs(await D.fetchInvoices(orgId));}catch(e){console.error(e);}finally{setLoading(false);}})();},[orgId]);
  const fmt=(c)=>'R$ '+((c||0)/100).toLocaleString('pt-BR',{minimumFractionDigits:2});
  const hoje=new Date();
  const calcSt=(i)=>{if(i.status==='pago')return 'pago';if(new Date(i.vencimento)<hoje)return 'vencido';return 'pendente';};
  const LAB={pago:'Paga',pendente:'A vencer',vencido:'Vencida'};
  const COL={pago:'#10B981',pendente:'#D97706',vencido:'#DC2626'};
  const pagas=invs.filter(i=>i.status==='pago');
  const proximas=invs.filter(i=>i.status!=='pago'&&new Date(i.vencimento)>=hoje);
  const vencidas=invs.filter(i=>i.status!=='pago'&&new Date(i.vencimento)<hoje);
  if(loading)return <div className="spinner"/>;
  const Card=({i})=>{const st=calcSt(i);return <div className="card" style={{padding:14,marginBottom:8,borderLeft:`4px solid ${COL[st]}`}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
      <div><div style={{fontWeight:700,fontSize:14,color:'#1E293B'}}>{new Date(i.competencia).toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</div>
        <div style={{fontSize:11,color:'var(--muted)'}}>{i.plano_nome||''} · vence {new Date(i.vencimento).toLocaleDateString('pt-BR')}{i.pago_em?(' · paga em '+new Date(i.pago_em).toLocaleDateString('pt-BR')):''}</div></div>
      <div style={{textAlign:'right'}}><div style={{fontSize:16,fontWeight:800,color:'#1E293B'}}>{fmt(i.valor_cents)}</div>
        <div style={{fontSize:11,fontWeight:700,color:COL[st]}}>● {LAB[st]}</div></div>
    </div></div>;};
  return <>
    <div style={{fontWeight:800,fontSize:17,color:'#1E293B',marginBottom:4}}>Faturas</div>
    <div style={{fontSize:12,color:'var(--muted)',marginBottom:14}}>Acompanhe suas faturas mensais do plano. A cobrança automática será integrada em breve.</div>
    {invs.length===0?<Empty text="Nenhuma fatura gerada ainda."/>:<>
      {vencidas.length>0&&<><div style={{fontWeight:700,fontSize:13,color:'#991B1B',margin:'8px 0'}}>⚠️ Faturas vencidas ({vencidas.length})</div>{vencidas.map(i=><Card key={i.id} i={i}/>)}</>}
      {proximas.length>0&&<><div style={{fontWeight:700,fontSize:13,color:'#92400E',margin:'14px 0 8px'}}>⏳ Próximas faturas ({proximas.length})</div>{proximas.map(i=><Card key={i.id} i={i}/>)}</>}
      {pagas.length>0&&<><div style={{fontWeight:700,fontSize:13,color:'#166534',margin:'14px 0 8px'}}>✅ Faturas pagas ({pagas.length})</div>{pagas.map(i=><Card key={i.id} i={i}/>)}</>}
    </>}
  </>;
}
function AuditPanel({orgId}){

  const delOrg=async(id,nome)=>{if(!confirm('EXCLUIR a empresa "'+nome+'" e TODOS os seus usuários, vínculos e projetos? Não há volta.'))return;
    setBusy(true);try{await D.callManageUser({action:'delete_org',org_id:id});await load();}catch(e){alert('Erro: '+e.message);}finally{setBusy(false);}};
  const delUser=async(uid,nome)=>{if(!confirm('Remover o usuário "'+nome+'"?'))return;
    setBusy(true);try{await D.callManageUser({action:'delete_user',target_user_id:uid});await load();}catch(e){alert('Erro: '+e.message);}finally{setBusy(false);}};
  const resetPass=async(uid,nome)=>{const np=prompt('Nova senha para '+nome+' (mínimo 6):');if(!np)return;if(np.length<6){alert('Senha curta.');return;}
    setBusy(true);try{await D.devResetPassword(uid,np);alert('Senha redefinida.');}catch(e){alert('Erro: '+e.message);}finally{setBusy(false);}};
  const setPay=async(fabId,status)=>{setBusy(true);try{await D.devSetPayment(fabId,status);await load();}catch(e){alert('Erro: '+e.message);}finally{setBusy(false);}};

  const fabs=orgs.filter(o=>o.type==='fabricante');const ints=orgs.filter(o=>o.type==='integrador');
  const term=q.trim().toLowerCase();
  const shownOrgs=(filter==='fabricantes'?fabs:filter==='integradores'?ints:orgs).filter(o=>!term||[o.name,o.cnpj].some(v=>String(v||'').toLowerCase().includes(term)));

  const fmt=(c)=>'R$ '+((c||0)/100).toLocaleString('pt-BR',{minimumFractionDigits:0});
  const PAYLAB={pago:'Pago',pendente:'Pendente',cancelado:'Cancelado'};
  const PAYCOL={pago:'#10B981',pendente:'#D97706',cancelado:'#DC2626'};
  const shownSubs=subs.filter(s=>payFilter==='todos'||(s.payment_status||'pendente')===payFilter);
  const totPago=subs.filter(s=>s.payment_status==='pago').reduce((a,s)=>a+(s.plans?.price_cents||0),0);
  const totPend=subs.filter(s=>(s.payment_status||'pendente')==='pendente').reduce((a,s)=>a+(s.plans?.price_cents||0),0);
  const nCancel=subs.filter(s=>s.payment_status==='cancelado').length;

  return <div style={{minHeight:'100vh'}}>
    <header style={{background:'#0f172a',position:'sticky',top:0,zIndex:50}}>
      <div className="container" style={{display:'flex',alignItems:'center',justifyContent:'space-between',height:56}}>
        <div style={{display:'flex',alignItems:'center',gap:10}}><span style={{fontSize:20}}>🛠️</span>
          <div><div style={{color:'#fff',fontWeight:800,fontSize:13}}>Painel do Desenvolvedor</div>
          <div style={{color:'rgba(255,255,255,.5)',fontSize:9}}>Administração da plataforma</div></div></div>
        <button onClick={signOut} className="btn" style={{background:'rgba(255,255,255,.15)',color:'#fff',padding:'6px 12px',fontSize:12}}>Sair</button>
      </div>
      <div className="container" style={{display:'flex',gap:4,paddingBottom:8}}>
        {[['empresas','🏢 Empresas'],['pagamentos','💳 Pagamentos']].map(([k,l])=>
          <button key={k} onClick={()=>setTab(k)} style={{padding:'5px 12px',borderRadius:6,border:'none',background:tab===k?'rgba(255,255,255,.2)':'transparent',color:'#fff',fontSize:12,fontWeight:600}}>{l}</button>)}
      </div>
    </header>
    <main className="container" style={{padding:'18px 16px 40px'}}>
      {loading?<div className="spinner"/>:tab==='empresas'?<>
        <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
          <div className="card" style={{padding:'11px 16px',flex:1,minWidth:110}}><div style={{fontSize:22,fontWeight:800,color:'#1A3C6E'}}>{fabs.length}</div><div style={{fontSize:11,color:'var(--muted)'}}>🏭 Fabricantes</div></div>
          <div className="card" style={{padding:'11px 16px',flex:1,minWidth:110}}><div style={{fontSize:22,fontWeight:800,color:'#0D9488'}}>{ints.length}</div><div style={{fontSize:11,color:'var(--muted)'}}>🔧 Integradores</div></div>
          <div className="card" style={{padding:'11px 16px',flex:1,minWidth:110}}><div style={{fontSize:22,fontWeight:800,color:'#8B5CF6'}}>{orgs.reduce((a,o)=>a+(o.memberships?.length||0),0)}</div><div style={{fontSize:11,color:'var(--muted)'}}>👤 Usuários</div></div>
        </div>
        <SearchBox value={q} onChange={setQ} placeholder="Buscar empresa por nome ou CNPJ…"/>
        <div style={{display:'flex',gap:4,marginBottom:14,flexWrap:'wrap'}}>
          {[['todos','Todas'],['fabricantes','Fabricantes'],['integradores','Integradores']].map(([k,l])=>
            <button key={k} onClick={()=>setFilter(k)} style={{padding:'4px 10px',borderRadius:6,border:'1.5px solid',borderColor:filter===k?'#0f172a':'var(--border)',background:filter===k?'#e2e8f0':'#fff',color:filter===k?'#0f172a':'var(--muted)',fontSize:11,fontWeight:600}}>{l}</button>)}
        </div>
        {shownOrgs.map(o=><div key={o.id} className="card" style={{padding:14,marginBottom:10,borderLeft:`4px solid ${o.type==='fabricante'?'#1A3C6E':'#0D9488'}`}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
            <div><div style={{fontWeight:700,fontSize:14,color:'#1E293B'}}>{o.type==='fabricante'?'🏭':'🔧'} {o.name}</div>
              <div style={{fontSize:11,color:'var(--muted)'}}>{o.cnpj||'sem CNPJ'} · {(o.memberships?.length||0)} usuário(s)</div></div>
            <button className="btn btn-danger" style={{fontSize:12,padding:'6px 10px'}} disabled={busy} onClick={()=>delOrg(o.id,o.name)}>Excluir empresa</button>
          </div>
          {(o.memberships||[]).length>0&&<div style={{marginTop:10,borderTop:'1px solid var(--border)',paddingTop:10,display:'flex',flexDirection:'column',gap:6}}>
            {o.memberships.map(m=><div key={m.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <div style={{fontSize:12,color:'var(--slate)'}}>{m.full_name} <span style={{fontSize:10,color:'var(--muted)'}}>· {m.role}{m.is_developer?' · DEV':''}</span></div>
              <div style={{display:'flex',gap:6}}>
                <button className="btn btn-ghost" style={{fontSize:11,padding:'4px 8px'}} disabled={busy} onClick={()=>resetPass(m.user_id,m.full_name)}>trocar senha</button>
                {m.id!==membership.id&&<button className="btn btn-ghost" style={{fontSize:11,padding:'4px 8px',color:'#DC2626'}} disabled={busy} onClick={()=>delUser(m.user_id,m.full_name)}>remover</button>}
              </div>
            </div>)}
          </div>}
        </div>)}
        {shownOrgs.length===0&&<Empty text="Nenhuma empresa encontrada."/>}
      </>:<>
        {/* PAGAMENTOS */}
        <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
          <div className="card" style={{padding:'11px 16px',flex:1,minWidth:120}}><div style={{fontSize:20,fontWeight:800,color:'#10B981'}}>{fmt(totPago)}</div><div style={{fontSize:11,color:'var(--muted)'}}>✅ Recebido (pago)</div></div>
          <div className="card" style={{padding:'11px 16px',flex:1,minWidth:120}}><div style={{fontSize:20,fontWeight:800,color:'#D97706'}}>{fmt(totPend)}</div><div style={{fontSize:11,color:'var(--muted)'}}>⏳ A receber (pendente)</div></div>
          <div className="card" style={{padding:'11px 16px',flex:1,minWidth:120}}><div style={{fontSize:20,fontWeight:800,color:'#DC2626'}}>{nCancel}</div><div style={{fontSize:11,color:'var(--muted)'}}>🚫 Cancelados</div></div>
        </div>
        <div style={{background:'#FEF3C7',border:'1px solid #D97706',borderRadius:9,padding:'9px 13px',marginBottom:14,fontSize:11,color:'#92400E'}}>A cobrança automática (Stripe/Pagar.me) será integrada depois. Por ora, marque o status manualmente — a estrutura já está pronta para o gateway atualizar sozinho no futuro.</div>
        <div style={{display:'flex',gap:4,marginBottom:14,flexWrap:'wrap'}}>
          {[['todos','Todos'],['pago','Pagos'],['pendente','Pendentes'],['cancelado','Cancelados']].map(([k,l])=>
            <button key={k} onClick={()=>setPayFilter(k)} style={{padding:'4px 10px',borderRadius:6,border:'1.5px solid',borderColor:payFilter===k?'#0f172a':'var(--border)',background:payFilter===k?'#e2e8f0':'#fff',color:payFilter===k?'#0f172a':'var(--muted)',fontSize:11,fontWeight:600}}>{l}</button>)}
        </div>
        {shownSubs.map(s=>{const st=s.payment_status||'pendente';return <div key={s.fabricante_id} className="card" style={{padding:14,marginBottom:10,borderLeft:`4px solid ${PAYCOL[st]}`}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
            <div><div style={{fontWeight:700,fontSize:14,color:'#1E293B'}}>🏭 {s.fabricante?.name||'—'}</div>
              <div style={{fontSize:11,color:'var(--muted)'}}>{s.fabricante?.cnpj||'sem CNPJ'} · {s.plans?.name||'—'} · {fmt(s.plans?.price_cents)}/mês</div>
              <div style={{fontSize:11,marginTop:4}}><span style={{color:PAYCOL[st],fontWeight:700}}>● {PAYLAB[st]}</span>
                {s.last_payment_at&&st==='pago'&&<span style={{color:'var(--muted)'}}> · último pgto {new Date(s.last_payment_at).toLocaleDateString('pt-BR')}</span>}
                {s.canceled_at&&st==='cancelado'&&<span style={{color:'var(--muted)'}}> · cancelado em {new Date(s.canceled_at).toLocaleDateString('pt-BR')}</span>}</div></div>
          </div>
          <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap'}}>
            <button className="btn btn-success" style={{fontSize:11,padding:'5px 10px'}} disabled={busy||st==='pago'} onClick={()=>setPay(s.fabricante_id,'pago')}>Marcar pago</button>
            <button className="btn btn-ghost" style={{fontSize:11,padding:'5px 10px'}} disabled={busy||st==='pendente'} onClick={()=>setPay(s.fabricante_id,'pendente')}>Marcar pendente</button>
            <button className="btn btn-danger" style={{fontSize:11,padding:'5px 10px'}} disabled={busy||st==='cancelado'} onClick={()=>setPay(s.fabricante_id,'cancelado')}>Marcar cancelado</button>
          </div>
        </div>;})}
        {shownSubs.length===0&&<Empty text="Nenhuma assinatura nesta categoria."/>}
      </>}
    </main>
  </div>;
}

// ============================ APP ROOT ======================================
function App(){
  const {user,org,loading,isDeveloper}=useAuth();
  const [page,setPage]=useState('login'); // login | signup
  const [hash,setHash]=useState(window.location.hash||'');
  useEffect(()=>{const h=()=>setHash(window.location.hash||'');window.addEventListener('hashchange',h);return ()=>window.removeEventListener('hashchange',h);},[]);
  if(!cfgOk) return <AuthShell title="Configuração necessária" subtitle="Quase lá">
    <div style={{background:'#FEF3C7',border:'1px solid #D97706',borderRadius:10,padding:16,fontSize:13,color:'#92400E',lineHeight:1.6}}>
      Cole suas chaves do Supabase no topo do arquivo <strong>index.html</strong>, nas linhas
      <code> window.SUPABASE_URL </code> e <code> window.SUPABASE_ANON_KEY </code>. Você encontra esses valores em <strong>Supabase → Project Settings → API</strong>.</div>
  </AuthShell>;
  if(loading) return <div className="spinner"/>;
  if(!user||!org){ return page==='signup'?<SignUp go={setPage}/>:<Login go={setPage}/>; }
  // rota secreta do desenvolvedor: precisa do #dev na URL E da flag is_developer no banco
  const wantsDev = (hash||'').toLowerCase().includes('dev');
  if(wantsDev && isDeveloper) return <DeveloperPanel/>;
  return org.type==='fabricante'?<FabricanteDashboard/>:<IntegradorDashboard/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<AuthProvider><App/></AuthProvider>);
</script>
</body>
</html>
