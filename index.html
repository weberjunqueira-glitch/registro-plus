<style>

    --amber:#D97706;--red:#DC2626;--slate:#334155;--muted:#94A3B8;--border:#E2E8F0;--bg:#F0F4F8;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body,#root{height:100%;}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--slate);-webkit-font-smoothing:antialiased;}
  button{font-family:inherit;cursor:pointer;}
  input,select,textarea{font-family:inherit;}

  .btn:hover{opacity:.9;}.btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-ghost{background:#fff;color:var(--slate);border:1.5px solid var(--border);}
  .btn-danger{background:var(--red);color:#fff;}.btn-success{background:var(--green);color:#fff;}
  .input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;background:#fff;color:var(--slate);}
  .input:focus{outline:none;border-color:var(--blue);}
  .label{display:block;font-size:12px;font-weight:600;color:var(--slate);margin-bottom:5px;}
  .card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.07);}
  .container{max-width:1100px;margin:0 auto;padding:0 16px;}
  .grid{display:grid;gap:12px;}
  .grid-2{grid-template-columns:repeat(2,1fr);}.grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-4{grid-template-columns:repeat(4,1fr);}.grid-5{grid-template-columns:repeat(5,1fr);}
  @media(max-width:900px){.grid-4,.grid-5,.grid-3{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:600px){.grid-2,.grid-3,.grid-4,.grid-5{grid-template-columns:1fr;}.hide-mobile{display:none!important;}}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;padding:16px;z-index:1000;}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,.25);}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--navy);border-radius:50%;animation:spin .7s linear infinite;margin:40px auto;}
  @keyframes spin{to{transform:rotate(360deg);}}

const CATS = {

  {id:'email',label:'E-mail / Contato Formal',cats:['cat1','cat2','cat3']},

// ============================ BADGES ========================================
const StatusBadge = ({status}) => { const s=STATUS[status]||STATUS.pendente;
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 9px',borderRadius:99,fontSize:11,fontWeight:700,color:s.color,background:s.bg}}>
    <span style={{width:5,height:5,borderRadius:'50%',background:s.color}}/>{s.label}</span>; };
const CatBadge = ({cat}) => { const c=CATS[cat]; if(!c)return null;
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:99,fontSize:11,fontWeight:700,color:c.color,background:c.bg}}>{c.icon} {c.short}</span>; };

  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 10px',borderRadius:99,fontSize:11,fontWeight:700,color:t.color,background:t.bg,border:`1px solid ${t.border}`}}>{t.label}</span>; };

// ============================ AUTH CONTEXT ==================================
const AuthCtx = createContext(null);
const useAuth = () => useContext(AuthCtx);

function AuthProvider({children}){
  const [session,setSession]=useState(null);
  const [membership,setMembership]=useState(null);
  const [org,setOrg]=useState(null);
  const [loading,setLoading]=useState(true);

  const loadContext = useCallback(async (uid)=>{
    const {data,error}=await supabase.from('memberships').select('*, organizations(*)').eq('user_id',uid).single();
    if(error||!data){setMembership(null);setOrg(null);return;}
    setMembership({id:data.id,role:data.role,full_name:data.full_name,org_id:data.org_id});
    setOrg(data.organizations);
  },[]);

  useEffect(()=>{
    if(!supabase){setLoading(false);return;}
    supabase.auth.getSession().then(async ({data:{session}})=>{
      setSession(session); if(session?.user) await loadContext(session.user.id); setLoading(false);
    });
    const {data:{subscription}}=supabase.auth.onAuthStateChange(async (_e,session)=>{
      setSession(session); if(session?.user) await loadContext(session.user.id); else {setMembership(null);setOrg(null);}
    });
    return ()=>subscription.unsubscribe();
  },[loadContext]);

  const signUp=async ({email,password,fullName,orgType,orgName,cnpj,phone})=>
    supabase.auth.signUp({email,password,options:{data:{full_name:fullName,org_type:orgType,org_name:orgName,cnpj,phone}}});
  const signIn=async ({email,password})=>supabase.auth.signInWithPassword({email,password});
  const signOut=async ()=>{await supabase.auth.signOut();setMembership(null);setOrg(null);setSession(null);};
  const refresh=useCallback(async ()=>{if(session?.user)await loadContext(session.user.id);},[session,loadContext]);

  return <AuthCtx.Provider value={{session,user:session?.user??null,membership,org,loading,
    isFabricante:org?.type==='fabricante',isIntegrador:org?.type==='integrador',isAdmin:membership?.role==='admin',
    signUp,signIn,signOut,refresh}}>{children}</AuthCtx.Provider>;
}

// ============================ DATA LAYER ====================================

    .select('*, integrador:organizations!channel_links_integrador_id_fkey(*)').eq('fabricante_id',fabId).order('requested_at',{ascending:false});if(error)throw error;return data;},
  fetchMyFabricantes:async(intId)=>{const{data,error}=await supabase.from('channel_links')
    .select('*, fabricante:organizations!channel_links_fabricante_id_fkey(*)').eq('integrador_id',intId).order('requested_at',{ascending:false});if(error)throw error;return data;},
  searchFabricantes:async(term)=>{const{data,error}=await supabase.from('organizations')
    .select('id,name,cnpj').eq('type','fabricante').ilike('name',`%${term}%`).limit(10);if(error)throw error;return data;},
  requestLink:async(fabId,intId)=>{const{error}=await supabase.from('channel_links').insert({fabricante_id:fabId,integrador_id:intId,status:'pendente'});if(error)throw error;},
  setLinkStatus:async(id,status,uid)=>{const f={status};if(status==='aprovado'){f.approved_at=new Date().toISOString();f.approved_by=uid;}const{error}=await supabase.from('channel_links').update(f).eq('id',id);if(error)throw error;},
  setLinkTier:async(id,tier)=>{const{error}=await supabase.from('channel_links').update({tier}).eq('id',id);if(error)throw error;},
  fetchProjects:async(linkId)=>{let q=supabase.from('projects').select('*, evidences(*), project_updates(*), channel_links(integrador:organizations!channel_links_integrador_id_fkey(name))').order('registered_at',{ascending:false});if(linkId)q=q.eq('link_id',linkId);const{data,error}=await q;if(error)throw error;return data;},
  fetchProjectById:async(id)=>{const{data,error}=await supabase.from('projects').select('*, evidences(*), project_updates(*)').eq('id',id).single();if(error)throw error;return data;},
  createProject:async(p,evs,linkId,uid)=>{const{data,error}=await supabase.from('projects').insert({link_id:linkId,created_by:uid,title:p.title,category:p.category,status:'pendente',client_name:p.clientName,client_cnpj:p.clientCnpj,address:p.address,building_type:p.buildingType,stage:p.stage,estimated_qty:p.estimatedQty,products:p.products,distributor:p.distributor,notes:p.notes,expires_at:calcExpiry(p.category)}).select().single();if(error)throw error;if(evs?.length){const{error:e2}=await supabase.from('evidences').insert(evs.map(t=>({project_id:data.id,type:t})));if(e2)throw e2;}return data;},
  updateProject:async(id,f)=>{const{data,error}=await supabase.from('projects').update(f).eq('id',id).select().single();if(error)throw error;return data;},
  approveProject:async(id,disc,uid)=>D.updateProject(id,{status:'aprovado',discount_approved:disc,approved_at:new Date().toISOString(),approved_by:uid}),
  rejectProject:async(id)=>D.updateProject(id,{status:'reprovado'}),
  addUpdate:async(pid,text,aid)=>{const{error}=await supabase.from('project_updates').insert({project_id:pid,text,author_id:aid});if(error)throw error;await D.updateProject(pid,{updated_at:new Date().toISOString()});},
  fetchMembers:async(orgId)=>{const{data,error}=await supabase.from('memberships').select('*').eq('org_id',orgId).order('created_at');if(error)throw error;return data;},
  setMemberRole:async(id,role)=>{const{error}=await supabase.from('memberships').update({role}).eq('id',id);if(error)throw error;},

  changePlan:async(fabId,planId)=>{const{error}=await supabase.from('subscriptions').upsert({fabricante_id:fabId,plan_id:planId,status:'active'},{onConflict:'fabricante_id'});if(error)throw error;},
  subProjects:(cb)=>{const ch=supabase.channel('pj-rt').on('postgres_changes',{event:'*',schema:'public',table:'projects'},cb).subscribe();return ()=>supabase.removeChannel(ch);},

// ============================ AUTH SHELL / LOGIN / SIGNUP ===================
function AuthShell({title,subtitle,children}){
  return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
    <div className="card" style={{width:'100%',maxWidth:440,padding:28}}>
      <div style={{marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
          <div style={{width:38,height:38,borderRadius:9,background:'var(--navy)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🔗</div>
          <div><div style={{fontWeight:800,color:'var(--navy)',fontSize:15}}>Portal de Oportunidades</div>
          <div style={{fontSize:10,color:'var(--muted)'}}>Programa de Canal</div></div>
        </div>
        <h1 style={{fontSize:22,color:'var(--navy)'}}>{title}</h1>
        {subtitle&&<p style={{fontSize:13,color:'var(--muted)',marginTop:4}}>{subtitle}</p>}
      </div>{children}
    </div></div>;
}
const ErrBox = ({msg}) => <div style={{background:'#FEE2E2',border:'1px solid #DC2626',borderRadius:8,padding:'9px 12px',marginBottom:14,fontSize:13,color:'#7F1D1D'}}>{msg}</div>;
const trad = (m) => /Invalid login/i.test(m)?'E-mail ou senha incorretos.':/Email not confirmed/i.test(m)?'Confirme seu e-mail antes de entrar.':/already registered/i.test(m)?'Este e-mail já está cadastrado.':/at least/i.test(m)?'A senha deve ter ao menos 6 caracteres.':m;

function Login({go}){
  const {signIn}=useAuth();
  const [email,setEmail]=useState('');const[password,setPassword]=useState('');
  const [err,setErr]=useState('');const[busy,setBusy]=useState(false);
  const submit=async(e)=>{e.preventDefault();setErr('');setBusy(true);
    const {error}=await signIn({email,password});setBusy(false);if(error)setErr(trad(error.message));};
  return <AuthShell title="Entrar no Portal" subtitle="Acesse sua conta">
    <form onSubmit={submit}>
      <div style={{marginBottom:14}}><label className="label">E-mail</label>
        <input className="input" type="email" value={email} required onChange={e=>setEmail(e.target.value)} placeholder="voce@empresa.com"/></div>
      <div style={{marginBottom:18}}><label className="label">Senha</label>
        <input className="input" type="password" value={password} required onChange={e=>setPassword(e.target.value)} placeholder="••••••••"/></div>
      {err&&<ErrBox msg={err}/>}
      <button className="btn btn-primary" style={{width:'100%'}} disabled={busy}>{busy?'Entrando…':'Entrar'}</button>
    </form>
    <p style={{marginTop:18,fontSize:13,textAlign:'center',color:'var(--muted)'}}>Ainda não tem conta?{' '}
      <a onClick={()=>go('signup')} style={{color:'var(--blue)',fontWeight:700,cursor:'pointer'}}>Cadastre-se</a></p>
  </AuthShell>;
}

function SignUp({go}){
  const {signUp}=useAuth();
  const [orgType,setOrgType]=useState('');
  const [form,setForm]=useState({fullName:'',orgName:'',cnpj:'',phone:'',email:'',password:''});
  const [err,setErr]=useState('');const[done,setDone]=useState(false);const[busy,setBusy]=useState(false);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const submit=async(e)=>{e.preventDefault();setErr('');setBusy(true);
    const {error}=await signUp({...form,orgType});setBusy(false);if(error)setErr(trad(error.message));else setDone(true);};
  if(done) return <AuthShell title="Conta criada!" subtitle="Falta pouco">
    <div style={{background:'#D1FAE5',border:'1px solid #10B981',borderRadius:10,padding:16,fontSize:14,color:'#166534'}}>
      <p style={{marginBottom:8}}><strong>Sua empresa foi cadastrada e você é o administrador dela.</strong></p>
      <p style={{marginBottom:8}}>1. Confirme seu e-mail (se a confirmação estiver ativa).</p>
      {orgType==='integrador'?<p>2. Ao entrar, busque os fabricantes e solicite vínculo.</p>:<p>2. Ao entrar, aprove integradores e gerencie seu plano.</p>}
    </div>
    <button onClick={()=>go('login')} className="btn btn-primary" style={{width:'100%',marginTop:18}}>Ir para o login</button>
  </AuthShell>;
  if(!orgType) return <AuthShell title="Criar conta" subtitle="Você representa qual tipo de empresa?">
    {[['fabricante','🏭','Fabricante','Gerencio meu canal, aprovo integradores e concedo descontos.'],
      ['integrador','🔧','Integrador','Registro oportunidades junto a um ou mais fabricantes.']].map(([t,ic,tt,d])=>
      <button key={t} onClick={()=>setOrgType(t)} style={{display:'flex',alignItems:'center',gap:14,width:'100%',padding:16,borderRadius:12,border:'2px solid var(--border)',background:'#fff',marginBottom:10}}>
        <div style={{fontSize:26}}>{ic}</div><div style={{textAlign:'left'}}>
        <div style={{fontWeight:800,color:'var(--navy)',fontSize:14}}>{tt}</div>
        <div style={{fontSize:12,color:'var(--muted)'}}>{d}</div></div></button>)}
    <p style={{marginTop:16,fontSize:13,textAlign:'center',color:'var(--muted)'}}>Já tem conta?{' '}
      <a onClick={()=>go('login')} style={{color:'var(--blue)',fontWeight:700,cursor:'pointer'}}>Entrar</a></p>
  </AuthShell>;
  return <AuthShell title={`Cadastro — ${orgType==='fabricante'?'Fabricante':'Integrador'}`} subtitle="Você será o administrador da empresa.">
    <button onClick={()=>setOrgType('')} style={{background:'none',border:'none',color:'var(--blue)',fontSize:12,fontWeight:600,marginBottom:12,cursor:'pointer'}}>← trocar tipo</button>
    <form onSubmit={submit}>
      {[['Seu nome completo','fullName','text'],['Empresa (Razão Social)','orgName','text'],['CNPJ','cnpj','text'],['Telefone','phone','tel'],['E-mail','email','email'],['Senha','password','password']].map(([l,k,t])=>
        <div key={k} style={{marginBottom:12}}><label className="label">{l}</label>
          <input className="input" type={t} value={form[k]} required onChange={e=>set(k,e.target.value)} minLength={k==='password'?6:undefined}/></div>)}
      {err&&<ErrBox msg={err}/>}
      <button className="btn btn-primary" style={{width:'100%',marginTop:6}} disabled={busy}>{busy?'Enviando…':'Criar conta'}</button>
    </form>
  </AuthShell>;
}

// ============================ HEADER ========================================
function Header({tabs,active,onTab}){
  const {org,membership,signOut,isFabricante,isAdmin}=useAuth();
  return <header style={{background:'linear-gradient(135deg,#1A3C6E,#2E6CA8)',position:'sticky',top:0,zIndex:50}}>
    <div className="container" style={{display:'flex',alignItems:'center',justifyContent:'space-between',height:56}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:32,height:32,borderRadius:7,background:'rgba(255,255,255,.15)',display:'flex',alignItems:'center',justifyContent:'center'}}>{isFabricante?'🏭':'🔧'}</div>
        <div><div style={{color:'#fff',fontWeight:800,fontSize:13}}>{org?.name}</div>
          <div style={{color:'rgba(255,255,255,.6)',fontSize:9}}>{isFabricante?'Painel do Fabricante':'Painel do Integrador'}</div></div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{textAlign:'right'}} className="hide-mobile">
          <div style={{color:'#fff',fontSize:12,fontWeight:700}}>{membership?.full_name}{isAdmin&&<span style={{fontSize:9,marginLeft:5,padding:'1px 6px',borderRadius:99,background:'rgba(255,255,255,.2)'}}>admin</span>}</div>
          <div style={{color:'rgba(255,255,255,.6)',fontSize:10}}>{org?.cnpj||''}</div></div>
        <button onClick={signOut} className="btn" style={{background:'rgba(255,255,255,.15)',color:'#fff',padding:'6px 12px',fontSize:12}}>Sair</button>
      </div>
    </div>
    {tabs&&<div style={{background:'#fff',borderBottom:'1px solid var(--border)'}}>
      <div className="container" style={{display:'flex',alignItems:'center',overflowX:'auto'}}>
        {tabs.map(([id,label])=><button key={id} onClick={()=>onTab(id)} style={{padding:'12px 14px',border:'none',background:'none',
          borderBottom:`3px solid ${active===id?'var(--navy)':'transparent'}`,fontSize:12,fontWeight:active===id?700:500,
          color:active===id?'var(--navy)':'var(--muted)',whiteSpace:'nowrap'}}>{label}</button>)}
      </div></div>}
  </header>;
}

function MembersPanel({orgId,myId}){
  const [members,setMembers]=useState([]);const[loading,setLoading]=useState(true);const[busy,setBusy]=useState(false);
  const load=useCallback(async()=>{try{setMembers(await D.fetchMembers(orgId));}finally{setLoading(false);}},[orgId]);
  useEffect(()=>{load();},[load]);
  const changeRole=async(id,role)=>{setBusy(true);try{await D.setMemberRole(id,role);await load();}catch(e){alert(e.message);}finally{setBusy(false);}};
  if(loading)return <div className="spinner"/>;
  return <>
    <div style={{fontWeight:800,fontSize:17,color:'#1E293B',marginBottom:4}}>Usuários da empresa</div>
    <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>Vários usuários podem compartilhar a mesma conta da empresa.</div>
    {members.map(m=><div key={m.id} className="card" style={{padding:14,marginBottom:8}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
        <div><div style={{fontWeight:700,fontSize:14,color:'#1E293B'}}>{m.full_name}{m.id===myId&&<span style={{fontSize:11,color:'var(--muted)',marginLeft:6}}>(você)</span>}</div>
          <div style={{fontSize:11,color:'var(--muted)'}}>{m.role==='admin'?'Administrador':'Usuário'}</div></div>
        {m.id!==myId&&<select className="input" style={{width:'auto',padding:'5px 8px',fontSize:12}} value={m.role} disabled={busy} onChange={e=>changeRole(m.id,e.target.value)}>
          <option value="admin">Administrador</option><option value="member">Usuário</option></select>}
      </div></div>)}
    <div className="card" style={{padding:16,marginTop:16,background:'#F8FAFC'}}>
      <div style={{fontWeight:700,fontSize:13,color:'#1E293B',marginBottom:6}}>Convidar mais usuários</div>
      <div style={{fontSize:12,color:'var(--slate)',lineHeight:1.5}}>Peça que o colega se cadastre e, no Supabase (Table Editor → memberships), troque o org_id dele para o desta empresa. Assim toda a equipe compartilha os dados.</div>
    </div>
  </>;
}

function IntegradorDashboard(){
  const {org,membership,isAdmin}=useAuth();
  const [tab,setTab]=useState('canais');const[links,setLinks]=useState([]);const[activeLink,setActiveLink]=useState(null);
  const [projects,setProjects]=useState([]);const[loading,setLoading]=useState(true);const[showNew,setShowNew]=useState(false);const[selected,setSelected]=useState(null);
  const loadLinks=useCallback(async()=>{try{const d=await D.fetchMyFabricantes(org.id);setLinks(d);setActiveLink(cur=>cur||d.find(l=>l.status==='aprovado')||null);}catch(e){console.error(e);}},[org.id]);
  const loadProjects=useCallback(async()=>{if(!activeLink){setProjects([]);return;}try{setProjects(await D.fetchProjects(activeLink.id));}catch(e){console.error(e);}},[activeLink]);
  useEffect(()=>{(async()=>{await loadLinks();setLoading(false);})();return D.subLinks(loadLinks);},[loadLinks]);
  useEffect(()=>{loadProjects();return D.subProjects(loadProjects);},[loadProjects]);
  const activeProjects=projects.filter(p=>!['encerrado','expirado','reprovado'].includes(p.status));
  const stats={total:projects.length,aprovados:projects.filter(p=>p.status==='aprovado').length,pendentes:projects.filter(p=>p.status==='pendente').length,expirando:projects.filter(p=>p.status==='aprovado'&&daysLeft(p.expires_at)<=15).length};
  const converted=projects.filter(p=>p.status==='convertido').length;
  const closed=projects.filter(p=>['convertido','encerrado','reprovado','expirado'].includes(p.status)).length;
  const score=useMemo(()=>calcScore({converted,closed}),[converted,closed]);
  const atLimit=activeProjects.length>=MAX_ACTIVE;const tier=activeLink?.tier||'silver';
  const tabs=[['canais','🤝 Fabricantes'],['dashboard','📊 Dashboard'],['projetos','📁 Projetos'],['descontos','💰 Desconto']];
  if(isAdmin)tabs.push(['usuarios','👤 Usuários']);
  const ScoreGauge=({score})=>{const col=score>=50?'#10B981':score>=20?'#D97706':'#DC2626';
    return <div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:52,height:52,borderRadius:'50%',border:`4px solid ${col}`,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:14,fontWeight:900,color:col}}>{score}%</span></div>
      <div><div style={{fontSize:12,fontWeight:700,color:col}}>Score {score>=50?'Alto':score>=20?'Médio':'Baixo'}</div><div style={{fontSize:10,color:'var(--muted)'}}>neste canal</div></div></div>;};
  return <div style={{minHeight:'100vh'}}><Header tabs={tabs} active={tab} onTab={setTab}/>
    <main className="container" style={{padding:'18px 16px 40px'}}>
      {tab!=='canais'&&tab!=='usuarios'&&links.filter(l=>l.status==='aprovado').length>0&&
        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:16,flexWrap:'wrap'}}>
          <span style={{fontSize:12,color:'var(--muted)',fontWeight:600}}>Fabricante:</span>
          {links.filter(l=>l.status==='aprovado').map(l=><button key={l.id} onClick={()=>setActiveLink(l)} style={{padding:'6px 12px',borderRadius:8,border:'1.5px solid',borderColor:activeLink?.id===l.id?'var(--navy)':'var(--border)',background:activeLink?.id===l.id?'#EAF2FB':'#fff',fontSize:12,fontWeight:700,color:activeLink?.id===l.id?'var(--navy)':'var(--slate)'}}>🏭 {l.fabricante?.name} <span style={{fontWeight:400,color:'var(--muted)'}}>· {l.tier}</span></button>)}
        </div>}
      {loading?<div className="spinner"/>:<>
        {tab==='canais'&&<CanaisTab org={org} links={links} onChanged={loadLinks} onGo={(l)=>{setActiveLink(l);setTab('projetos');}}/>}
        {tab==='usuarios'&&<MembersPanel orgId={org.id} myId={membership.id}/>}
        {!activeLink&&['dashboard','projetos','descontos'].includes(tab)&&<Empty text="Selecione ou solicite vínculo a um fabricante na aba Fabricantes."/>}
        {activeLink&&tab==='dashboard'&&<>
          <div className="grid grid-2" style={{marginBottom:14}}>
            <div className="card" style={{padding:16}}><div style={{fontWeight:700,fontSize:12,color:'#1E293B',marginBottom:10}}>Score de Conversão</div><ScoreGauge score={score}/></div>
            <div className="card" style={{padding:16}}><div style={{fontWeight:700,fontSize:12,color:'#1E293B',marginBottom:10}}>Seu nível neste canal</div><TierBadge tier={tier}/></div></div>
          <div className="grid grid-4" style={{marginBottom:14}}>
            {[['Total','📁',stats.total,'#1A3C6E'],['Aprovados','✅',stats.aprovados,'#10B981'],['Pendentes','⏳',stats.pendentes,'#D97706'],['Expirando','🔔',stats.expirando,'#8B5CF6']].map(([l,ic,v,co])=>
              <div key={l} className="card" style={{padding:'11px 13px'}}><div style={{fontSize:22,fontWeight:800,color:co}}>{v}</div><div style={{fontSize:10,color:'var(--muted)',marginTop:1}}>{ic} {l}</div></div>)}</div>
          <div style={{fontWeight:700,fontSize:13,color:'#1E293B',marginBottom:8}}>Projetos Recentes</div>
          {projects.slice(0,5).map(p=><ProjectRow key={p.id} p={p} onSelect={setSelected}/>)}
          {projects.length===0&&<Empty text="Nenhum projeto neste canal ainda."/>}</>}
        {activeLink&&tab==='projetos'&&<>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}}>
            <div style={{fontSize:12,color:'var(--muted)'}}>{activeProjects.length}/{MAX_ACTIVE} ativos neste canal</div>
            <button className="btn btn-primary" disabled={atLimit} onClick={()=>setShowNew(true)}>+ Novo Registro</button></div>
          <ProjectsTab projects={projects} onSelect={setSelected}/></>}
        {activeLink&&tab==='descontos'&&<>
          <div style={{background:'#FEF3C7',border:'1px solid #D97706',borderRadius:9,padding:'10px 14px',marginBottom:14,fontSize:12,color:'#92400E'}}>⚠️ Desconto por volume é exclusivo de Distribuidores. Para Integradores, o único desconto é o de registro, negociado direto com o fabricante.</div>
          <div className="card" style={{overflow:'hidden'}}><div style={{background:'var(--navy)',padding:'10px 16px',fontWeight:700,fontSize:13,color:'#fff'}}>💰 Desconto neste canal ({activeLink.fabricante?.name}) · tier {tier}</div>
            <div style={{padding:14}}>{Object.entries(CATS).map(([k,c])=><div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid #F1F5F9'}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontSize:16}}>{c.icon}</span><div><div style={{fontWeight:700,fontSize:12,color:c.color}}>{c.label}</div><div style={{fontSize:10,color:'var(--muted)'}}>{c.cycle}</div></div></div>
              <div style={{fontSize:18,fontWeight:900,color:c.color}}>{c.discounts[tier]}</div></div>)}</div></div></>}
      </>}
    </main>
    {showNew&&activeLink&&<NewProjectModal onClose={()=>setShowNew(false)} onCreated={()=>{setShowNew(false);loadProjects();}} tier={tier} linkId={activeLink.id} userId={membership.id} activeCount={activeProjects.length}/>}
    {selected&&<ProjectDetailModal project={selected} onClose={()=>setSelected(null)} onChanged={loadProjects} isFabricante={false} currentUserId={membership.id}/>}
  </div>;
}
function ProjectsTab({projects,onSelect}){const[cat,setCat]=useState('todas');const[status,setStatus]=useState('todos');
  const f=projects.filter(p=>(cat==='todas'||p.category===cat)&&(status==='todos'||p.status===status));
  return <><div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:14}}>
    {[['todas','Todas'],['cat1','CAT 1'],['cat2','CAT 2'],['cat3','CAT 3']].map(([k,l])=><Filter key={k} active={cat===k} onClick={()=>setCat(k)}>{l}</Filter>)}
    <span style={{color:'var(--border)'}}>|</span>
    {[['todos','Todos'],['pendente','Pendente'],['aprovado','Aprovado'],['conflito','Conflito']].map(([k,l])=><Filter key={k} active={status===k} onClick={()=>setStatus(k)}>{l}</Filter>)}</div>
    {f.map(p=><ProjectRow key={p.id} p={p} onSelect={onSelect}/>)}{f.length===0&&<Empty text="Nenhum projeto encontrado."/>}</>;}
function CanaisTab({org,links,onChanged,onGo}){
  const [term,setTerm]=useState('');const[results,setResults]=useState([]);const[busy,setBusy]=useState(false);
  const linkedIds=new Set(links.map(l=>l.fabricante_id));
  const doSearch=async()=>{if(!term.trim())return;setBusy(true);try{setResults(await D.searchFabricantes(term.trim()));}catch(e){alert(e.message);}finally{setBusy(false);}};
  const ask=async(id)=>{setBusy(true);try{await D.requestLink(id,org.id);await onChanged();setResults([]);setTerm('');}catch(e){alert(e.message);}finally{setBusy(false);}};
  return <><div className="card" style={{padding:16,marginBottom:16}}>
    <div style={{fontWeight:700,fontSize:13,color:'#1E293B',marginBottom:8}}>Solicitar vínculo a um fabricante</div>
    <div style={{fontSize:12,color:'var(--muted)',marginBottom:10}}>Você pode trabalhar com vários fabricantes. Busque e solicite acesso; o fabricante aprova.</div>
    <div style={{display:'flex',gap:8}}><input className="input" value={term} onChange={e=>setTerm(e.target.value)} placeholder="Nome do fabricante" onKeyDown={e=>e.key==='Enter'&&doSearch()}/>
      <button className="btn btn-primary" onClick={doSearch} disabled={busy}>Buscar</button></div>
    {results.map(f=><div key={f.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid #F1F5F9'}}>
      <div><div style={{fontWeight:600,fontSize:13}}>{f.name}</div><div style={{fontSize:11,color:'var(--muted)'}}>{f.cnpj||''}</div></div>
      {linkedIds.has(f.id)?<span style={{fontSize:11,color:'var(--muted)'}}>já vinculado</span>:<button className="btn btn-ghost" style={{fontSize:12}} disabled={busy} onClick={()=>ask(f.id)}>Solicitar</button>}</div>)}
  </div>
  <div style={{fontWeight:700,fontSize:13,color:'#1E293B',marginBottom:8}}>Meus fabricantes</div>
  {links.length===0&&<Empty text="Você ainda não está vinculado a nenhum fabricante."/>}
  {links.map(l=><div key={l.id} className="card" style={{padding:14,marginBottom:8}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
      <div><div style={{display:'flex',alignItems:'center',gap:8}}><span style={{fontWeight:700,fontSize:14}}>🏭 {l.fabricante?.name}</span><StatusBadge status={l.status}/>{l.status==='aprovado'&&<TierBadge tier={l.tier}/>}</div>
        <div style={{fontSize:11,color:'var(--muted)'}}>{l.fabricante?.cnpj||''}</div></div>
      {l.status==='aprovado'&&<button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>onGo(l)}>Ver projetos →</button>}
      {l.status==='pendente'&&<span style={{fontSize:12,color:'#D97706'}}>Aguardando aprovação</span>}</div></div>)}</>;}

// ============================ FABRICANTE DASHBOARD =========================
function FabricanteDashboard(){
  const {org,membership,isAdmin}=useAuth();
  const [tab,setTab]=useState('pipeline');const[projects,setProjects]=useState([]);const[ints,setInts]=useState([]);
  const [sub,setSub]=useState(null);const[plans,setPlans]=useState([]);const[loading,setLoading]=useState(true);const[selected,setSelected]=useState(null);
  const load=useCallback(async()=>{try{const[pj,ii,s,pl]=await Promise.all([D.fetchProjects(),D.fetchChannelIntegrators(org.id),D.fetchSubscription(org.id),D.fetchPlans()]);setProjects(pj);setInts(ii);setSub(s);setPlans(pl);}catch(e){console.error(e);}finally{setLoading(false);}},[org.id]);
  useEffect(()=>{load();const u1=D.subProjects(load);const u2=D.subLinks(load);return ()=>{u1();u2();};},[load]);
  const pend=ints.filter(i=>i.status==='pendente');const active=ints.filter(i=>i.status==='aprovado');
  const limit=sub?.plans?.max_integrators??0;
  const stats={total:projects.length,pendentes:projects.filter(p=>p.status==='pendente').length,aprovados:projects.filter(p=>p.status==='aprovado').length,conflitos:projects.filter(p=>p.status==='conflito').length,expirando:projects.filter(p=>p.status==='aprovado'&&daysLeft(p.expires_at)<=15).length};
  const tabs=[['pipeline','📊 Pipeline'],['projetos','📁 Projetos'],['integradores',`🔧 Integradores${pend.length?` (${pend.length})`:''}`]];
  if(isAdmin){tabs.push(['plano','💳 Plano']);tabs.push(['usuarios','👤 Usuários']);}
  return <div style={{minHeight:'100vh'}}><Header tabs={tabs} active={tab} onTab={setTab}/>
    <main className="container" style={{padding:'18px 16px 40px'}}>
      {loading?<div className="spinner"/>:<>
        {tab==='pipeline'&&<><div className="card" style={{padding:14,marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
          <div><div style={{fontSize:12,color:'var(--muted)'}}>Integradores ativos no seu canal</div><div style={{fontSize:22,fontWeight:800,color:active.length>=limit?'#DC2626':'#1A3C6E'}}>{active.length} / {limit}</div></div>
          {active.length>=limit&&<div style={{fontSize:12,color:'#DC2626',fontWeight:600}}>Limite do plano atingido.</div>}</div>
          <div className="grid grid-5" style={{marginBottom:16}}>
            {[['Total','📁',stats.total,'#1A3C6E'],['A aprovar','⏳',stats.pendentes,'#D97706'],['Aprovados','✅',stats.aprovados,'#10B981'],['Conflitos','⚠️',stats.conflitos,'#DC2626'],['Expirando','🔔',stats.expirando,'#8B5CF6']].map(([l,ic,v,co])=>
              <div key={l} className="card" style={{padding:'11px 13px'}}><div style={{fontSize:22,fontWeight:800,color:co}}>{v}</div><div style={{fontSize:10,color:'var(--muted)',marginTop:1}}>{ic} {l}</div></div>)}</div>
          {pend.length>0&&<div style={{background:'#FEF3C7',border:'1px solid #D97706',borderRadius:9,padding:'10px 14px',marginBottom:14,fontSize:12,color:'#92400E'}}>🔧 {pend.length} integrador(es) aguardando aprovação.</div>}
          <div style={{fontWeight:700,fontSize:13,color:'#1E293B',marginBottom:8}}>Registros aguardando análise ({stats.pendentes})</div>
          {projects.filter(p=>p.status==='pendente').length===0?<div style={{textAlign:'center',padding:30,color:'var(--muted)',fontSize:13}}>Nenhum registro pendente. ✅</div>:projects.filter(p=>p.status==='pendente').map(p=><ProjectRow key={p.id} p={p} onSelect={setSelected} showInt/>)}</>}
        {tab==='projetos'&&<FabProjects projects={projects} onSelect={setSelected}/>}
        {tab==='integradores'&&<FabInts ints={ints} active={active.length} limit={limit} uid={membership.id} onChanged={load} onUpgrade={()=>setTab('plano')}/>}
        {tab==='plano'&&isAdmin&&<FabPlano sub={sub} plans={plans} active={active.length} orgId={org.id} onChanged={load}/>}
        {tab==='usuarios'&&isAdmin&&<MembersPanel orgId={org.id} myId={membership.id}/>}
      </>}
    </main>
    {selected&&<ProjectDetailModal project={selected} onClose={()=>setSelected(null)} onChanged={load} isFabricante={true} currentUserId={membership.id}/>}
  </div>;
}
function FabProjects({projects,onSelect}){const[status,setStatus]=useState('todos');const f=projects.filter(p=>status==='todos'||p.status===status);
  return <><div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:14}}>
    {[['todos','Todos'],['pendente','Pendentes'],['aprovado','Aprovados'],['conflito','Conflitos'],['convertido','Convertidos'],['reprovado','Reprovados']].map(([k,l])=><Filter key={k} active={status===k} onClick={()=>setStatus(k)}>{l}</Filter>)}</div>
    {f.map(p=><ProjectRow key={p.id} p={p} onSelect={onSelect} showInt/>)}{f.length===0&&<Empty text="Nenhum projeto."/>}</>;}
function FabInts({ints,active,limit,uid,onChanged,onUpgrade}){const[busy,setBusy]=useState(false);
  const act=async(fn)=>{setBusy(true);try{await fn();await onChanged();}catch(e){alert(e.message);}finally{setBusy(false);}};
  const pend=ints.filter(i=>i.status==='pendente');const others=ints.filter(i=>i.status!=='pendente');const full=active>=limit;
  return <><div className="card" style={{padding:12,marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
    <div style={{fontSize:12,color:'var(--muted)'}}>Integradores ativos: <strong style={{color:full?'#DC2626':'#1A3C6E'}}>{active} / {limit}</strong></div>
    {full&&<button className="btn btn-primary" style={{fontSize:12}} onClick={onUpgrade}>Fazer upgrade</button>}</div>
    {pend.length>0&&<><div style={{fontWeight:700,fontSize:13,color:'#92400E',marginBottom:8}}>Solicitações de vínculo ({pend.length})</div>
      {pend.map(i=><div key={i.id} className="card" style={{padding:14,marginBottom:8,borderLeft:'4px solid #D97706'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:10}}>
          <div><div style={{fontWeight:700,fontSize:14}}>{i.integrador?.name}</div><div style={{fontSize:11,color:'var(--muted)'}}>{i.integrador?.cnpj||'CNPJ não informado'}</div></div>
          <div style={{display:'flex',gap:8}}><button className="btn btn-success" style={{fontSize:12}} disabled={busy||full} onClick={()=>act(()=>D.setLinkStatus(i.id,'aprovado',uid))}>Aprovar</button>
            <button className="btn btn-danger" style={{fontSize:12}} disabled={busy} onClick={()=>act(()=>D.setLinkStatus(i.id,'rejeitado',uid))}>Rejeitar</button></div></div>
        {full&&<div style={{fontSize:11,color:'#DC2626',marginTop:6}}>Limite do plano atingido — faça upgrade.</div>}</div>)}</>}
    <div style={{fontWeight:700,fontSize:13,color:'#1E293B',margin:'16px 0 8px'}}>Integradores do canal ({others.length})</div>
    {others.map(i=><div key={i.id} className="card" style={{padding:14,marginBottom:8}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:10}}>
        <div><div style={{display:'flex',alignItems:'center',gap:8,marginBottom:2}}><span style={{fontWeight:700,fontSize:14}}>{i.integrador?.name}</span><TierBadge tier={i.tier}/><StatusBadge status={i.status}/></div>
          <div style={{fontSize:11,color:'var(--muted)'}}>{i.integrador?.cnpj||'—'}</div></div>
        <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
          <select className="input" style={{width:'auto',padding:'5px 8px',fontSize:12}} value={i.tier} disabled={busy} onChange={e=>act(()=>D.setLinkTier(i.id,e.target.value))}>
            {Object.keys(TIERS).map(t=><option key={t} value={t}>{TIERS[t].label}</option>)}</select>
          {i.status==='aprovado'?<button className="btn btn-ghost" style={{fontSize:12}} disabled={busy} onClick={()=>act(()=>D.setLinkStatus(i.id,'suspenso',uid))}>Suspender</button>
            :<button className="btn btn-success" style={{fontSize:12}} disabled={busy||full} onClick={()=>act(()=>D.setLinkStatus(i.id,'aprovado',uid))}>Reativar</button>}</div></div></div>)}
    {others.length===0&&pend.length===0&&<div style={{textAlign:'center',padding:30,color:'var(--muted)',fontSize:13}}>Nenhum integrador ainda. Eles solicitam vínculo buscando sua empresa.</div>}</>;}
function FabPlano({sub,plans,active,orgId,onChanged}){const[busy,setBusy]=useState(false);const cur=sub?.plan_id;
  const pick=async(id)=>{setBusy(true);try{await D.changePlan(orgId,id);await onChanged();}catch(e){alert(e.message);}finally{setBusy(false);}};
  return <><div style={{fontWeight:800,fontSize:17,color:'#1E293B',marginBottom:4}}>Plano e assinatura</div>
    <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>Você paga pela quantidade de integradores ativos. Atualmente: <strong>{active}</strong> ativos.</div>
    <div className="grid grid-3">{plans.map(p=>{const isCur=p.id===cur;const small=active>p.max_integrators;
      return <div key={p.id} className="card" style={{padding:18,border:isCur?'2px solid var(--navy)':'1px solid var(--border)'}}>
        <div style={{fontWeight:800,fontSize:16,color:'var(--navy)'}}>{p.name}</div>
        <div style={{fontSize:26,fontWeight:900,color:'#1E293B',margin:'8px 0'}}>R$ {(p.price_cents/100).toLocaleString('pt-BR',{minimumFractionDigits:2})}<span style={{fontSize:12,color:'var(--muted)',fontWeight:400}}>/mês</span></div>
        <div style={{fontSize:13,color:'var(--slate)',marginBottom:14}}>Até <strong>{p.max_integrators}</strong> integradores ativos</div>
        {isCur?<button className="btn btn-ghost" style={{width:'100%'}} disabled>Plano atual</button>
          :<button className="btn btn-primary" style={{width:'100%'}} disabled={busy||small} onClick={()=>pick(p.id)}>{small?'Indisponível':'Escolher'}</button>}</div>;})}</div>
    <div style={{fontSize:11,color:'var(--muted)',marginTop:14}}>A cobrança real é processada fora do app. Aqui controlamos o plano e o limite.</div></>;}

// ============================ APP ROOT ======================================
function App(){
  const {user,org,loading}=useAuth();
  const [page,setPage]=useState('login'); // login | signup
  if(!cfgOk) return <AuthShell title="Configuração necessária" subtitle="Quase lá">
    <div style={{background:'#FEF3C7',border:'1px solid #D97706',borderRadius:10,padding:16,fontSize:13,color:'#92400E',lineHeight:1.6}}>
      Cole suas chaves do Supabase no topo do arquivo <strong>index.html</strong>, nas linhas
      <code> window.SUPABASE_URL </code> e <code> window.SUPABASE_ANON_KEY </code>. Você encontra esses valores em <strong>Supabase → Project Settings → API</strong>.</div>
  </AuthShell>;
  if(loading) return <div className="spinner"/>;
  if(!user||!org){ return page==='signup'?<SignUp go={setPage}/>:<Login go={setPage}/>; }
  return org.type==='fabricante'?<FabricanteDashboard/>:<IntegradorDashboard/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<AuthProvider><App/></AuthProvider>);
</script>
</body>
</html>
