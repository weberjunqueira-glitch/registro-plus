  :root{--navy:#1A3C6E;--blue:#2E6CA8;--sky:#4A9FD4;--teal:#0D9488;--green:#10B981;
    --amber:#D97706;--red:#DC2626;--slate:#334155;--muted:#94A3B8;--border:#E2E8F0;--bg:#F0F4F8;}
  *{box-sizing:border-box;margin:0;padding:0;}

  .btn:hover{opacity:.9;}.btn:disabled{opacity:.5;cursor:not-allowed;}
  .btn-primary{background:var(--navy);color:#fff;}
  .btn-ghost{background:#fff;color:var(--slate);border:1.5px solid var(--border);}
  .btn-danger{background:var(--red);color:#fff;}.btn-success{background:var(--green);color:#fff;}
  .input{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-size:14px;background:#fff;color:var(--slate);}
  .input:focus{outline:none;border-color:var(--blue);}

<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useMemo, useRef, createContext, useContext } = React;

// ============================ CONFIG / SUPABASE =============================
const cfgOk = window.SUPABASE_URL && !window.SUPABASE_URL.includes("COLE_AQUI")
           && window.SUPABASE_ANON_KEY && !window.SUPABASE_ANON_KEY.includes("COLE_AQUI");
const sb = cfgOk
  ? window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY,
      { auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:true } })
  : null;

// ============================ CONSTANTES (politica v6) ======================
const MAX_ACTIVE = 20;
const CATS = {
  cat1:{label:'CAT 1 — Especificação',short:'CAT 1',cycle:'> 12 meses',color:'#0D9488',bg:'#E8F8F5',validityDays:180,icon:'🏗️',
    stages:['Identificação da Oportunidade','Especificação Técnica','Projeto Executivo','Aprovação de Financiamento/Licitação'],
    discounts:{silver:'Até 5%',gold:'Até 8%',platinum:'Até 12%'}},
  cat2:{label:'CAT 2 — Projeto Ativo',short:'CAT 2',cycle:'6 a 12 meses',color:'#2E6CA8',bg:'#EAF2FB',validityDays:120,icon:'📋',
    stages:['Cotação','Aprovação Interna do Cliente','Negociação de Fornecimento'],
    discounts:{silver:'Até 8%',gold:'Até 12%',platinum:'Até 15%'}},
  cat3:{label:'CAT 3 — Venda Ativa',short:'CAT 3',cycle:'3 a 6 meses',color:'#10B981',bg:'#ECFDF5',validityDays:90,icon:'🚀',
    stages:['Aprovação Confirmada pelo Cliente','Pedido Iminente (< 30 dias)','Aguardando Emissão de Pedido'],
    discounts:{silver:'Até 10%',gold:'Até 15%',platinum:'Até 18%'}},
};
const TIERS = {
  silver:{label:'🥉 Silver',color:'#64748B',bg:'#F1F5F9',border:'#CBD5E1'},
  gold:{label:'🥈 Gold',color:'#B45309',bg:'#FEF3C7',border:'#FCD34D'},
  platinum:{label:'🥇 Platinum',color:'#4338CA',bg:'#EDE9FE',border:'#A5B4FC'},
};
const STATUS = {
  pendente:{label:'Pendente',color:'#D97706',bg:'#FEF3C7'},
  aprovado:{label:'Aprovado',color:'#059669',bg:'#D1FAE5'},
  rejeitado:{label:'Rejeitado',color:'#DC2626',bg:'#FEE2E2'},
  reprovado:{label:'Reprovado',color:'#DC2626',bg:'#FEE2E2'},
  suspenso:{label:'Suspenso',color:'#DC2626',bg:'#FEE2E2'},
  conflito:{label:'Conflito',color:'#DC2626',bg:'#FEE2E2'},
  convertido:{label:'Convertido',color:'#4338CA',bg:'#EDE9FE'},
  encerrado:{label:'Encerrado',color:'#64748B',bg:'#F1F5F9'},
  expirado:{label:'Expirado',color:'#991B1B',bg:'#FEE2E2'},
};
const EVIDENCE_TYPES = [
  {id:'visita',label:'Visita Técnica Documentada',cats:['cat1','cat2','cat3']},
  {id:'email',label:'E-mail / Contato Formal',cats:['cat1','cat2','cat3']},
  {id:'projetista',label:'Indicação do Projetista',cats:['cat1','cat2','cat3']},
  {id:'proposta',label:'Proposta Técnica Entregue',cats:['cat2','cat3'],mandatoryFor:['cat2','cat3']},
];
const BUILDING_TYPES = ['Hotel','Prédio Comercial','Galpão / Logística','Shopping Center','Hospital / Clínica','Escola / Universidade','Condomínio','Governo / Público','Outro'];
const SISTEMAS = {
  cftv:{label:'CFTV',icon:'📹',itens:[{key:'cameras',label:'Câmeras'},{key:'gravadores',label:'Gravadores (NVR/DVR)'}],
    marcas:['Hikvision','Intelbras','Dahua','Axis','Bosch','Hanwha','Outro']},
  incendio:{label:'Detecção de Incêndio',icon:'🔥',itens:[{key:'paineis',label:'Painéis'},{key:'dispositivos',label:'Dispositivos (detectores/acionadores)'}],
    marcas:['Notifier','Morley','Silent Knight','Farenhyt','Xtralis (Vesda e/ou OSID)','LionTamer','ESSER','Outro']},
  acesso:{label:'Controle de Acesso',icon:'🚪',itens:[{key:'portas',label:'Portas'},{key:'leitoras',label:'Leitoras'},{key:'catracas',label:'Catracas'}],
    marcas:['HID','Control iD','Intelbras','Nice/Linear','ZKTeco','Honeywell','Outro']},
  automacao:{label:'Automação',icon:'⚙️',itens:[{key:'controladores',label:'Controladores'},{key:'sensores',label:'Sensores'},{key:'valvulas',label:'Válvulas'}],
    marcas:['KNX','Crestron','Control4','Lutron','Savant','Outro']},
  fechaduras:{label:'Fechaduras',icon:'🔐',itens:[{key:'fechaduras',label:'Fechaduras'},{key:'controladoras',label:'Controladoras'}],
    marcas:['Outro']},
};
const TIPOS_ATUALIZACAO = ['Reunião','Visita','Nova documentação/proposta','Revisão documentação/proposta'];
const BENEFICIOS = {
  silver:['Registro de até 20 projetos ativos','Descontos de registro (CAT1 5% · CAT2 8% · CAT3 10%)','Suporte comercial padrão','Acesso ao portal de oportunidades'],
  gold:['Tudo do Silver','Descontos maiores (CAT1 8% · CAT2 12% · CAT3 15%)','Prioridade na análise de registros','Apoio em especificação técnica'],
  platinum:['Tudo do Gold','Maiores descontos (CAT1 12% · CAT2 15% · CAT3 18%)','Gerente de canal dedicado','Participação em treinamentos e lançamentos','Leads qualificados repassados pelo fabricante'],
};
const calcScore = ({converted=0,closed=0}) => closed>0 ? Math.round((converted/closed)*100) : 0;
const daysLeft = d => Math.ceil((new Date(d)-new Date())/86400000);
const calcExpiry = c => new Date(Date.now()+CATS[c].validityDays*86400000).toISOString();

// ============================ BADGES ========================================
const StatusBadge = ({status}) => { const s=STATUS[status]||STATUS.pendente;
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 9px',borderRadius:99,fontSize:11,fontWeight:700,color:s.color,background:s.bg}}>
    <span style={{width:5,height:5,borderRadius:'50%',background:s.color}}/>{s.label}</span>; };
const CatBadge = ({cat}) => { const c=CATS[cat]; if(!c)return null;
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:99,fontSize:11,fontWeight:700,color:c.color,background:c.bg}}>{c.icon} {c.short}</span>; };
const TierBadge = ({tier}) => { const t=TIERS[tier]; if(!t)return null;
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 10px',borderRadius:99,fontSize:11,fontWeight:700,color:t.color,background:t.bg,border:`1px solid ${t.border}`}}>{t.label}</span>; };

// ============================ AUTH CONTEXT ==================================
const AuthCtx = createContext(null);
const useAuth = () => useContext(AuthCtx);

function AuthProvider({children}){
  const [session,setSession]=useState(null);
  const [membership,setMembership]=useState(null);
  const [org,setOrg]=useState(null);
  const [loading,setLoading]=useState(true);

  const loadContext = useCallback(async (uid)=>{
    const {data,error}=await sb.from('memberships').select('*, organizations(*)').eq('user_id',uid).single();
    if(error||!data){setMembership(null);setOrg(null);return;}
    setMembership({id:data.id,role:data.role,full_name:data.full_name,org_id:data.org_id,is_developer:!!data.is_developer,onboarded:!!data.onboarded});
    setOrg(data.organizations);
    window.__ACTOR={id:uid,name:data.full_name,org_id:data.org_id};window.__IS_DEV=!!data.is_developer;
    // registra acesso (1x por sessão do navegador)
    try{const k='__acesso_'+uid;if(!sessionStorage.getItem(k)){sessionStorage.setItem(k,'1');sb.from('access_log').insert({user_id:uid,user_name:data.full_name,org_id:data.org_id,org_name:data.organizations?.name}).then(()=>{}).catch(()=>{});}}catch(e){}
  },[]);

  useEffect(()=>{
    if(!sb){setLoading(false);return;}
    sb.auth.getSession().then(async ({data:{session}})=>{
      setSession(session); if(session?.user) await loadContext(session.user.id); setLoading(false);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange(async (_e,session)=>{
      setSession(session); if(session?.user) await loadContext(session.user.id); else {setMembership(null);setOrg(null);}
    });
    return ()=>subscription.unsubscribe();
  },[loadContext]);

  const signUp=async ({email,password,fullName,orgType,orgName,cnpj,phone,marcas})=>
    sb.auth.signUp({email,password,options:{data:{full_name:fullName,org_type:orgType,org_name:orgName,cnpj,phone,marcas:marcas||{}}}});
  const signIn=async ({email,password})=>sb.auth.signInWithPassword({email,password});
  const signOut=async ()=>{await sb.auth.signOut();setMembership(null);setOrg(null);setSession(null);window.__ACTOR={id:null,name:null,org_id:null};};
  const resetPasswordEmail=async (email)=>sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.href.split('#')[0]});
  const refresh=useCallback(async ()=>{if(session?.user)await loadContext(session.user.id);},[session,loadContext]);

  return <AuthCtx.Provider value={{session,user:session?.user??null,membership,org,loading,
    isFabricante:org?.type==='fabricante',isIntegrador:org?.type==='integrador',isAdmin:membership?.role==='admin',isDeveloper:!!membership?.is_developer,
    role:membership?.role||'member',
    can:{
      // o que cada papel pode fazer
      verAdmin:membership?.role==='admin',                                  // usuários
      verFinanceiro:['admin','financeiro'].includes(membership?.role),      // faturas/plano
      editarProjetos:['admin','member','comercial'].includes(membership?.role), // criar/gerenciar/aprovar
      somenteLeitura:membership?.role==='leitura',
    },
    signUp,signIn,signOut,refresh,resetPasswordEmail}}>{children}</AuthCtx.Provider>;
}

// ============================ DATA LAYER ====================================
// ator atual para auditoria (preenchido pelo AuthProvider)
window.__ACTOR = { id:null, name:null, org_id:null };
const D = {
  audit:async(action,entity,entityId,summary,orgId)=>{
    try{ await sb.from('audit_log').insert({
      org_id: orgId || window.__ACTOR.org_id || null,
      actor_id: window.__ACTOR.id || null,
      actor_name: window.__ACTOR.name || null,
      action, entity, entity_id: entityId!=null?String(entityId):null, summary
    }); }catch(e){ console.error('audit',e); }
  },
  notify:async(orgId,title,body,icon,linkTab)=>{try{await sb.from('notifications').insert({org_id:orgId,title,body,icon:icon||'🔔',link_tab:linkTab});}catch(e){console.error('notify',e);}},
  globalSearch:async(termo)=>{
    const t=(termo||'').trim();if(t.length<2)return {projetos:[],integradores:[]};
    const res={projetos:[],integradores:[]};
    try{const{data}=await sb.from('projects').select('id,title,client_name,client_cnpj,status,category,link_id,channel_links(integrador:organizations!channel_links_integrador_id_fkey(name))').or('title.ilike.%'+t+'%,client_name.ilike.%'+t+'%,client_cnpj.ilike.%'+t+'%').limit(20);res.projetos=data||[];}catch(e){console.error(e);}
    try{const{data}=await sb.from('channel_links').select('id,status,tier,integrador:organizations!channel_links_integrador_id_fkey(name,cnpj)').limit(50);res.integradores=(data||[]).filter(l=>{const n=l.integrador?.name||'',c=l.integrador?.cnpj||'';return (n+' '+c).toLowerCase().includes(t.toLowerCase());}).slice(0,20);}catch(e){console.error(e);}
    return res;
  },
  fetchTemplates:async(orgId)=>{const{data,error}=await sb.from('project_templates').select('*').eq('org_id',orgId).order('created_at',{ascending:false});if(error)throw error;return data||[];},
  saveTemplate:async(orgId,name,data)=>{const{error}=await sb.from('project_templates').insert({org_id:orgId,name,data});if(error)throw error;},
  deleteTemplate:async(id)=>{const{error}=await sb.from('project_templates').delete().eq('id',id);if(error)throw error;},
  setMeta:async(linkId,meta)=>{const{error}=await sb.from('channel_links').update(meta).eq('id',linkId);if(error)throw error;},
  descontosAnteriores:async(linkId,cnpj,excludeId)=>{
    if(!cnpj)return [];
    try{
      const{data:lk}=await sb.from('channel_links').select('fabricante_id').eq('id',linkId).single();
      if(!lk?.fabricante_id)return [];
      const{data:links}=await sb.from('channel_links').select('id').eq('fabricante_id',lk.fabricante_id);
      const ids=(links||[]).map(l=>l.id);if(!ids.length)return [];
      const{data}=await sb.from('projects').select('id,title,descontos_sistema,approved_at,status').in('link_id',ids).eq('client_cnpj',cnpj).eq('status','aprovado');
      return (data||[]).filter(p=>p.id!==excludeId&&p.descontos_sistema&&Object.values(p.descontos_sistema).some(v=>v));
    }catch(e){console.error(e);return [];}
  },
  fetchComments:async(pid)=>{const{data,error}=await sb.from('project_comments').select('*').eq('project_id',pid).order('created_at');if(error)throw error;return data||[];},
  addComment:async(pid,body,side)=>{const a=window.__ACTOR||{};const{error}=await sb.from('project_comments').insert({project_id:pid,author_id:a.id,author_name:a.name,author_side:side,body});if(error)throw error;},
  subComments:(pid,cb)=>{const ch=sb.channel('pc-'+pid).on('postgres_changes',{event:'INSERT',schema:'public',table:'project_comments',filter:'project_id=eq.'+pid},cb).subscribe();return ()=>sb.removeChannel(ch);},
  fetchNotifications:async(orgId)=>{const{data,error}=await sb.from('notifications').select('*').eq('org_id',orgId).order('created_at',{ascending:false}).limit(50);if(error)throw error;return data;},
  markNotifRead:async(id)=>{await sb.from('notifications').update({read:true}).eq('id',id);},
  markAllNotifRead:async(orgId)=>{await sb.from('notifications').update({read:true}).eq('org_id',orgId).eq('read',false);},
  subNotifications:(orgId,cb)=>{const ch=sb.channel('notif-'+orgId).on('postgres_changes',{event:'INSERT',schema:'public',table:'notifications',filter:'org_id=eq.'+orgId},cb).subscribe();return ()=>sb.removeChannel(ch);},
  fetchAuditLog:async(orgId)=>{const{data,error}=await sb.from('audit_log').select('*').eq('org_id',orgId).order('created_at',{ascending:false}).limit(300);if(error)throw error;return data;},
  fetchChannelIntegrators:async(fabId)=>{const{data,error}=await sb.from('channel_links')
    .select('*, integrador:organizations!channel_links_integrador_id_fkey(*)').eq('fabricante_id',fabId).order('requested_at',{ascending:false});if(error)throw error;return data;},
  fetchMyFabricantes:async(intId)=>{const{data,error}=await sb.from('channel_links')
    .select('*, fabricante:organizations!channel_links_fabricante_id_fkey(*)').eq('integrador_id',intId).order('requested_at',{ascending:false});if(error)throw error;return data;},
  listAllFabricantes:async()=>{const{data,error}=await sb.from('organizations').select('id,name,cnpj,logo_path').eq('type','fabricante').order('name');if(error)throw error;return data;},
  searchFabricantes:async(term)=>{const{data,error}=await sb.from('organizations')
    .select('id,name,cnpj').eq('type','fabricante').ilike('name',`%${term}%`).limit(10);if(error)throw error;return data;},
  requestLink:async(fabId,intId,intNome)=>{const{error}=await sb.from('channel_links').insert({fabricante_id:fabId,integrador_id:intId,status:'pendente'});if(error)throw error;await D.notify(fabId,'Nova solicitação de vínculo',(intNome||'Um integrador')+' solicitou vínculo ao seu canal.','🤝','integradores');},
  setLinkStatus:async(id,status,nome,antes)=>{const f={status};if(status==='aprovado'){f.approved_at=new Date().toISOString();}const{error}=await sb.from('channel_links').update(f).eq('id',id);if(error)throw error;const STL={pendente:'Pendente',aprovado:'Aprovado',rejeitado:'Rejeitado',suspenso:'Suspenso'};await D.audit('integrador.status','vinculo',id,'Integrador '+(nome||'')+(antes?' — status: '+(STL[antes]||antes)+' → '+(STL[status]||status):' → '+(STL[status]||status)));try{const{data:lk}=await sb.from('channel_links').select('integrador_id, fabricante:organizations!channel_links_fabricante_id_fkey(name)').eq('id',id).single();if(lk?.integrador_id){const fn=lk.fabricante?.name||'O fabricante';if(status==='aprovado')await D.notify(lk.integrador_id,'Vínculo aprovado 🤝',fn+' aprovou seu vínculo. Você já pode registrar projetos.','🤝','canais');else if(status==='suspenso')await D.notify(lk.integrador_id,'Vínculo suspenso',fn+' suspendeu seu vínculo.','⚠️','canais');else if(status==='rejeitado')await D.notify(lk.integrador_id,'Vínculo recusado',fn+' recusou seu vínculo.','❌','canais');}}catch(e){}},
  deleteLink:async(id)=>{const{error}=await sb.from('channel_links').delete().eq('id',id);if(error)throw error;await D.audit('integrador.excluir','vinculo',id,'Excluiu o vínculo com um integrador');},
  saveLinkDescontos:async(id,descontos)=>{const{error}=await sb.from('channel_links').update({descontos}).eq('id',id);if(error)throw error;},
  setLinkTier:async(id,tier,nome,antes)=>{const{error}=await sb.from('channel_links').update({tier}).eq('id',id);if(error)throw error;const TL={silver:'Silver',gold:'Gold',platinum:'Platinum'};await D.audit('integrador.tier','vinculo',id,'Integrador '+(nome||'')+' — nível: '+(TL[antes]||antes||'—')+' → '+(TL[tier]||tier));},
  fetchProjects:async(linkId)=>{let q=sb.from('projects').select('*, evidences(*), project_updates(*), channel_links(integrador:organizations!channel_links_integrador_id_fkey(name))').order('registered_at',{ascending:false});if(linkId)q=q.eq('link_id',linkId);const{data,error}=await q;if(error)throw error;return data;},
  fetchMyProjectsAll:async(intId)=>{const{data:links}=await sb.from('channel_links').select('id, fabricante:organizations!channel_links_fabricante_id_fkey(name)').eq('integrador_id',intId);const ids=(links||[]).map(l=>l.id);if(!ids.length)return [];const nameById={};(links||[]).forEach(l=>{nameById[l.id]=l.fabricante?.name;});const{data,error}=await sb.from('projects').select('*, evidences(*), project_updates(*)').in('link_id',ids).order('registered_at',{ascending:false});if(error)throw error;return (data||[]).map(p=>({...p,_fabricante:nameById[p.link_id]||'—'}));},
  fetchProjectById:async(id)=>{const{data,error}=await sb.from('projects').select('*, evidences(*), project_updates(*)').eq('id',id).single();if(error)throw error;return data;},
  createProject:async(p,evs,linkId,uid)=>{
    // detectar POSSÍVEL conflito: mesmo CNPJ de cliente, mesmo fabricante, outro registro ativo
    let conflict=false, conflictNote=null;
    try{
      const{data:lk0}=await sb.from('channel_links').select('fabricante_id').eq('id',linkId).single();
      if(lk0?.fabricante_id&&p.clientCnpj){
        const{data:links}=await sb.from('channel_links').select('id').eq('fabricante_id',lk0.fabricante_id);
        const ids=(links||[]).map(l=>l.id);
        if(ids.length){
          const{data:existing}=await sb.from('projects').select('id,title,client_cnpj,status').in('link_id',ids).eq('client_cnpj',p.clientCnpj).in('status',['pendente','aprovado']);
          if(existing&&existing.length){conflict=true;conflictNote='Já existe '+existing.length+' registro(s) para o CNPJ '+p.clientCnpj+' neste fabricante. Verifique se é o mesmo projeto.';}
        }
      }
    }catch(e){console.error('conflito',e);}
    const{data,error}=await sb.from('projects').insert({link_id:linkId,title:p.title,category:p.category,status:'pendente',client_name:p.clientName,client_cnpj:p.clientCnpj,address:p.address,building_type:p.buildingType,stage:p.stage,estimated_qty:p.estimatedQty,products:p.products,distributor:p.distributor,notes:p.notes,systems:p.systems||[],contact_name:p.contactName,contact_email:p.contactEmail,contact_phone:p.contactPhone,contact_role:p.contactRole,expires_at:calcExpiry(p.category),possible_conflict:conflict,conflict_note:conflictNote}).select().single();if(error)throw error;if(evs?.length){const{error:e2}=await sb.from('evidences').insert(evs.map(t=>({project_id:data.id,type:t})));if(e2)throw e2;}await D.audit('projeto.criar','projeto',data.id,'Criou o projeto \"'+(p.title||'')+'\"'+(conflict?' (possível conflito)':''));try{const{data:lk}=await sb.from('channel_links').select('fabricante_id').eq('id',linkId).single();if(lk?.fabricante_id){await D.notify(lk.fabricante_id,'Novo registro de projeto','Projeto \"'+(p.title||'')+'\" aguardando sua análise.','📁','pipeline');if(conflict)await D.notify(lk.fabricante_id,'⚠️ Possível conflito','O projeto \"'+(p.title||'')+'\" tem CNPJ já registrado por outro integrador. Analise a documentação.','⚠️','pipeline');}}catch(e){}return data;},
  updateProject:async(id,f)=>{const{data,error}=await sb.from('projects').update(f).eq('id',id).select().single();if(error)throw error;return data;},
  approveProject:async(id,descSys,proj)=>{const f={status:'aprovado',approved_at:new Date().toISOString(),descontos_sistema:descSys||{}};const r=await D.updateProject(id,f);const resumo=Object.entries(descSys||{}).filter(([k,v])=>v).map(([k,v])=>(SISTEMAS[k]?SISTEMAS[k].label:k)+' '+v).join(', ');await D.audit('projeto.aprovar','projeto',id,'Aprovou "'+((proj&&proj.title)||'')+'"'+(resumo?' — descontos: '+resumo:''));try{const{data:lk}=await sb.from('channel_links').select('integrador_id').eq('id',proj?.link_id||'').single();if(lk?.integrador_id)await D.notify(lk.integrador_id,'Projeto aprovado ✅','Seu projeto "'+((proj&&proj.title)||'')+'" foi aprovado'+(resumo?' com descontos: '+resumo:'')+'.','✅','projetos');}catch(e){}return r;},
  rejectProject:async(id,motivo,titulo,proj)=>{const r=await D.updateProject(id,{status:'reprovado',reject_reason:motivo});await D.audit('projeto.reprovar','projeto',id,'Reprovou "'+(titulo||'')+'" — motivo: '+(motivo||''));try{const{data:lk}=await sb.from('channel_links').select('integrador_id').eq('id',proj?.link_id||'').single();if(lk?.integrador_id)await D.notify(lk.integrador_id,'Projeto reprovado','Seu projeto "'+(titulo||'')+'" foi reprovado. Motivo: '+(motivo||''),'❌','projetos');}catch(e){}return r;},
  addUpdate:async(pid,text)=>{const{error}=await sb.from('project_updates').insert({project_id:pid,text});if(error)throw error;await D.updateProject(pid,{updated_at:new Date().toISOString()});await D.audit('projeto.atualizar','atualizacao',pid,'Adicionou atualização: '+text.slice(0,80));},
  fetchMembers:async(orgId)=>{const{data,error}=await sb.from('memberships').select('*').eq('org_id',orgId).order('created_at');if(error)throw error;return data;},
  setMemberRole:async(id,role)=>{const{error}=await sb.from('memberships').update({role}).eq('id',id);if(error)throw error;},
  fetchPlans:async()=>{const{data,error}=await sb.from('plans').select('*').eq('active',true).order('price_cents');if(error)throw error;return data;},
  fetchSubscription:async(fabId)=>{const{data,error}=await sb.from('subscriptions').select('*, plans(*)').eq('fabricante_id',fabId).maybeSingle();if(error)throw error;return data;},
  changePlan:async(fabId,planId)=>{const{error}=await sb.from('subscriptions').upsert({fabricante_id:fabId,plan_id:planId,status:'active'},{onConflict:'fabricante_id'});if(error)throw error;},
  // --- MARCAS DO FABRICANTE ---
  fetchOrgMarcas:async(orgId)=>{const{data,error}=await sb.from('organizations').select('marcas').eq('id',orgId).single();if(error)throw error;return data?.marcas||{};},
  saveOrgMarcas:async(orgId,marcas)=>{const{error}=await sb.from('organizations').update({marcas}).eq('id',orgId);if(error)throw error;},
  // --- ANEXOS (PDF) ---
  listAttachments:async(projectId)=>{const{data,error}=await sb.storage.from('anexos').list(projectId+'/',{limit:100});if(error)throw error;return data||[];},
  uploadAttachment:async(projectId,file)=>{
    const okTypes=['application/pdf','image/jpeg','image/png','image/webp'];
    if(!okTypes.includes(file.type))throw new Error('Apenas PDF ou imagem (JPG/PNG).');
    if(file.size>26214400)throw new Error('Arquivo muito grande (máximo 25 MB).');
    const safe=file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    const path=projectId+'/'+Date.now()+'_'+safe;
    const{error}=await sb.storage.from('anexos').upload(path,file,{contentType:file.type});
    if(error)throw error;await D.audit('anexo.adicionar','anexo',projectId,'Anexou o arquivo '+file.name);return path;},
  signedUrl:async(path)=>{const{data,error}=await sb.storage.from('anexos').createSignedUrl(path,3600);if(error)throw error;return data.signedUrl;},
  deleteAttachment:async(projectId,name)=>{const{error}=await sb.storage.from('anexos').remove([projectId+'/'+name]);if(error)throw error;await D.audit('anexo.remover','anexo',projectId,'Removeu o anexo '+name.replace(/^\\d+_/,''));},
  // --- DEVELOPER ---
  devFetchOrgs:async()=>{const{data,error}=await sb.from('organizations').select('*, memberships(id,full_name,role,user_id,is_developer)').order('created_at',{ascending:false});if(error)throw error;return data;},
  devListUsers:async()=>{const{data,error}=await sb.rpc('dev_listar_usuarios');if(error)throw error;return data||[];},
  uploadLogo:async(orgId,file)=>{const ext=(file.name.split('.').pop()||'png').toLowerCase();const path=orgId+'/logo.'+ext;const{error}=await sb.storage.from('logos').upload(path,file,{upsert:true,contentType:file.type});if(error)throw error;await sb.from('organizations').update({logo_path:path}).eq('id',orgId);return path;},
  logoUrl:(path)=>{if(!path)return null;const{data}=sb.storage.from('logos').getPublicUrl(path);return data?.publicUrl||null;},
  fetchInvoices:async(fabId)=>{const{data,error}=await sb.from('invoices').select('*').eq('fabricante_id',fabId).order('competencia',{ascending:false});if(error)throw error;return data;},
  devFetchSubs:async()=>{const{data,error}=await sb.from('subscriptions').select('*, plans(*), fabricante:organizations!subscriptions_fabricante_id_fkey(id,name,cnpj,phone)');if(error)throw error;return data||[];},
  devSetPayment:async(fabId,status)=>{const f={payment_status:status};if(status==='pago')f.last_payment_at=new Date().toISOString();if(status==='cancelado')f.canceled_at=new Date().toISOString();const{error}=await sb.from('subscriptions').update(f).eq('fabricante_id',fabId);if(error)throw error;},
  devResetPassword:async(uid,pwd)=>D.callManageUser({action:'reset_password',target_user_id:uid,new_password:pwd}),
  devSetDeveloper:async(mid,val)=>{const{error}=await sb.from('memberships').update({is_developer:val}).eq('id',mid);if(error)throw error;},
  devChangeEmail:async(uid,email)=>D.callManageUser({action:'change_email',target_user_id:uid,new_email:email}),
  devFetchAccessLog:async()=>{const{data,error}=await sb.from('access_log').select('*').order('created_at',{ascending:false}).limit(200);if(error)throw error;return data||[];},
  devUpdateOrg:async(orgId,fields)=>{const{error}=await sb.from('organizations').update(fields).eq('id',orgId);if(error)throw error;},
  devCreateUserInOrg:async(orgId,email,password,full_name,role)=>D.callManageUser({action:'create_user_in_org',org_id:orgId,email,password,full_name,role}),
  callManageUser:async(payload)=>{const{data:{session}}=await sb.auth.getSession();
    const resp=await fetch(window.SUPABASE_URL+'/functions/v1/manage-user',{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+(session?.access_token||''),'apikey':window.SUPABASE_ANON_KEY},
      body:JSON.stringify(payload)});
    const j=await resp.json();if(!resp.ok)throw new Error(j.error||'Falha na operação');return j;},
  subProjects:(cb)=>{const ch=sb.channel('pj-rt').on('postgres_changes',{event:'*',schema:'public',table:'projects'},cb).subscribe();return ()=>sb.removeChannel(ch);},
  subLinks:(cb)=>{const ch=sb.channel('lk-rt').on('postgres_changes',{event:'*',schema:'public',table:'channel_links'},cb).subscribe();return ()=>sb.removeChannel(ch);},
};

// ============================ AUTH SHELL / LOGIN / SIGNUP ===================
function AuthShell({title,subtitle,children}){
  return <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
    <div className="card" style={{width:'100%',maxWidth:440,padding:28}}>
      <div style={{marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
          <div style={{width:38,height:38,borderRadius:9,overflow:'hidden',display:'flex',alignItems:'center',justifyContent:'center'}}><img src="icon-192.png" alt="Registro+" style={{width:'100%',height:'100%',objectFit:'cover'}}/></div>
          <div><div style={{fontWeight:800,color:'var(--navy)',fontSize:15}}>Registro+</div>
          <div style={{fontSize:10,color:'var(--muted)'}}>Programa de Canal</div></div>
        </div>
        <h1 style={{fontSize:22,color:'var(--navy)'}}>{title}</h1>
        {subtitle&&<p style={{fontSize:13,color:'var(--muted)',marginTop:4}}>{subtitle}</p>}
      </div>{children}
    </div></div>;
}
const ErrBox = ({msg}) => <div style={{background:'#FEE2E2',border:'1px solid #DC2626',borderRadius:8,padding:'9px 12px',marginBottom:14,fontSize:13,color:'#7F1D1D'}}>{msg}</div>;
const trad = (m) => /Invalid login/i.test(m)?'E-mail ou senha incorretos.':/Email not confirmed/i.test(m)?'Confirme seu e-mail antes de entrar.':/already registered/i.test(m)?'Este e-mail já está cadastrado.':/at least/i.test(m)?'A senha deve ter ao menos 6 caracteres.':m;

function PasswordInput({value,onChange,placeholder,required,minLength}){
  const [show,setShow]=useState(false);
  return <div style={{position:'relative'}}>
    <input className="input" style={{paddingRight:42}} type={show?'text':'password'} value={value} required={required} minLength={minLength} onChange={e=>onChange(e.target.value)} placeholder={placeholder||'••••••••'}/>
    <button type="button" onClick={()=>setShow(s=>!s)} style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:15,color:'var(--muted)'}} title={show?'Ocultar':'Mostrar'}>{show?'🙈':'👁️'}</button>
  </div>;
}
function Login({go}){
  const {signIn,resetPasswordEmail}=useAuth();
  const [email,setEmail]=useState('');const[password,setPassword]=useState('');
  const [err,setErr]=useState('');const[busy,setBusy]=useState(false);const[msg,setMsg]=useState('');
  const submit=async(e)=>{e.preventDefault();setErr('');setMsg('');setBusy(true);
    const {error}=await signIn({email,password});setBusy(false);if(error)setErr(trad(error.message));};
  const forgot=async()=>{setErr('');setMsg('');if(!email){setErr('Digite seu e-mail no campo acima e clique de novo em "Esqueci minha senha".');return;}
    setBusy(true);const{error}=await resetPasswordEmail(email);setBusy(false);
    if(error)setErr(trad(error.message));else setMsg('Enviamos um link de recuperação para '+email+'. Verifique sua caixa de entrada.');};
  return <AuthShell title="Entrar no Portal" subtitle="Acesse sua conta">
    <form onSubmit={submit}>
      <div style={{marginBottom:14}}><label className="label">E-mail</label>
        <input className="input" type="email" value={email} required onChange={e=>setEmail(e.target.value)} placeholder="voce@empresa.com"/></div>
      <div style={{marginBottom:8}}><label className="label">Senha</label>
        <PasswordInput value={password} onChange={setPassword} required/></div>
      <div style={{textAlign:'right',marginBottom:14}}><a onClick={forgot} style={{color:'var(--blue)',fontSize:12,fontWeight:600,cursor:'pointer'}}>Esqueci minha senha</a></div>
      {err&&<ErrBox msg={err}/>}
      {msg&&<div style={{background:'#D1FAE5',border:'1px solid #10B981',borderRadius:8,padding:'9px 12px',marginBottom:14,fontSize:13,color:'#166534'}}>{msg}</div>}
      <button className="btn btn-primary" style={{width:'100%'}} disabled={busy}>{busy?'Entrando…':'Entrar'}</button>
    </form>
    <p style={{marginTop:18,fontSize:13,textAlign:'center',color:'var(--muted)'}}>Ainda não tem conta?{' '}
      <a onClick={()=>go('signup')} style={{color:'var(--blue)',fontWeight:700,cursor:'pointer'}}>Cadastre-se</a></p>
  </AuthShell>;
}

function SignUp({go}){
  const {signUp}=useAuth();
  const [orgType,setOrgType]=useState('');
  const [form,setForm]=useState({fullName:'',orgName:'',cnpj:'',phone:'',email:'',password:''});
  const [err,setErr]=useState('');const[done,setDone]=useState(false);const[busy,setBusy]=useState(false);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const [fabSys,setFabSys]=useState({});  // {incendio:'Notifier, Morley', cftv:'...'}
  const [logoFile,setLogoFile]=useState(null);
  const toggleFabSys=(k)=>setFabSys(p=>{const n={...p};if(k in n)delete n[k];else n[k]='';return n;});
  const setFabSysMarcas=(k,v)=>setFabSys(p=>({...p,[k]:v}));
  const submit=async(e)=>{e.preventDefault();setErr('');setBusy(true);
    const marcas={};if(orgType==='fabricante'){Object.entries(fabSys).forEach(([k,v])=>{const arr=String(v).split(',').map(s=>s.trim()).filter(Boolean);if(arr.length)marcas[k]=arr;});}
    const {error}=await signUp({...form,orgType,marcas});
    if(error){setBusy(false);setErr(trad(error.message));return;}
    if(logoFile){try{const{data:{session}}=await sb.auth.getSession();if(session?.user){const{data:mem}=await sb.from('memberships').select('org_id').eq('user_id',session.user.id).single();if(mem?.org_id)await D.uploadLogo(mem.org_id,logoFile);}}catch(e){console.error('logo signup',e);}}
    setBusy(false);setDone(true);};
  if(done) return <AuthShell title="Conta criada!" subtitle="Falta pouco">
    <div style={{background:'#D1FAE5',border:'1px solid #10B981',borderRadius:10,padding:16,fontSize:14,color:'#166534'}}>
      <p style={{marginBottom:8}}><strong>Sua empresa foi cadastrada e você é o administrador dela.</strong></p>
      <p style={{marginBottom:8}}>1. Confirme seu e-mail (se a confirmação estiver ativa).</p>
      {orgType==='integrador'?<p>2. Ao entrar, busque os fabricantes e solicite vínculo.</p>:<p>2. Ao entrar, aprove integradores e gerencie seu plano.</p>}
    </div>
    <button onClick={()=>go('login')} className="btn btn-primary" style={{width:'100%',marginTop:18}}>Ir para o login</button>
  </AuthShell>;
  if(!orgType) return <AuthShell title="Criar conta" subtitle="Você representa qual tipo de empresa?">
    {[['fabricante','🏭','Fabricante','Gerencio meu canal, aprovo integradores e concedo descontos.'],
      ['integrador','🔧','Integrador','Registro oportunidades junto a um ou mais fabricantes.']].map(([t,ic,tt,d])=>
      <button key={t} onClick={()=>setOrgType(t)} style={{display:'flex',alignItems:'center',gap:14,width:'100%',padding:16,borderRadius:12,border:'2px solid var(--border)',background:'#fff',marginBottom:10}}>
        <div style={{fontSize:26}}>{ic}</div><div style={{textAlign:'left'}}>
        <div style={{fontWeight:800,color:'var(--navy)',fontSize:14}}>{tt}</div>
        <div style={{fontSize:12,color:'var(--muted)'}}>{d}</div></div></button>)}
    <p style={{marginTop:16,fontSize:13,textAlign:'center',color:'var(--muted)'}}>Já tem conta?{' '}
      <a onClick={()=>go('login')} style={{color:'var(--blue)',fontWeight:700,cursor:'pointer'}}>Entrar</a></p>
  </AuthShell>;
  return <AuthShell title={`Cadastro — ${orgType==='fabricante'?'Fabricante':'Integrador'}`} subtitle="Você será o administrador da empresa.">
    <button onClick={()=>setOrgType('')} style={{background:'none',border:'none',color:'var(--blue)',fontSize:12,fontWeight:600,marginBottom:12,cursor:'pointer'}}>← trocar tipo</button>
    <form onSubmit={submit}>
      {[['Seu nome completo','fullName','text'],['Empresa (Razão Social)','orgName','text'],['CNPJ','cnpj','text'],['Telefone','phone','tel'],['E-mail','email','email']].map(([l,k,t])=>
        <div key={k} style={{marginBottom:12}}><label className="label">{l}</label>
          <input className="input" type={t} value={form[k]} required onChange={e=>set(k,e.target.value)}/></div>)}
      <div style={{marginBottom:12}}><label className="label">Senha</label>
        <PasswordInput value={form.password} onChange={v=>set('password',v)} required minLength={6}/></div>
      {orgType==='fabricante'&&<div style={{marginBottom:12}}>
        <label className="label">Sistemas que você fabrica (selecione e informe as marcas)</label>
        {Object.entries(SISTEMAS).map(([sk,sd])=>{const on=sk in fabSys;return <div key={sk} style={{border:`2px solid ${on?'var(--navy)':'var(--border)'}`,borderRadius:9,padding:9,marginBottom:7,background:on?'#EAF2FB':'#fff'}}>
          <button type="button" onClick={()=>toggleFabSys(sk)} style={{display:'flex',alignItems:'center',gap:8,width:'100%',background:'none',border:'none',textAlign:'left'}}>
            <div style={{width:17,height:17,borderRadius:4,border:`2px solid ${on?'var(--navy)':'#CBD5E1'}`,background:on?'var(--navy)':'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{on&&<span style={{color:'#fff',fontSize:10}}>✓</span>}</div>
            <span style={{fontSize:13,fontWeight:700,color:'#1E293B'}}>{sd.icon} {sd.label}</span></button>
          {on&&<input className="input" style={{marginTop:8,fontSize:12}} placeholder="Marcas separadas por vírgula (ex.: Notifier, Morley)" value={fabSys[sk]} onChange={e=>setFabSysMarcas(sk,e.target.value)}/>}
        </div>;})}
        <div style={{fontSize:10,color:'var(--muted)'}}>Você poderá editar isso depois na aba “Marcas”.</div>
      </div>}
      {orgType==='fabricante'&&<div style={{marginBottom:12}}>
        <label className="label">Logo da empresa (opcional)</label>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          {logoFile?<img src={URL.createObjectURL(logoFile)} alt="logo" style={{width:48,height:48,borderRadius:9,objectFit:'cover',border:'1px solid var(--border)'}}/>:<div style={{width:48,height:48,borderRadius:9,background:'#F1F5F9',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>🏭</div>}
          <label className="btn btn-ghost" style={{fontSize:12,cursor:'pointer'}}>{logoFile?'Trocar imagem':'Escolher imagem'}
            <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>{const f=e.target.files?.[0];if(f){if(!f.type.startsWith('image/')){alert('Selecione uma imagem.');return;}if(f.size>2097152){alert('Máximo 2 MB.');return;}setLogoFile(f);}e.target.value='';}}/></label>
          {logoFile&&<button type="button" onClick={()=>setLogoFile(null)} style={{background:'none',border:'none',color:'#DC2626',fontSize:12,cursor:'pointer'}}>remover</button>}
        </div>
        <div style={{fontSize:10,color:'var(--muted)',marginTop:6}}>PNG/JPG até 2MB. Se a confirmação de e-mail estiver ativa, envie a logo depois na aba “Marcas”.</div>
      </div>}
      {err&&<ErrBox msg={err}/>}
      <button className="btn btn-primary" style={{width:'100%',marginTop:6}} disabled={busy}>{busy?'Enviando…':'Criar conta'}</button>
    </form>
  </AuthShell>;
}

function ProfileModal({onClose}){
  const {org,membership,isFabricante,isAdmin,user,signOut}=useAuth();
  const [sub,setSub]=useState(null);const[plans,setPlans]=useState([]);const[active,setActive]=useState(0);

        <div style={{fontWeight:700,fontSize:13,color:'#1E293B',marginBottom:6}}>Seus dados (LGPD)</div>

function GlobalSearch({onPickProject}){

              </div>)}</>}
          </>:<div style={{fontSize:12,color:'var(--muted)',textAlign:'center',padding:14}}>Nada encontrado para “{q}”.</div>}
        </div>
      </div>
    </div>}
  </>;
}
function DarkToggle(){

  return <button onClick={()=>setDark(d=>!d)} title={dark?'Modo claro':'Modo escuro'} style={{background:'none',border:'none',cursor:'pointer',fontSize:18,padding:4}}>{dark?'☀️':'🌙'}</button>;
}
function NotificationBell(){
  const {org}=useAuth();
  const [items,setItems]=useState([]);const[open,setOpen]=useState(false);const[anim,setAnim]=useState(false);
  const audioRef=useRef(null);
  const load=useCallback(async()=>{if(!org)return;try{setItems(await D.fetchNotifications(org.id));}catch(e){console.error(e);}},[org]);
  useEffect(()=>{load();},[load]);
  useEffect(()=>{if(!org)return;return D.subNotifications(org.id,(payload)=>{
    setItems(prev=>[payload.new,...prev]);
    setAnim(true);setTimeout(()=>setAnim(false),900);
    try{audioRef.current&&audioRef.current.play().catch(()=>{});}catch(e){}
  });},[org]);
  const unread=items.filter(i=>!i.read).length;
  const abrir=async()=>{const novo=!open;setOpen(novo);if(novo&&unread>0&&org){try{await D.markAllNotifRead(org.id);setItems(prev=>prev.map(i=>({...i,read:true})));}catch(e){}}};
  // som curto em base64 (bip suave)
  const SND='data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=';
  return <div style={{position:'relative'}}>
    <audio ref={audioRef} src={SND} preload="auto"/>
    <button onClick={abrir} style={{position:'relative',background:'none',border:'none',cursor:'pointer',fontSize:20,padding:4,transition:'transform .2s',transform:anim?'scale(1.25) rotate(-10deg)':'none'}} title="Notificações">🔔
      {unread>0&&<span style={{position:'absolute',top:-2,right:-2,background:'#DC2626',color:'#fff',borderRadius:99,fontSize:9,fontWeight:800,minWidth:16,height:16,display:'flex',alignItems:'center',justifyContent:'center',padding:'0 4px',animation:anim?'pulse .9s':'none'}}>{unread>9?'9+':unread}</span>}
    </button>
    {open&&<><div onClick={()=>setOpen(false)} style={{position:'fixed',inset:0,zIndex:60}}/>
      <div style={{position:'absolute',right:0,top:36,width:300,maxHeight:380,overflowY:'auto',background:'#fff',borderRadius:12,boxShadow:'0 10px 40px rgba(0,0,0,.18)',zIndex:61,animation:'slidedown .2s ease'}}>
        <div style={{padding:'12px 14px',borderBottom:'1px solid var(--border)',fontWeight:700,fontSize:13,color:'#1E293B',position:'sticky',top:0,background:'#fff'}}>Notificações</div>
        {items.length===0?<div style={{padding:24,textAlign:'center',color:'var(--muted)',fontSize:12}}>Nenhuma notificação ainda.</div>:
          items.map(n=><div key={n.id} style={{padding:'11px 14px',borderBottom:'1px solid #F1F5F9',display:'flex',gap:10,alignItems:'flex-start',background:n.read?'#fff':'#EFF6FF'}}>
            <span style={{fontSize:17}}>{n.icon||'🔔'}</span>
            <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:'#1E293B'}}>{n.title}</div>
              {n.body&&<div style={{fontSize:11,color:'var(--slate)',marginTop:2}}>{n.body}</div>}
              <div style={{fontSize:10,color:'var(--muted)',marginTop:3}}>{new Date(n.created_at).toLocaleString('pt-BR')}</div></div>
          </div>)}
      </div></>}
  </div>;
}

function MembersPanel({orgId,myId,isAdmin}){
  const {isFabricante:isFab}=useAuth();
  const [members,setMembers]=useState([]);const[loading,setLoading]=useState(true);const[busy,setBusy]=useState(false);const[q,setQ]=useState('');
  const [showForm,setShowForm]=useState(false);

  useEffect(()=>{load();},[load]);
  const changeRole=async(id,role)=>{setBusy(true);try{await D.setMemberRole(id,role);await load();}catch(e){alert(e.message);}finally{setBusy(false);}};
  const createUser=async()=>{if(!nf.full_name||!nf.email||!nf.password){alert('Preencha nome, e-mail e senha.');return;}
    setBusy(true);try{const _nome=nf.full_name,_papel=nf.role;await D.callManageUser({action:'create_user',email:nf.email,password:nf.password,full_name:nf.full_name,role:nf.role});
      await D.audit('usuario.criar','usuario',null,'Criou o usuário '+_nome+' ('+(_papel==='admin'?'Administrador':'Usuário')+')');
      setNf({full_name:'',email:'',password:'',role:'member'});setShowForm(false);await load();alert('Usuário criado com sucesso!');}
    catch(e){alert('Erro: '+e.message);}finally{setBusy(false);}};
  const removeUser=async(uid,nome)=>{if(!confirm('Remover o usuário '+nome+'? Esta ação não pode ser desfeita.'))return;
    setBusy(true);try{await D.callManageUser({action:'delete_user',target_user_id:uid});await D.audit('usuario.excluir','usuario',uid,'Removeu o usuário '+nome);await load();}
    catch(e){alert('Erro: '+e.message);}finally{setBusy(false);}};
  const resetPass=async(uid,nome)=>{const np=prompt('Nova senha para '+nome+' (mínimo 6 caracteres):');if(!np)return;if(np.length<6){alert('Senha muito curta.');return;}
    setBusy(true);try{await D.callManageUser({action:'reset_password',target_user_id:uid,new_password:np});await D.audit('usuario.senha','usuario',uid,'Redefiniu a senha de '+nome);alert('Senha redefinida com sucesso.');}
    catch(e){alert('Erro: '+e.message);}finally{setBusy(false);}};

    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4,flexWrap:'wrap',gap:8}}>
      <div style={{fontWeight:800,fontSize:17,color:'#1E293B'}}>Usuários da empresa</div>
      {isAdmin&&<button className="btn btn-primary" style={{fontSize:13}} onClick={()=>setShowForm(s=>!s)}>{showForm?'Cancelar':'+ Novo usuário'}</button>}
    </div>
    <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>Vários usuários compartilham os dados da empresa.</div>
    {showForm&&isAdmin&&<div className="card" style={{padding:16,marginBottom:14,border:'2px solid var(--navy)'}}>
      <div style={{fontWeight:700,fontSize:13,color:'var(--navy)',marginBottom:10}}>Criar novo usuário</div>
      <div style={{marginBottom:10}}><label className="label">Nome completo</label><input className="input" value={nf.full_name} onChange={e=>setF('full_name',e.target.value)}/></div>
      <div style={{marginBottom:10}}><label className="label">E-mail</label><input className="input" type="email" value={nf.email} onChange={e=>setF('email',e.target.value)}/></div>
      <div style={{marginBottom:10}}><label className="label">Senha (mínimo 6)</label><PasswordInput value={nf.password} onChange={v=>setF('password',v)} placeholder="defina uma senha"/></div>
      <div style={{marginBottom:12}}><label className="label">Papel</label><select className="input" value={nf.role} onChange={e=>setF('role',e.target.value)}>
        <option value="member">Usuário (uso geral)</option>
        <option value="comercial">Comercial (projetos, sem áreas administrativas)</option>
        <option value="leitura">Somente leitura</option>
        {isFab&&<option value="financeiro">Financeiro (faturas e plano)</option>}
        <option value="admin">Administrador (acesso total)</option>
      </select>
      <div style={{fontSize:10,color:'var(--muted)',marginTop:4}}>Comercial registra e gerencia projetos. Leitura só visualiza. {isFab?'Financeiro vê faturas e plano. ':''}Administrador faz tudo.</div></div>
      <button className="btn btn-success" style={{width:'100%'}} disabled={busy} onClick={createUser}>{busy?'Criando…':'Criar usuário'}</button>
    </div>}
    <SearchBox value={q} onChange={setQ} placeholder="Buscar usuário por nome…"/>
    {members.filter(m=>{const t=q.trim().toLowerCase();return !t||String(m.full_name||'').toLowerCase().includes(t);}).map(m=><div key={m.id} className="card" style={{padding:14,marginBottom:8}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
        <div><div style={{fontWeight:700,fontSize:14,color:'#1E293B'}}>{m.full_name}{m.id===myId&&<span style={{fontSize:11,color:'var(--muted)',marginLeft:6}}>(você)</span>}</div>
          <div style={{fontSize:11,color:'var(--muted)'}}>{m.role==='admin'?'Administrador':'Usuário'}</div></div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          {isAdmin&&m.id!==myId&&<select className="input" style={{width:'auto',padding:'5px 8px',fontSize:12}} value={m.role} disabled={busy} onChange={e=>changeRole(m.id,e.target.value)}>

          {isAdmin&&m.id!==myId&&<button className="btn btn-ghost" style={{fontSize:12,padding:'6px 10px'}} disabled={busy} onClick={()=>resetPass(m.user_id,m.full_name)}>Resetar senha</button>}
          {isAdmin&&m.id!==myId&&<button className="btn btn-danger" style={{fontSize:12,padding:'6px 10px'}} disabled={busy} onClick={()=>removeUser(m.user_id,m.full_name)}>Remover</button>}
        </div>
      </div></div>)}
  </>;
}

function ProjectChat({projectId,isFabricante}){
  const [msgs,setMsgs]=useState([]);const[txt,setTxt]=useState('');const[busy,setBusy]=useState(false);
  const endRef=useRef(null);
  const load=useCallback(async()=>{try{setMsgs(await D.fetchComments(projectId));}catch(e){console.error(e);}},[projectId]);
  useEffect(()=>{load();},[load]);
  useEffect(()=>{return D.subComments(projectId,(payload)=>{setMsgs(prev=>prev.find(m=>m.id===payload.new.id)?prev:[...prev,payload.new]);});},[projectId]);
  useEffect(()=>{endRef.current&&endRef.current.scrollIntoView({behavior:'smooth'});},[msgs]);
  const side=isFabricante?'fabricante':'integrador';
  const send=async()=>{if(!txt.trim())return;setBusy(true);try{await D.addComment(projectId,txt.trim(),side);setTxt('');await load();}catch(e){alert('Erro: '+e.message);}finally{setBusy(false);}};
  return <div>
    <div style={{fontWeight:700,fontSize:12,color:'#1E293B',marginBottom:6}}>💬 Conversa</div>
    <div style={{background:'#F8FAFC',borderRadius:10,padding:10,maxHeight:240,overflowY:'auto',marginBottom:8}}>
      {msgs.length===0?<div style={{fontSize:12,color:'var(--muted)',textAlign:'center',padding:14}}>Nenhuma mensagem ainda. Use este espaço para falar com a outra parte sobre o projeto.</div>:
        msgs.map(m=>{const mine=m.author_side===side;return <div key={m.id} style={{display:'flex',justifyContent:mine?'flex-end':'flex-start',marginBottom:7}}>
          <div style={{maxWidth:'78%',background:mine?'var(--navy)':'#fff',color:mine?'#fff':'#1E293B',border:mine?'none':'1px solid var(--border)',borderRadius:10,padding:'7px 11px'}}>
            <div style={{fontSize:9,opacity:.7,marginBottom:2}}>{m.author_name||'—'} · {m.author_side==='fabricante'?'Fabricante':'Integrador'}</div>
            <div style={{fontSize:12,lineHeight:1.4,whiteSpace:'pre-wrap'}}>{m.body}</div>
            <div style={{fontSize:8,opacity:.6,marginTop:3,textAlign:'right'}}>{new Date(m.created_at).toLocaleString('pt-BR')}</div>
          </div></div>;})}
      <div ref={endRef}/>
    </div>
    <div style={{display:'flex',gap:8}}>
      <input className="input" value={txt} onChange={e=>setTxt(e.target.value)} placeholder="Escreva uma mensagem…" onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}/>
      <button className="btn btn-primary" style={{fontSize:12}} disabled={busy||!txt.trim()} onClick={send}>Enviar</button>
    </div>
  </div>;
}

        <div style={{fontWeight:700,fontSize:13,color:'var(--navy)',marginBottom:8}}>Analisar Registro</div>
        {descHist.length>0&&<div style={{background:'#fff',border:'1px solid var(--border)',borderRadius:8,padding:10,marginBottom:10}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--slate)',marginBottom:5}}>📜 Descontos já concedidos a este cliente ({project.client_cnpj})</div>
          {descHist.map(h=><div key={h.id} style={{fontSize:11,color:'var(--muted)',marginBottom:3}}>• {h.title}: {Object.entries(h.descontos_sistema).filter(([k,v])=>v).map(([k,v])=>(SISTEMAS[k]?SISTEMAS[k].label:k)+' '+v).join(', ')}</div>)}
        </div>}
        <label className="label">Desconto por sistema</label>
        {(project.systems||[]).length>0?<div className="grid grid-2" style={{gap:8,marginBottom:10}}>{(project.systems||[]).map(s=>{const sd=SISTEMAS[s.sistema];if(!sd)return null;return <div key={s.sistema}>
            <label style={{fontSize:11,color:'var(--muted)',fontWeight:600,display:'block',marginBottom:3}}>{sd.icon} {sd.label}{s.itens?._marca?(' · '+s.itens._marca):''}</label>
            <input className="input" style={{fontSize:12}} placeholder="Ex.: 10%" value={descSys[s.sistema]||''} onChange={e=>setDS(s.sistema,e.target.value)}/></div>;})}</div>
          :<div style={{fontSize:12,color:'var(--muted)',marginBottom:10}}>Este projeto não tem sistemas cadastrados.</div>}
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-success" disabled={busy} onClick={doApprove}>Aprovar</button>
          <button className="btn btn-danger" disabled={busy} onClick={()=>setShowRej(s=>!s)}>Reprovar</button></div>
        {showRej&&<div style={{marginTop:10,background:'#fff',borderRadius:8,padding:12,border:'1px solid var(--border)'}}>
          <label className="label">Motivo da reprovação (obrigatório)</label>
          <textarea className="input" rows={2} value={rejReason} onChange={e=>setRejReason(e.target.value)} placeholder="Explique o motivo para o integrador…" style={{resize:'none',marginBottom:8}}/>
          <button className="btn btn-danger" style={{fontSize:12}} disabled={busy||!rejReason.trim()} onClick={doReject}>Confirmar reprovação</button></div>}</div>}
      {project.possible_conflict&&<div style={{background:'#FEF3C7',border:'1px solid #D97706',borderRadius:10,padding:13}}><div style={{fontWeight:700,fontSize:12,color:'#92400E',marginBottom:3}}>⚠️ Possível conflito</div><div style={{fontSize:12,color:'#92400E'}}>{project.conflict_note||'Há outro registro para este CNPJ neste fabricante. Analise a documentação para confirmar se é o mesmo projeto.'}</div></div>}
      {project.status==='reprovado'&&project.reject_reason&&<div style={{background:'#FEE2E2',border:'1px solid #FCA5A5',borderRadius:10,padding:13}}><div style={{fontWeight:700,fontSize:12,color:'#991B1B',marginBottom:3}}>❌ Motivo da reprovação</div><div style={{fontSize:12,color:'#7F1D1D'}}>{project.reject_reason}</div></div>}
      {project.status==='aprovado'&&c&&<div style={{background:c.bg,border:`1.5px solid ${c.color}40`,borderRadius:10,padding:13}}>
        <div style={{fontWeight:700,fontSize:12,color:c.color,marginBottom:8}}>💰 Descontos Autorizados <span style={{fontWeight:400,color:'var(--muted)'}}>· válidos só para este projeto</span></div>
        {(project.descontos_sistema&&Object.values(project.descontos_sistema).some(v=>v))?
          <div style={{display:'flex',flexWrap:'wrap',gap:8}}>{Object.entries(project.descontos_sistema).filter(([k,v])=>v).map(([k,v])=>{const sd=SISTEMAS[k];return <span key={k} style={{fontSize:13,background:'#fff',border:`1.5px solid ${c.color}`,borderRadius:8,padding:'6px 12px',color:c.color,fontWeight:700}}>{sd?sd.icon+' '+sd.label:k}: {v}</span>;})}</div>
          :<div style={{fontSize:12,color:'var(--muted)'}}>Sem desconto por sistema definido.</div>}
        {isFabricante&&<div style={{marginTop:10}}>
          {!editDesc?<button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>{setEditDesc(true);setDescSys(project.descontos_sistema||{});}}>✏️ Editar descontos</button>
          :<div style={{background:'#fff',borderRadius:8,padding:12,border:'1px solid var(--border)'}}>
            <label className="label">Desconto por sistema</label>
            {(project.systems||[]).length>0&&<div className="grid grid-2" style={{gap:8,marginBottom:10}}>{(project.systems||[]).map(s=>{const sd=SISTEMAS[s.sistema];if(!sd)return null;return <div key={s.sistema}>
                <label style={{fontSize:11,color:'var(--muted)',fontWeight:600,display:'block',marginBottom:3}}>{sd.icon} {sd.label}</label>
                <input className="input" style={{fontSize:12}} placeholder="Ex.: 10%" value={descSys[s.sistema]||''} onChange={e=>setDS(s.sistema,e.target.value)}/></div>;})}</div>}
            <div style={{display:'flex',gap:8}}><button className="btn btn-primary" style={{fontSize:12}} disabled={busy} onClick={saveDescEdit}>Salvar</button>
              <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>setEditDesc(false)}>Cancelar</button></div>
          </div>}</div>}</div>}
      <div className="grid grid-2">
        {[['Cliente',project.client_name],['CNPJ',project.client_cnpj],['Edificação',project.building_type],['Estágio',project.stage],['Distribuidor',project.distributor||'—'],['Endereço',project.address],['Contato',project.contact_name||'—'],['Função',project.contact_role||'—'],['E-mail',project.contact_email||'—'],['Telefone',project.contact_phone||'—']].map(([l,v])=>
          <div key={l} style={{background:'#F8FAFC',borderRadius:7,padding:'9px 11px'}}><div style={{fontSize:10,color:'var(--muted)',fontWeight:600}}>{l}</div><div style={{fontSize:12,color:'#1E293B',fontWeight:500}}>{v}</div></div>)}
      </div>
      {evids.length>0&&<div><div style={{fontWeight:700,fontSize:12,color:'#1E293B',marginBottom:5}}>Evidências</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{evids.map(e=><span key={e.id} style={{fontSize:11,fontWeight:600,color:'#0D9488',background:'#E8F8F5',padding:'3px 9px',borderRadius:99}}>✓ {e.label}</span>)}</div></div>}
      {(project.systems||[]).length>0&&<div><div style={{fontWeight:700,fontSize:12,color:'#1E293B',marginBottom:5}}>Sistemas</div>
        <div style={{display:'flex',flexDirection:'column',gap:6}}>{project.systems.map((s,idx)=>{const sd=SISTEMAS[s.sistema];if(!sd)return null;
          const marca=s.itens?._marca;
          const itens=Object.entries(s.itens||{}).filter(([k,v])=>k!=='_marca'&&v&&Number(v)>0);
          return <div key={idx} style={{background:'#F8FAFC',borderRadius:7,padding:'8px 11px'}}>
            <div style={{fontSize:12,fontWeight:700,color:'#1E293B'}}>{sd.icon} {sd.label}{marca?<span style={{fontWeight:400,color:'var(--muted)'}}> · {marca}</span>:''}</div>
            <div style={{fontSize:11,color:'var(--slate)',marginTop:2}}>{itens.length?itens.map(([k,v])=>{const il=sd.itens.find(x=>x.key===k);return `${il?il.label:k}: ${v}`;}).join(' · '):'sem quantidades'}</div>
          </div>;})}</div></div>}
      {project.notes&&<div style={{background:'#F8FAFC',borderRadius:7,padding:'9px 11px',fontSize:12,color:'var(--slate)'}}>{project.notes}</div>}
      {!isFabricante&&project.status==='aprovado'&&<div style={{display:'flex',gap:8}}>
        <button className="btn btn-success" style={{flex:1,fontSize:12}} disabled={busy} onClick={()=>mark('convertido')}>✅ Convertido</button>
        <button className="btn btn-ghost" style={{flex:1,fontSize:12}} disabled={busy} onClick={()=>mark('encerrado')}>Encerrar</button></div>}
      <div><div style={{fontWeight:700,fontSize:12,color:'#1E293B',marginBottom:6}}>Anexos (PDF, até 25 MB)</div>
        {atts.length>0&&<div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:8}}>{atts.map(a=><div key={a.name} style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:'#F8FAFC',borderRadius:7,padding:'7px 11px'}}>
          <button type="button" onClick={()=>verAnexo(a.name)} style={{background:'none',border:'none',color:'var(--blue)',fontSize:12,fontWeight:600,textAlign:'left',flex:1,cursor:'pointer'}}>📄 {a.name.replace(/^\d+_/,'')}</button>
          <button type="button" onClick={()=>openAtt(a.name)} title="Abrir em nova aba" style={{background:'none',border:'none',color:'var(--muted)',fontSize:13,cursor:'pointer',padding:'0 6px'}}>↗</button>
          {!isFabricante&&<button type="button" onClick={()=>delAtt(a.name)} style={{background:'none',border:'none',color:'var(--red)',fontSize:11,cursor:'pointer'}}>remover</button>}
        </div>)}</div>}
        {!isFabricante&&<label className="btn btn-ghost" style={{fontSize:12,display:'inline-block',cursor:'pointer'}}>{upBusy?'Enviando…':'+ Anexar PDF'}
          <input type="file" accept="application/pdf,image/jpeg,image/png,image/webp" style={{display:'none'}} disabled={upBusy} onChange={onUpload}/></label>}
        {atts.length===0&&isFabricante&&<div style={{fontSize:11,color:'var(--muted)'}}>Nenhum anexo.</div>}
      </div>
      {!isFabricante&&<div><div style={{fontWeight:700,fontSize:12,color:'#1E293B',marginBottom:6}}>Adicionar Atualização</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>{TIPOS_ATUALIZACAO.map(t=><button key={t} type="button" onClick={()=>setNoteType(noteType===t?'':t)} style={{padding:'4px 10px',borderRadius:99,border:'1.5px solid',borderColor:noteType===t?'var(--navy)':'var(--border)',background:noteType===t?'#EAF2FB':'#fff',color:noteType===t?'var(--navy)':'var(--muted)',fontSize:11,fontWeight:600}}>{t}</button>)}</div>
        <div style={{display:'flex',gap:8}}><textarea className="input" rows={2} value={note} onChange={e=>setNote(e.target.value)} style={{resize:'none'}} placeholder={noteType?('Detalhe sobre: '+noteType):'Descreva a atualização…'}/>
          <button className="btn btn-primary" style={{alignSelf:'flex-end',fontSize:12}} disabled={!note.trim()||busy} onClick={submitNote}>Salvar</button></div></div>}
      {updates.length>0&&<div><div style={{fontWeight:700,fontSize:12,color:'#1E293B',marginBottom:6}}>Histórico</div>
        {updates.map(u=><div key={u.id} style={{borderLeft:'3px solid var(--blue)',paddingLeft:10,marginBottom:7}}>
          <div style={{fontSize:10,color:'var(--muted)'}}>{new Date(u.created_at).toLocaleString('pt-BR')}</div>
          <div style={{fontSize:12,color:'var(--slate)'}}>{u.text}</div></div>)}</div>}
      {(()=>{
        // Linha do tempo do projeto
        const ev=[];
        if(project.registered_at)ev.push({t:project.registered_at,ic:'📁',l:'Registrado'});
        if(project.approved_at)ev.push({t:project.approved_at,ic:'✅',l:'Aprovado'});
        if(project.status==='reprovado')ev.push({t:project.updated_at||project.registered_at,ic:'❌',l:'Reprovado'});
        if(project.status==='convertido')ev.push({t:project.updated_at,ic:'🎯',l:'Convertido'});
        ev.sort((a,b)=>new Date(a.t)-new Date(b.t));
        if(!ev.length)return null;
        return <div><div style={{fontWeight:700,fontSize:12,color:'#1E293B',margin:'4px 0 8px'}}>📌 Linha do tempo</div>
          <div style={{position:'relative',paddingLeft:18}}>
            {ev.map((e,i)=><div key={i} style={{position:'relative',marginBottom:10}}>
              <div style={{position:'absolute',left:-18,top:2,width:10,height:10,borderRadius:99,background:'var(--blue)'}}/>
              {i<ev.length-1&&<div style={{position:'absolute',left:-14,top:12,width:2,height:'100%',background:'var(--border)'}}/>}
              <div style={{fontSize:12,fontWeight:600,color:'#1E293B'}}>{e.ic} {e.l}</div>
              <div style={{fontSize:10,color:'var(--muted)'}}>{e.t?new Date(e.t).toLocaleString('pt-BR'):'—'}</div>
            </div>)}
          </div></div>;
      })()}
      <ProjectChat projectId={project.id} isFabricante={isFabricante}/>
      {viewerUrl&&<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setViewerUrl(null)} style={{zIndex:130}}>
        <div className="modal" style={{maxWidth:'92vw',width:'92vw',height:'90vh',display:'flex',flexDirection:'column'}}>
          <div style={{padding:'10px 16px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontWeight:700,fontSize:13,color:'#1E293B'}}>📄 {viewerName}</div>
            <div style={{display:'flex',gap:8}}>
              <a href={viewerUrl} target="_blank" rel="noreferrer" className="btn btn-ghost" style={{fontSize:12}}>Abrir em nova aba ↗</a>
              <button onClick={()=>setViewerUrl(null)} style={{background:'none',border:'none',fontSize:18,color:'var(--muted)'}}>✕</button>
            </div>
          </div>
          {/\.(jpg|jpeg|png|webp)$/i.test(viewerName)
            ?<div style={{flex:1,overflow:'auto',display:'flex',alignItems:'center',justifyContent:'center',background:'#0F172A'}}><img src={viewerUrl} alt={viewerName} style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain'}}/></div>
            :<iframe src={viewerUrl} title="anexo" style={{flex:1,width:'100%',border:'none'}}/>}
        </div>
      </div>}
    </div></div></div>;
}

// ============================ ROW / EMPTY HELPERS ===========================
const Empty=({text})=><div style={{textAlign:'center',padding:'40px 0',color:'var(--muted)'}}><div style={{fontSize:32,marginBottom:8}}>📁</div><div style={{fontWeight:600,fontSize:13}}>{text}</div></div>;
function ProjectRow({p,onSelect,showInt}){const c=CATS[p.category];const days=daysLeft(p.expires_at);const intName=p.channel_links?.integrador?.name;
  const ativo=p.status==='aprovado';const urgente=ativo&&days>=0&&days<=7;const atencao=ativo&&days>7&&days<=15;const expirado=ativo&&days<0;
  return <div onClick={()=>onSelect(p)} className="card" style={{padding:'11px 14px',cursor:'pointer',marginBottom:8,borderLeft:`4px solid ${urgente||expirado?'#DC2626':atencao?'#D97706':c?.color||'#ccc'}`}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10}}>
      <div><div style={{display:'flex',gap:5,marginBottom:3,flexWrap:'wrap'}}><CatBadge cat={p.category}/><StatusBadge status={p.status}/>
        {p.possible_conflict&&<span style={{fontSize:10,fontWeight:800,color:'#92400E',background:'#FEF3C7',padding:'2px 7px',borderRadius:99}}>⚠️ conflito</span>}
        {urgente&&<span style={{fontSize:10,fontWeight:800,color:'#fff',background:'#DC2626',padding:'2px 7px',borderRadius:99}}>🔥 {days===0?'expira hoje':'expira em '+days+'d'}</span>}
        {expirado&&<span style={{fontSize:10,fontWeight:800,color:'#fff',background:'#991B1B',padding:'2px 7px',borderRadius:99}}>⛔ expirado</span>}
        {p.status==='aprovado'&&p.descontos_sistema&&Object.values(p.descontos_sistema).some(v=>v)&&<span style={{fontSize:10,fontWeight:800,color:'#059669',background:'#D1FAE5',padding:'2px 7px',borderRadius:99}}>💰 {Object.entries(p.descontos_sistema).filter(([k,v])=>v).map(([k,v])=>v).join(' / ')}</span>}</div>
        <div style={{fontWeight:700,fontSize:13,color:'#1E293B'}}>{p.title}</div>
        <div style={{fontSize:11,color:'var(--muted)'}}>{p.client_name} · {p.stage}{showInt&&intName?` · ${intName}`:''}</div></div>
      <div style={{textAlign:'right',flexShrink:0}}><div style={{fontSize:10,color:'var(--muted)'}}>Expira</div>
        <div style={{fontSize:12,fontWeight:700,color:days<=15?'#DC2626':'var(--slate)'}}>{days>0?`${days}d`:'Expirado'}</div></div>
    </div></div>;}
const Filter=({active,onClick,children})=><button onClick={onClick} style={{padding:'4px 10px',borderRadius:6,border:'1.5px solid',borderColor:active?'var(--navy)':'var(--border)',background:active?'#EAF2FB':'#fff',color:active?'var(--navy)':'var(--muted)',fontSize:11,fontWeight:600}}>{children}</button>;

// ============================ INTEGRADOR DASHBOARD =========================
function IntegradorDashboard(){
  const {org,membership,isAdmin,can}=useAuth();
  const [tab,setTab]=useState('canais');const[links,setLinks]=useState([]);const[activeLink,setActiveLink]=useState(null);
  const [projects,setProjects]=useState([]);const[loading,setLoading]=useState(true);const[showNew,setShowNew]=useState(false);const[selected,setSelected]=useState(null);
  useEffect(()=>{window.__onPickProject=(p)=>{const full=projects.find(x=>x.id===p.id);setSelected(full||p);};return ()=>{window.__onPickProject=null;};},[projects]);
  const loadLinks=useCallback(async()=>{try{const d=await D.fetchMyFabricantes(org.id);setLinks(d);setActiveLink(cur=>cur||d.find(l=>l.status==='aprovado')||null);}catch(e){console.error(e);}},[org.id]);
  const loadProjects=useCallback(async()=>{if(!activeLink){setProjects([]);return;}try{setProjects(await D.fetchProjects(activeLink.id));}catch(e){console.error(e);}},[activeLink]);
  const [allProj,setAllProj]=useState([]);
  useEffect(()=>{if(tab==='relatorios'){(async()=>{try{setAllProj(await D.fetchMyProjectsAll(org.id));}catch(e){console.error(e);}})();}},[tab,org.id]);
  useEffect(()=>{(async()=>{await loadLinks();setLoading(false);})();return D.subLinks(loadLinks);},[loadLinks]);
  useEffect(()=>{loadProjects();return D.subProjects(loadProjects);},[loadProjects]);
  const activeProjects=projects.filter(p=>!['encerrado','expirado','reprovado'].includes(p.status));
  const stats={total:projects.length,aprovados:projects.filter(p=>p.status==='aprovado').length,pendentes:projects.filter(p=>p.status==='pendente').length,expirando:projects.filter(p=>p.status==='aprovado'&&daysLeft(p.expires_at)<=15).length};
  const converted=projects.filter(p=>p.status==='convertido').length;
  const closed=projects.filter(p=>['convertido','encerrado','reprovado','expirado'].includes(p.status)).length;
  const score=useMemo(()=>calcScore({converted,closed}),[converted,closed]);
  const atLimit=activeProjects.length>=MAX_ACTIVE;const tier=activeLink?.tier||'silver';
  const tabs=[['canais','🤝 Fabricantes'],['dashboard','📊 Dashboard'],['projetos','📁 Projetos'],['beneficios','🎁 Benefícios'],['relatorios','📑 Relatórios']];
  if(can.verAdmin){tabs.push(['usuarios','👤 Usuários']);tabs.push(['historico','🕓 Histórico']);}
  const ScoreGauge=({score})=>{const col=score>=50?'#10B981':score>=20?'#D97706':'#DC2626';
    return <div style={{display:'flex',alignItems:'center',gap:10}}><div style={{width:52,height:52,borderRadius:'50%',border:`4px solid ${col}`,display:'flex',alignItems:'center',justifyContent:'center'}}><span style={{fontSize:14,fontWeight:900,color:col}}>{score}%</span></div>
      <div><div style={{fontSize:12,fontWeight:700,color:col}}>Score {score>=50?'Alto':score>=20?'Médio':'Baixo'}</div><div style={{fontSize:10,color:'var(--muted)'}}>neste canal</div></div></div>;};
  return <div style={{minHeight:'100vh'}}><Header tabs={tabs} active={tab} onTab={setTab}/>
    <main className="container" style={{padding:'18px 16px 40px'}}>
      {tab!=='canais'&&tab!=='usuarios'&&links.filter(l=>l.status==='aprovado').length>0&&
        <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:16,flexWrap:'wrap'}}>
          <span style={{fontSize:12,color:'var(--muted)',fontWeight:600}}>Fabricante:</span>
          {links.filter(l=>l.status==='aprovado').map(l=><button key={l.id} onClick={()=>setActiveLink(l)} style={{padding:'6px 12px',borderRadius:8,border:'1.5px solid',borderColor:activeLink?.id===l.id?'var(--navy)':'var(--border)',background:activeLink?.id===l.id?'#EAF2FB':'#fff',fontSize:12,fontWeight:700,color:activeLink?.id===l.id?'var(--navy)':'var(--slate)'}}>🏭 {l.fabricante?.name} <span style={{fontWeight:400,color:'var(--muted)'}}>· {l.tier}</span></button>)}
        </div>}
      {loading?<div className="spinner"/>:<>
        {tab==='canais'&&<CanaisTab org={org} links={links} onChanged={loadLinks} onGo={(l)=>{setActiveLink(l);setTab('projetos');}}/>}
        {tab==='usuarios'&&<MembersPanel orgId={org.id} myId={membership.id} isAdmin={isAdmin}/>}
        {tab==='historico'&&isAdmin&&<AuditPanel orgId={org.id}/>}
        {tab==='relatorios'&&<ReportsPanel projects={allProj} ints={[]} isFabricante={false} orgName={org.name} orgLogo={org.logo_path}/>}
        {!activeLink&&['dashboard','projetos','descontos'].includes(tab)&&<Empty text="Selecione ou solicite vínculo a um fabricante na aba Fabricantes."/>}
        {activeLink&&tab==='dashboard'&&<>
          <div className="grid grid-2" style={{marginBottom:14}}>
            <div className="card" style={{padding:16}}><div style={{fontWeight:700,fontSize:12,color:'#1E293B',marginBottom:10}}>Score de Conversão</div><ScoreGauge score={score}/></div>
            <div className="card" style={{padding:16}}><div style={{fontWeight:700,fontSize:12,color:'#1E293B',marginBottom:10}}>Seu nível neste canal</div><TierBadge tier={tier}/></div></div>
          <div className="grid grid-4" style={{marginBottom:14}}>
            {[['Total','📁',stats.total,'#1A3C6E'],['Aprovados','✅',stats.aprovados,'#10B981'],['Pendentes','⏳',stats.pendentes,'#D97706'],['Expirando','🔔',stats.expirando,'#8B5CF6']].map(([l,ic,v,co])=>
              <div key={l} className="card" style={{padding:'11px 13px'}}><div style={{fontSize:22,fontWeight:800,color:co}}>{v}</div><div style={{fontSize:10,color:'var(--muted)',marginTop:1}}>{ic} {l}</div></div>)}</div>
          {(()=>{const ins=[];
            const vencendo=projects.filter(p=>p.status==='aprovado'&&daysLeft(p.expires_at)<=15&&daysLeft(p.expires_at)>=0);
            const vencidos=projects.filter(p=>p.status==='aprovado'&&daysLeft(p.expires_at)<0);
            const pend=projects.filter(p=>p.status==='pendente');

  const [opts,setOpts]=useState({status:true,categoria:true,ranking:true,vencendo:true,lista:true});

  const tog=(k)=>setOpts(p=>({...p,[k]:!p[k]}));
  const STLAB={pendente:'Pendentes',aprovado:'Aprovados',reprovado:'Reprovados',convertido:'Convertidos',encerrado:'Encerrados',conflito:'Conflitos'};

  // marcas presentes nos projetos (para o filtro)
  const marcasDisp=(()=>{const s=new Set();projects.forEach(p=>(p.systems||[]).forEach(sy=>{if(sy.itens?._marca)s.add(sy.itens._marca);}));return [...s].sort();})();
  const intsDisp=(()=>{const s=new Set();projects.forEach(p=>{const n=p.channel_links?.integrador?.name;if(n)s.add(n);});return [...s].sort();})();
  const fabsDisp=(()=>{const s=new Set();projects.forEach(p=>{if(p._fabricante)s.add(p._fabricante);});return [...s].sort();})();
  const [fFab,setFFab]=useState('');

    const d=new Date(p.registered_at);
    if(de&&d<new Date(de))return false;
    if(ate&&d>new Date(ate+'T23:59:59'))return false;
    if(fInt&&(p.channel_links?.integrador?.name||'')!==fInt)return false;
    if(fFab&&(p._fabricante||'')!==fFab)return false;
    if(fProj){const t=fProj.toLowerCase();if(!String(p.title||'').toLowerCase().includes(t)&&!String(p.client_name||'').toLowerCase().includes(t))return false;}
    if(fSis&&!(p.systems||[]).some(sy=>sy.sistema===fSis))return false;
    if(fMarca&&!(p.systems||[]).some(sy=>sy.itens?._marca===fMarca))return false;
    return true;
  };

  const ranking=()=>{const m={};ps.forEach(p=>{const n=p.channel_links?.integrador?.name||'—';if(!m[n])m[n]={total:0,aprov:0,conv:0};m[n].total++;if(p.status==='aprovado')m[n].aprov++;if(p.status==='convertido')m[n].conv++;});return Object.entries(m).sort((a,b)=>b[1].total-a[1].total);};

function FaturasPanel({orgId}){

  const LAB={pago:'Paga',pendente:'A vencer',vencido:'Vencida'};
  const COL={pago:'#10B981',pendente:'#D97706',vencido:'#DC2626'};

  const proximas=invs.filter(i=>i.status!=='pago'&&new Date(i.vencimento)>=hoje);

  if(loading)return <div className="spinner"/>;

        <div style={{fontSize:11,color:'var(--muted)'}}>{i.plano_nome||''} · vence {new Date(i.vencimento).toLocaleDateString('pt-BR')}{i.pago_em?(' · paga em '+new Date(i.pago_em).toLocaleDateString('pt-BR')):''}</div></div>
      <div style={{textAlign:'right'}}><div style={{fontSize:16,fontWeight:800,color:'#1E293B'}}>{fmt(i.valor_cents)}</div>

  return <>

      {proximas.length>0&&<><div style={{fontWeight:700,fontSize:13,color:'#92400E',margin:'14px 0 8px'}}>⏳ Próximas faturas ({proximas.length})</div>{proximas.map(i=><Card key={i.id} i={i}/>)}</>}
      {pagas.length>0&&<><div style={{fontWeight:700,fontSize:13,color:'#166534',margin:'14px 0 8px'}}>✅ Faturas pagas ({pagas.length})</div>{pagas.map(i=><Card key={i.id} i={i}/>)}</>}
    </>}
  </>;
}
function AuditPanel({orgId}){
  const [logs,setLogs]=useState([]);const[loading,setLoading]=useState(true);const[filtro,setFiltro]=useState('todos');const[q,setQ]=useState('');
  useEffect(()=>{(async()=>{try{setLogs(await D.fetchAuditLog(orgId));}catch(e){console.error(e);}finally{setLoading(false);}})();},[orgId]);
  const ICONS={'projeto.criar':'➕','projeto.aprovar':'✅','projeto.reprovar':'❌','projeto.atualizar':'📝','projeto.editar_desconto':'💰','anexo.adicionar':'📎','anexo.remover':'🗑️','integrador.excluir':'🔧','integrador.status':'🔧','integrador.tier':'🏅','marca.editar':'🏷️','usuario.criar':'👤','usuario.excluir':'🚫','usuario.senha':'🔑'};
  const ACAO={'projeto.criar':'Projeto criado','projeto.aprovar':'Projeto aprovado','projeto.reprovar':'Projeto reprovado','projeto.atualizar':'Atualização adicionada','projeto.editar_desconto':'Descontos alterados','anexo.adicionar':'Anexo adicionado','anexo.remover':'Anexo removido','integrador.excluir':'Integrador excluído','integrador.status':'Status do integrador','integrador.tier':'Nível do integrador','marca.editar':'Marcas atualizadas','usuario.criar':'Usuário criado','usuario.excluir':'Usuário removido','usuario.senha':'Senha redefinida'};
  const tipos=[['todos','Tudo'],['projeto','Projetos'],['anexo','Anexos'],['integrador','Integradores'],['marca','Marcas'],['usuario','Usuários']];
  const term=q.trim().toLowerCase();
  const shown=logs.filter(l=>(filtro==='todos'||(l.entity||'').startsWith(filtro)||(l.action||'').startsWith(filtro))&&(!term||[l.summary,l.actor_name,ACAO[l.action]].some(v=>String(v||'').toLowerCase().includes(term))));
  // separa o "De → Para" do resto do summary para destacar
  const splitDePara=(s)=>{if(!s)return{txt:'',dp:null};const i=s.indexOf(' — ');if(i<0)return{txt:s,dp:null};return{txt:s.slice(0,i),dp:s.slice(i+3)};};
  if(loading)return <div className="spinner"/>;
  return <>
    <div style={{fontWeight:800,fontSize:17,color:'#1E293B',marginBottom:4}}>Histórico de modificações</div>
    <div style={{fontSize:12,color:'var(--muted)',marginBottom:14}}>Registro de quem fez o quê e quando. Visível apenas para administradores.</div>
    <SearchBox value={q} onChange={setQ} placeholder="Buscar no histórico (projeto, usuário, ação)…"/>
    <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>{tipos.map(([k,l])=><button key={k} onClick={()=>setFiltro(k)} style={{padding:'4px 10px',borderRadius:6,border:'1.5px solid',borderColor:filtro===k?'var(--navy)':'var(--border)',background:filtro===k?'#EAF2FB':'#fff',color:filtro===k?'var(--navy)':'var(--muted)',fontSize:11,fontWeight:600}}>{l}</button>)}</div>
    {shown.length===0?<Empty text="Nenhum registro encontrado."/>:
      <div style={{display:'flex',flexDirection:'column',gap:8}}>{shown.map(l=>{const{txt,dp}=splitDePara(l.summary);return <div key={l.id} className="card" style={{padding:'11px 14px',display:'flex',gap:10,alignItems:'flex-start'}}>
        <span style={{fontSize:18}}>{ICONS[l.action]||'•'}</span>
        <div style={{flex:1}}>
          <div style={{fontSize:11,fontWeight:700,color:'var(--navy)',textTransform:'uppercase',letterSpacing:'.3px'}}>{ACAO[l.action]||l.action}</div>
          <div style={{fontSize:13,color:'#1E293B',fontWeight:500,marginTop:1}}>{txt||l.summary}</div>
          {dp&&<div style={{fontSize:12,color:'var(--slate)',background:'#F8FAFC',borderRadius:6,padding:'6px 9px',marginTop:5}}>{dp}</div>}
          <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>👤 {l.actor_name||'—'} · {new Date(l.created_at).toLocaleString('pt-BR')}</div>
        </div>
      </div>;})}</div>}
  </>;
}
function MarcasPanel({orgId}){
  const {org,refresh}=useAuth();
  const [marcas,setMarcas]=useState({});const[orig,setOrig]=useState({});const[loading,setLoading]=useState(true);const[busy,setBusy]=useState(false);const[saved,setSaved]=useState(false);const[logoBusy,setLogoBusy]=useState(false);
  const onLogo=async(e)=>{const f=e.target.files?.[0];if(!f)return;if(!f.type.startsWith('image/')){alert('Selecione uma imagem.');return;}if(f.size>2097152){alert('Máximo 2 MB.');return;}setLogoBusy(true);try{await D.uploadLogo(orgId,f);await refresh?.();alert('Logo atualizada!');}catch(err){alert('Erro: '+err.message);}finally{setLogoBusy(false);e.target.value='';}};
  const [novo,setNovo]=useState({});  // texto do campo "outra marca" por sistema
  const load=useCallback(async()=>{try{const m=await D.fetchOrgMarcas(orgId);setMarcas(m);setOrig(JSON.parse(JSON.stringify(m)));}catch(e){console.error(e);}finally{setLoading(false);}},[orgId]);
  useEffect(()=>{load();},[load]);
  const addOutra=(sk)=>{const t=(novo[sk]||'').trim();if(!t)return;setSaved(false);setMarcas(p=>({...p,[sk]:[...(p[sk]||[]),t]}));setNovo(p=>({...p,[sk]:''}));};
  const removeMarca=(sk,marca)=>{setSaved(false);setMarcas(p=>({...p,[sk]:(p[sk]||[]).filter(m=>m!==marca)}));};
  const salvar=async()=>{setBusy(true);try{
    const mud=[];Object.keys(SISTEMAS).forEach(k=>{const a=new Set(orig[k]||[]);const d=new Set(marcas[k]||[]);
      const add=[...d].filter(x=>!a.has(x));const rem=[...a].filter(x=>!d.has(x));
