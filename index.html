<script type="text/babel" data-presets="react">
const { useState, useEffect, useCallback, useMemo, useRef, createContext, useContext } = React;

// ============================ CONSTANTES (politica v6) ======================
const MAX_ACTIVE = 20;
const ROLE_LABELS={admin:'Administrador',member:'Usuário',comercial:'Comercial (visualização)',prevenda:'Pré-venda',financeiro:'Financeiro'};
const roleLabel=(r)=>ROLE_LABELS[r]||'Usuário';
const CATS = {
  cat1:{label:'CAT 1 — Especificação',short:'CAT 1',cycle:'> 12 meses',color:'#0D9488',bg:'#E8F8F5',validityDays:180,icon:'🏗️',

  cat3:{label:'CAT 3 — Venda Ativa',short:'CAT 3',cycle:'3 a 6 meses',color:'#10B981',bg:'#ECFDF5',validityDays:90,icon:'🚀',
    stages:['Aprovação Confirmada pelo Cliente','Pedido Iminente (< 30 dias)','Aguardando Emissão de Pedido'],
    discounts:{silver:'Até 10%',gold:'Até 15%',platinum:'Até 18%'}},
};
const POLITICA_FABRICA = () => ({
  validadeDias:{cat1:CATS.cat1.validityDays,cat2:CATS.cat2.validityDays,cat3:CATS.cat3.validityDays},
  descontos:{
    cat1:{...CATS.cat1.discounts},
    cat2:{...CATS.cat2.discounts},
    cat3:{...CATS.cat3.discounts},
  },
  beneficios:[],
  portes:{cftv:[50,120,250],acesso:[10,30,100],incendio:[100,300,600],automacao:[20,100,500],fechaduras:[50,100,200]}
});
const TIERS = {
  silver:{label:'🥉 Silver',color:'#64748B',bg:'#F1F5F9',border:'#CBD5E1'},
  gold:{label:'🥈 Gold',color:'#B45309',bg:'#FEF3C7',border:'#FCD34D'},
  platinum:{label:'🥇 Platinum',color:'#4338CA',bg:'#EDE9FE',border:'#A5B4FC'},
};
const STATUS = {
  pendente:{label:'Pendente',color:'#D97706',bg:'#FEF3C7'},
  aprovado:{label:'Aprovado',color:'#059669',bg:'#D1FAE5'},
  rejeitado:{label:'Rejeitado',color:'#DC2626',bg:'#FEE2E2'},
  reprovado:{label:'Reprovado',color:'#DC2626',bg:'#FEE2E2'},
  suspenso:{label:'Suspenso',color:'#DC2626',bg:'#FEE2E2'},
  conflito:{label:'Conflito',color:'#DC2626',bg:'#FEE2E2'},
  convertido:{label:'Convertido',color:'#4338CA',bg:'#EDE9FE'},
  encerrado:{label:'Encerrado',color:'#64748B',bg:'#F1F5F9'},
  expirado:{label:'Expirado',color:'#991B1B',bg:'#FEE2E2'},
};
// Faixas de porte por sistema (limite superior de cada faixa; acima do último = "Muito grande")
const PORTES = {
  cftv:    [[50,'Pequeno'],[120,'Médio'],[250,'Grande']],
  acesso:  [[10,'Pequeno'],[30,'Médio'],[100,'Grande']],
  incendio:[[100,'Pequeno'],[300,'Médio'],[600,'Grande']],
  automacao:[[20,'Pequeno'],[100,'Médio'],[500,'Grande']],
  fechaduras:[[50,'Pequeno'],[100,'Médio'],[200,'Grande']],
};
const PORTE_COR = {'Pequeno':'#64748B','Médio':'#2E6CA8','Grande':'#B45309','Muito grande':'#4338CA'};
// retorna o rótulo de porte para um sistema dada a quantidade, ou null se não há quantidade/faixa
function porteDe(sistema, qtd, custom){
  const n = parseInt(qtd,10);
  if(!n || n<=0) return null;
  let faixas = PORTES[sistema];
  // custom: objeto {sistema:[p,m,g]} vindo da política do fabricante
  if(custom && custom[sistema] && custom[sistema].length===3){
    const c = custom[sistema];
    faixas = [[c[0],'Pequeno'],[c[1],'Médio'],[c[2],'Grande']];
  }
  if(!faixas) return null;
  for(const [lim,lbl] of faixas){ if(n<=lim) return lbl; }
  return 'Muito grande';
}
const EVIDENCE_TYPES = [
  {id:'visita',label:'Visita Técnica Documentada',cats:['cat1','cat2','cat3']},
  {id:'email',label:'E-mail / Contato Formal',cats:['cat1','cat2','cat3']},
  {id:'projetista',label:'Indicação do Projetista',cats:['cat1','cat2','cat3']},
  {id:'proposta',label:'Proposta Técnica Entregue',cats:['cat2','cat3'],mandatoryFor:['cat2','cat3']},
];
const BUILDING_TYPES = ['Hotel','Prédio Comercial','Galpão / Logística','Shopping Center','Hospital / Clínica','Escola / Universidade','Condomínio','Governo / Público','Outro'];
const SISTEMAS = {
  cftv:{label:'CFTV',icon:'📹',itens:[{key:'cameras',label:'Câmeras'},{key:'gravadores',label:'Gravadores (NVR/DVR)'}],
    marcas:['Hikvision','Intelbras','Dahua','Axis','Bosch','Hanwha','Outro']},
  incendio:{label:'Detecção de Incêndio',icon:'🔥',itens:[{key:'paineis',label:'Painéis'},{key:'dispositivos',label:'Dispositivos (detectores/acionadores)'}],
    marcas:['Notifier','Morley','Silent Knight','Farenhyt','Xtralis (Vesda e/ou OSID)','LionTamer','ESSER','Outro']},
  acesso:{label:'Controle de Acesso',icon:'🚪',itens:[{key:'controladores',label:'Controladores'},{key:'portas',label:'Portas'},{key:'leitoras',label:'Leitoras'},{key:'catracas',label:'Catracas'}],
    marcas:['HID','Control iD','Intelbras','Nice/Linear','ZKTeco','Honeywell','Outro']},
  automacao:{label:'Automação',icon:'⚙️',itens:[{key:'controladores',label:'Controladores'},{key:'sensores',label:'Sensores'},{key:'valvulas',label:'Válvulas'}],
    marcas:['KNX','Crestron','Control4','Lutron','Savant','Outro']},
  fechaduras:{label:'Fechaduras',icon:'🔐',itens:[{key:'fechaduras',label:'Fechaduras'},{key:'controladoras',label:'Controladoras'}],
    marcas:['Outro']},
};
const SISTEMAS_FABRICA = () => Object.entries(SISTEMAS).map(([key,s])=>({key,label:s.label,icon:s.icon,marcas:[...s.marcas]}));
const ICONES_SISTEMA = ['📹','🔥','🚪','⚙️','🔐','🛰️','📡','🔔','💡','🌡️','🚨','🎥','🖥️','🔌','🛗','🧯','🚧','📶','🔋','🏭','📦'];
const TIPOS_ATUALIZACAO = ['Reunião','Visita','Nova documentação/proposta','Revisão documentação/proposta'];
const BENEFICIOS = {
  silver:['Registro de até 20 projetos ativos','Descontos de registro (CAT1 5% · CAT2 8% · CAT3 10%)','Suporte comercial padrão','Acesso ao portal de oportunidades'],
  gold:['Tudo do Silver','Descontos maiores (CAT1 8% · CAT2 12% · CAT3 15%)','Prioridade na análise de registros','Apoio em especificação técnica'],
  platinum:['Tudo do Gold','Maiores descontos (CAT1 12% · CAT2 15% · CAT3 18%)','Gerente de canal dedicado','Participação em treinamentos e lançamentos','Leads qualificados repassados pelo fabricante'],
};
const calcScore = ({converted=0,closed=0}) => closed>0 ? Math.round((converted/closed)*100) : 0;
const daysLeft = d => Math.ceil((new Date(d)-new Date())/86400000);
// Valida CNPJ (formato e dígitos verificadores). Aceita vazio (validação opcional no uso).
const soDigitos = s => String(s||'').replace(/\D/g,'');
const validaCNPJ = (v) => {
  const c = soDigitos(v);
  if(c.length!==14) return false;
  if(/^(\d)\1{13}$/.test(c)) return false;
  const calc = (base) => {
    let soma=0, pos=base.length-7;
    for(let i=0;i<base.length;i++){ soma+=parseInt(base[i],10)*pos--; if(pos<2)pos=9; }
    const r=soma%11; return r<2?0:11-r;
  };
  const d1=calc(c.slice(0,12));
  const d2=calc(c.slice(0,12)+d1);
  return c[12]===String(d1) && c[13]===String(d2);
};
const formataCNPJ = (v) => { const c=soDigitos(v).slice(0,14); return c.replace(/^(\d{2})(\d)/,'$1.$2').replace(/^(\d{2})\.(\d{3})(\d)/,'$1.$2.$3').replace(/\.(\d{3})(\d)/,'.$1/$2').replace(/(\d{4})(\d)/,'$1-$2'); };
const validaEmail = (v) => /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(String(v||'').trim());
const formataTelefone = (v) => { let d=soDigitos(v).slice(0,11); if(d.length<=10){return d.replace(/^(\d{2})(\d)/,'($1) $2').replace(/(\d{4})(\d)/,'$1-$2');} return d.replace(/^(\d{2})(\d)/,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2'); };
const validaTelefone = (v) => { const d=soDigitos(v); return d.length===10||d.length===11; };
const maskCNPJ = (v) => { const d=soDigitos(v).slice(0,14); return d.replace(/^(\d{2})(\d)/,'$1.$2').replace(/^(\d{2})\.(\d{3})(\d)/,'$1.$2.$3').replace(/\.(\d{3})(\d)/,'.$1/$2').replace(/(\d{4})(\d)/,'$1-$2'); };
const maskTelefone = (v) => { const d=soDigitos(v).slice(0,11); if(d.length<=10)return d.replace(/^(\d{2})(\d)/,'($1) $2').replace(/(\d{4})(\d)/,'$1-$2'); return d.replace(/^(\d{2})(\d)/,'($1) $2').replace(/(\d{5})(\d)/,'$1-$2'); };
// Score de conversão (0-100): combina avanço de estágio, evidências e categoria.
const scoreConversao = (p) => {
  if(!p) return 0;
  const cat=CATS[p.category];
  let s=0;
  // base por categoria (CAT3 está mais perto da venda)
  s += p.category==='cat3'?40:p.category==='cat2'?25:12;
  // avanço de estágio dentro da categoria
  if(cat&&cat.stages&&cat.stages.length){const idx=cat.stages.indexOf(p.stage);if(idx>=0)s+=Math.round((idx/(cat.stages.length-1||1))*30);}
  // evidências anexadas
  const nEv=(p.evidences||[]).length;s+=Math.min(20,nEv*7);
  // já aprovado dá um empurrão
  if(p.status==='aprovado')s+=10;
  if(p.status==='convertido')s=100;
  return Math.max(0,Math.min(100,s));
};
const scoreLabel = (s)=> s>=70?{t:'Alta',c:'#10B981'}:s>=40?{t:'Média',c:'#D97706'}:{t:'Baixa',c:'#64748B'};
const calcExpiry = (c, dias) => { const d = (dias!=null?dias:(CATS[c]?CATS[c].validityDays:90)); return new Date(Date.now()+d*86400000).toISOString(); };

// ============================ BADGES ========================================
const StatusBadge = ({status}) => { const s=STATUS[status]||STATUS.pendente;
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 9px',borderRadius:99,fontSize:11,fontWeight:700,color:s.color,background:s.bg}}>
    <span style={{width:5,height:5,borderRadius:'50%',background:s.color}}/>{s.label}</span>; };
const CatBadge = ({cat}) => { const c=CATS[cat]; if(!c)return null;
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 8px',borderRadius:99,fontSize:11,fontWeight:700,color:c.color,background:c.bg}}>{c.icon} {c.short}</span>; };
const TierBadge = ({tier}) => { const t=TIERS[tier]; if(!t)return null;
  return <span style={{display:'inline-flex',alignItems:'center',gap:4,padding:'2px 10px',borderRadius:99,fontSize:11,fontWeight:700,color:t.color,background:t.bg,border:`1px solid ${t.border}`}}>{t.label}</span>; };

// ============================ AUTH CONTEXT ==================================
const AuthCtx = createContext(null);
const useAuth = () => useContext(AuthCtx);

function AuthProvider({children}){
  const [session,setSession]=useState(null);
  const [recoveryMode,setRecoveryMode]=useState(false);
  const [membership,setMembership]=useState(null);
  const [org,setOrg]=useState(null);
  const [loading,setLoading]=useState(true);

  const loadContext = useCallback(async (uid)=>{
    const {data,error}=await sb.from('memberships').select('*, organizations(*)').eq('user_id',uid).single();
    if(error||!data){setMembership(null);setOrg(null);return;}
    setMembership({id:data.id,role:data.role,full_name:data.full_name,org_id:data.org_id,is_developer:!!data.is_developer,onboarded:!!data.onboarded});
    setOrg(data.organizations);
    window.__ACTOR={id:uid,name:data.full_name,org_id:data.org_id};window.__IS_DEV=!!data.is_developer;
    // registra acesso (1x por sessão do navegador)
    try{const k='__acesso_'+uid;if(!sessionStorage.getItem(k)){sessionStorage.setItem(k,'1');sb.from('access_log').insert({user_id:uid,user_name:data.full_name,org_id:data.org_id,org_name:data.organizations?.name}).then(()=>{}).catch(()=>{});}}catch(e){}
  },[]);

  useEffect(()=>{
    if(!sb){setLoading(false);return;}
    sb.auth.getSession().then(async ({data:{session}})=>{
      setSession(session); if(session?.user) await loadContext(session.user.id); setLoading(false);
    });
    const {data:{subscription}}=sb.auth.onAuthStateChange(async (_e,session)=>{
      if(_e==='PASSWORD_RECOVERY'){setRecoveryMode(true);setSession(session);setLoading(false);return;}
      setSession(session); if(session?.user) await loadContext(session.user.id); else {setMembership(null);setOrg(null);}
    });
    return ()=>subscription.unsubscribe();
  },[loadContext]);

  const signUp=async ({email,password,fullName,orgType,orgName,cnpj,phone,marcas})=>
    sb.auth.signUp({email,password,options:{data:{full_name:fullName,org_type:orgType,org_name:orgName,cnpj,phone,marcas:marcas||{}}}});
  const signIn=async ({email,password})=>sb.auth.signInWithPassword({email,password});
  const signOut=async ()=>{await sb.auth.signOut();setMembership(null);setOrg(null);setSession(null);window.__ACTOR={id:null,name:null,org_id:null};};
  const resetPasswordEmail=async (email)=>sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.href.split('#')[0]});
  const updatePassword=async (novaSenha)=>{const{error}=await sb.auth.updateUser({password:novaSenha});if(error)throw error;};
  const finishRecovery=async ()=>{setRecoveryMode(false);await sb.auth.signOut();setSession(null);setMembership(null);setOrg(null);};
  const refresh=useCallback(async ()=>{if(session?.user)await loadContext(session.user.id);},[session,loadContext]);
  // Expiração de sessão por inatividade (60 min)
  useEffect(()=>{
    if(!session?.user)return;
    const LIMITE=60*60*1000;let timer;
    const reset=()=>{clearTimeout(timer);timer=setTimeout(()=>{alert('Sua sessão expirou por inatividade. Faça login novamente.');signOut();},LIMITE);};
    const evs=['mousedown','keydown','touchstart','scroll'];
    evs.forEach(e=>window.addEventListener(e,reset,{passive:true}));
    reset();
    return ()=>{clearTimeout(timer);evs.forEach(e=>window.removeEventListener(e,reset));};
  },[session]);

  return <AuthCtx.Provider value={{session,user:session?.user??null,membership,org,loading,
    isFabricante:org?.type==='fabricante',isIntegrador:org?.type==='integrador',isAdmin:membership?.role==='admin',isDeveloper:!!membership?.is_developer,
    role:membership?.role||'member',
    can:{
      // o que cada papel pode fazer
      verAdmin:membership?.role==='admin',                                  // usuários
      verFinanceiro:['admin','financeiro'].includes(membership?.role),      // faturas/plano
      editarProjetos:(['admin','member'].includes(membership?.role))||(membership?.role==='prevenda'&&org?.type==='integrador'), // criar/editar/excluir projetos
      somenteLeitura:['comercial','leitura'].includes(membership?.role)||(membership?.role==='prevenda'&&org?.type!=='integrador'),
    },
    signUp,signIn,signOut,refresh,resetPasswordEmail,recoveryMode,updatePassword,finishRecovery}}>{children}</AuthCtx.Provider>;
}

  // normaliza endereço para comparar (minúsculas, sem espaços extras)
  _normEnd:(s)=>String(s||'').toLowerCase().replace(/\s+/g,' ').trim(),
  // normaliza nome de projeto: tira acento, troca _/-/espaços por nada, minúsculas (para comparar similaridade de digitação)
  _normNome:(s)=>String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]/g,''),
  // chaves de sistema de um projeto (ex.: ['cftv','acesso'])
  _sysKeys:(arr)=>(arr||[]).map(s=>s&&s.sistema).filter(Boolean),
  // só os dígitos de um CNPJ (para comparar ignorando pontuação)
  _soDig:(s)=>String(s||'').replace(/\D/g,''),
  // normaliza endereço de forma forte: minúsculas, sem acento, expande abreviações comuns,
  // remove pontuação e palavras pouco informativas — devolve um conjunto de "tokens"
  _endTokens:(s)=>{
    let t=String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    const abrev={'av':'avenida','ave':'avenida','r':'rua','rod':'rodovia','al':'alameda','pc':'praca','praca':'praca','trav':'travessa','tv':'travessa','est':'estrada','n':'numero','no':'numero','num':'numero','nº':'numero','apto':'apartamento','ap':'apartamento','bl':'bloco','qd':'quadra','lt':'lote','km':'km'};
    t=t.replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
    const stop=new Set(['de','da','do','das','dos','e','numero','n','complemento','sn','s']);
    return t.split(' ').map(w=>abrev[w]||w).filter(w=>w&&!stop.has(w));
  },
  // similaridade de endereço (0 a 1) via coeficiente de Jaccard sobre os tokens
  _simEnd:(a,b)=>{
    const A=new Set(D._endTokens(a)),B=new Set(D._endTokens(b));
    if(!A.size||!B.size)return 0;
    let inter=0;A.forEach(x=>{if(B.has(x))inter++;});
    return inter/(A.size+B.size-inter);
  },
  createProject:async(p,evs,linkId,uid)=>{
    // Regra de conflito (item 17):
    //  - mesmo CNPJ + mesmo endereço + sistemas que se sobrepõem
    //  - integrador DIFERENTE  -> CONFLITO (bloqueia/sinaliza)
    //  - mesmo integrador      -> apenas ALERTA (não é conflito)
    //  - sistemas distintos     -> sem conflito nem alerta
    let conflict=false, conflictNote=null, fabId=null;
    try{
      const{data:lk0}=await sb.from('channel_links').select('fabricante_id,integrador_id').eq('id',linkId).single();
      fabId=lk0?.fabricante_id||null;
      const meusSys=D._sysKeys(p.systems);
      const meuEnd=D._normEnd(p.address);
      const meuNome=D._normNome(p.obraNome||p.title);
      if(lk0?.fabricante_id&&meusSys.length&&(meuNome||meuEnd||D._soDig(p.clientCnpj))){
        const{data:links}=await sb.from('channel_links').select('id,integrador_id').eq('fabricante_id',lk0.fabricante_id);
        const ids=(links||[]).map(l=>l.id);
        const intPorLink={}; (links||[]).forEach(l=>{intPorLink[l.id]=l.integrador_id;});
        if(ids.length){
          const{data:existing}=await sb.from('projects')
            .select('id,title,obra_nome,client_cnpj,address,systems,status,link_id, channel_links(integrador:organizations!channel_links_integrador_id_fkey(name,cnpj))')
            .in('link_id',ids).in('status',['pendente','aprovado','conflito']);
          // CONFLITO por DOIS gatilhos independentes (qualquer um basta), sempre exigindo
          // ao menos 1 sistema em comum:
          //  (1) MESMO CNPJ do cliente final  -> amarra mesmo que construtora/endereço difiram
          //  (2) ENDEREÇO SIMILAR (aprox.) + nome parecido -> pega erros de digitação
          const meuCnpjCli=D._soDig(p.clientCnpj);
          const mesmos=(existing||[]).filter(e=>{
            const sys=D._sysKeys(e.systems);
            if(!sys.some(s=>meusSys.includes(s)))return false; // precisa de sistema em comum nos dois gatilhos
            // Gatilho 1: mesmo cliente final (CNPJ), quando ambos têm CNPJ de cliente
            const cnpjCli=D._soDig(e.client_cnpj);
            if(meuCnpjCli&&cnpjCli&&meuCnpjCli===cnpjCli)return true;
            // Gatilho 2: endereço similar + identificação da obra parecida
            const simEnd=D._simEnd(e.address,p.address);
            const nomeParecido=D._normNome(e.obra_nome||e.title)===meuNome;
            if(simEnd>=0.6&&nomeParecido)return true;
            return false;
          });
          const deOutro=mesmos.filter(e=>intPorLink[e.link_id]&&intPorLink[e.link_id]!==lk0.integrador_id);
          const doMesmo=mesmos.filter(e=>intPorLink[e.link_id]===lk0.integrador_id);
          if(deOutro.length){
            conflict=true;
            const o=deOutro[0];
            const nomeInt=o.channel_links?.integrador?.name||'outro integrador';
            const cnpjInt=o.channel_links?.integrador?.cnpj||'—';
            // sistemas em comum, para deixar claro onde está o conflito

// Tradução de erros técnicos para linguagem clara
function erroAmigavel(e){
  const m=(e&&e.message?e.message:String(e||'')).toLowerCase();
  if(m.includes('failed to fetch')||m.includes('networkerror')||m.includes('load failed'))return 'Sem conexão com o servidor. Verifique sua internet e tente de novo.';
  if(m.includes('duplicate key')||m.includes('already exists')||m.includes('23505'))return 'Este registro já existe.';
  if(m.includes('violates row-level security')||m.includes('permission')||m.includes('not authorized')||m.includes('insufficient_privilege'))return 'Você não tem permissão para esta ação.';
  if(m.includes('jwt')||m.includes('token')||m.includes('session'))return 'Sua sessão expirou. Entre novamente.';
  if(m.includes('invalid login')||m.includes('invalid credentials'))return 'E-mail ou senha incorretos.';
  if(m.includes('foreign key')||m.includes('23503'))return 'Não foi possível concluir: há dados vinculados a este item.';
  if(m.includes('payload too large')||m.includes('exceeded')||m.includes('413'))return 'Arquivo muito grande. O limite é 25 MB.';
  if(m.includes('timeout'))return 'A operação demorou demais. Tente novamente.';
  if(!m||m==='undefined')return 'Algo deu errado. Tente novamente.';
  return e&&e.message?e.message:'Algo deu errado. Tente novamente.';
}

    const {error}=await signIn({email,password});setBusy(false);if(error)setErr(trad(error.message));};
  const forgot=async()=>{setErr('');setMsg('');if(!email){setErr('Digite seu e-mail no campo acima e clique de novo em "Esqueci minha senha".');return;}
    setBusy(true);const{error}=await resetPasswordEmail(email);setBusy(false);
    if(error)setErr(trad(error.message));else setMsg('Enviamos um link de recuperação para '+email+'. Verifique sua caixa de entrada.');};
  return <AuthShell title="Entrar no Portal" subtitle="Acesse sua conta">
    <form onSubmit={submit}>
      <div style={{marginBottom:14}}><label className="label">E-mail</label>
        <input className="input" type="email" value={email} required onChange={e=>setEmail(e.target.value)} placeholder="voce@empresa.com"/></div>
      <div style={{marginBottom:8}}><label className="label">Senha</label>
        <PasswordInput value={password} onChange={setPassword} required/></div>
      <div style={{textAlign:'right',marginBottom:14}}><a onClick={forgot} style={{color:'var(--blue)',fontSize:12,fontWeight:600,cursor:'pointer'}}>Esqueci minha senha</a></div>
      {err&&<ErrBox msg={err}/>}
      {msg&&<div style={{background:'#D1FAE5',border:'1px solid #10B981',borderRadius:8,padding:'9px 12px',marginBottom:14,fontSize:13,color:'#166534'}}>{msg}</div>}
      <button className="btn btn-primary" style={{width:'100%'}} disabled={busy}>{busy?'Entrando…':'Entrar'}</button>
    </form>
    <p style={{marginTop:18,fontSize:13,textAlign:'center',color:'var(--muted)'}}>Ainda não tem conta?{' '}
      <a onClick={()=>go('signup')} style={{color:'var(--blue)',fontWeight:700,cursor:'pointer'}}>Cadastre-se</a></p>
  </AuthShell>;
}

function SignUp({go}){
  const {signUp}=useAuth();
  const [orgType,setOrgType]=useState('');
  const [form,setForm]=useState({fullName:'',orgName:'',cnpj:'',phone:'',email:'',password:''});
  const [err,setErr]=useState('');const[done,setDone]=useState(false);const[busy,setBusy]=useState(false);
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const [fabSys,setFabSys]=useState({});  // {incendio:'Notifier, Morley', cftv:'...'}
  const [logoFile,setLogoFile]=useState(null);
  const toggleFabSys=(k)=>setFabSys(p=>{const n={...p};if(k in n)delete n[k];else n[k]='';return n;});
  const setFabSysMarcas=(k,v)=>setFabSys(p=>({...p,[k]:v}));
  const submit=async(e)=>{e.preventDefault();setErr('');
    if(!validaCNPJ(form.cnpj)){setErr('Informe um CNPJ válido (com 14 dígitos).');return;}
    if(!validaTelefone(form.phone)){setErr('Informe um telefone válido com DDD (10 ou 11 dígitos).');return;}
    setBusy(true);
    const marcas={};if(orgType==='fabricante'){Object.entries(fabSys).forEach(([k,v])=>{const arr=String(v).split(',').map(s=>s.trim()).filter(Boolean);if(arr.length)marcas[k]=arr;});}
    const {error}=await signUp({...form,orgType,marcas});
    if(error){setBusy(false);setErr(trad(error.message));return;}
    if(logoFile){try{const{data:{session}}=await sb.auth.getSession();if(session?.user){const{data:mem}=await sb.from('memberships').select('org_id').eq('user_id',session.user.id).single();if(mem?.org_id)await D.uploadLogo(mem.org_id,logoFile);}}catch(e){console.error('logo signup',e);}}
    setBusy(false);setDone(true);};
  if(done) return <AuthShell title="Conta criada!" subtitle="Falta pouco">
    <div style={{background:'#D1FAE5',border:'1px solid #10B981',borderRadius:10,padding:16,fontSize:14,color:'#166534'}}>
      <p style={{marginBottom:8}}><strong>Sua empresa foi cadastrada e você é o administrador dela.</strong></p>
      <p style={{marginBottom:8}}>1. Confirme seu e-mail (se a confirmação estiver ativa).</p>
      {orgType==='integrador'?<p>2. Ao entrar, busque os fabricantes e solicite vínculo.</p>:<p>2. Ao entrar, aprove integradores e gerencie seu plano.</p>}
    </div>
    <button onClick={()=>go('login')} className="btn btn-primary" style={{width:'100%',marginTop:18}}>Ir para o login</button>
  </AuthShell>;
  if(!orgType) return <AuthShell title="Criar conta" subtitle="Você representa qual tipo de empresa?">
    {[['fabricante','🏭','Fabricante','Gerencio meu canal, aprovo integradores e concedo descontos.'],
      ['integrador','🔧','Integrador','Registro oportunidades junto a um ou mais fabricantes.']].map(([t,ic,tt,d])=>
      <button key={t} onClick={()=>setOrgType(t)} style={{display:'flex',alignItems:'center',gap:14,width:'100%',padding:16,borderRadius:12,border:'2px solid var(--border)',background:'#fff',marginBottom:10}}>
        <div style={{fontSize:26}}>{ic}</div><div style={{textAlign:'left'}}>
        <div style={{fontWeight:800,color:'var(--navy)',fontSize:14}}>{tt}</div>
        <div style={{fontSize:12,color:'var(--muted)'}}>{d}</div></div></button>)}
    <p style={{marginTop:16,fontSize:13,textAlign:'center',color:'var(--muted)'}}>Já tem conta?{' '}
      <a onClick={()=>go('login')} style={{color:'var(--blue)',fontWeight:700,cursor:'pointer'}}>Entrar</a></p>
  </AuthShell>;
  return <AuthShell title={`Cadastro — ${orgType==='fabricante'?'Fabricante':'Integrador'}`} subtitle="Você será o administrador da empresa.">
    <button onClick={()=>setOrgType('')} style={{background:'none',border:'none',color:'var(--blue)',fontSize:12,fontWeight:600,marginBottom:12,cursor:'pointer'}}>← trocar tipo</button>
    <form onSubmit={submit}>
      {[['Seu nome completo','fullName','text'],['Empresa (Razão Social)','orgName','text'],['CNPJ','cnpj','text'],['Telefone','phone','tel'],['E-mail','email','email']].map(([l,k,t])=>
        <div key={k} style={{marginBottom:12}}><label className="label">{l}</label>
          <input className="input" type={t} value={form[k]} required inputMode={k==='cnpj'||k==='phone'?'numeric':undefined} onChange={e=>set(k,k==='cnpj'?maskCNPJ(e.target.value):k==='phone'?maskTelefone(e.target.value):e.target.value)}/></div>)}
      <div style={{marginBottom:12}}><label className="label">Senha</label>
        <PasswordInput value={form.password} onChange={v=>set('password',v)} required minLength={6}/></div>
      {orgType==='fabricante'&&<div style={{marginBottom:12}}>
        <label className="label">Sistemas que você fabrica (selecione e informe as marcas)</label>
        {Object.entries(SISTEMAS).map(([sk,sd])=>{const on=sk in fabSys;return <div key={sk} style={{border:`2px solid ${on?'var(--navy)':'var(--border)'}`,borderRadius:9,padding:9,marginBottom:7,background:on?'#EAF2FB':'#fff'}}>
          <button type="button" onClick={()=>toggleFabSys(sk)} style={{display:'flex',alignItems:'center',gap:8,width:'100%',background:'none',border:'none',textAlign:'left'}}>
            <div style={{width:17,height:17,borderRadius:4,border:`2px solid ${on?'var(--navy)':'#CBD5E1'}`,background:on?'var(--navy)':'#fff',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>{on&&<span style={{color:'#fff',fontSize:10}}>✓</span>}</div>
            <span style={{fontSize:13,fontWeight:700,color:'#1E293B'}}>{sd.icon} {sd.label}</span></button>
          {on&&<input className="input" style={{marginTop:8,fontSize:12}} placeholder="Marcas separadas por vírgula (ex.: marca 1, marca 2)" value={fabSys[sk]} onChange={e=>setFabSysMarcas(sk,e.target.value)}/>}
        </div>;})}
        <div style={{fontSize:10,color:'var(--muted)'}}>Você poderá editar isso depois na aba “Marcas”.</div>
      </div>}
      {orgType==='fabricante'&&<div style={{marginBottom:12}}>
        <label className="label">Logo da empresa (opcional)</label>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          {logoFile?<img src={URL.createObjectURL(logoFile)} alt="logo" style={{width:48,height:48,borderRadius:9,objectFit:'cover',border:'1px solid var(--border)'}}/>:<div style={{width:48,height:48,borderRadius:9,background:'#F1F5F9',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20}}>🏭</div>}
          <label className="btn btn-ghost" style={{fontSize:12,cursor:'pointer'}}>{logoFile?'Trocar imagem':'Escolher imagem'}
            <input type="file" accept="image/*" style={{display:'none'}} onChange={e=>{const f=e.target.files?.[0];if(f){if(!f.type.startsWith('image/')){alert('Selecione uma imagem.');return;}if(f.size>2097152){alert('Máximo 2 MB.');return;}setLogoFile(f);}e.target.value='';}}/></label>
          {logoFile&&<button type="button" onClick={()=>setLogoFile(null)} style={{background:'none',border:'none',color:'#DC2626',fontSize:12,cursor:'pointer'}}>remover</button>}
        </div>
        <div style={{fontSize:10,color:'var(--muted)',marginTop:6}}>PNG/JPG até 2MB. Se a confirmação de e-mail estiver ativa, envie a logo depois na aba “Marcas”.</div>
      </div>}
      {err&&<ErrBox msg={err}/>}
      <button className="btn btn-primary" style={{width:'100%',marginTop:6}} disabled={busy}>{busy?'Enviando…':'Criar conta'}</button>
    </form>
  </AuthShell>;
}

function ProfileModal({onClose}){
  const {org,membership,isFabricante,isAdmin,user,signOut}=useAuth();
  const [sub,setSub]=useState(null);const[plans,setPlans]=useState([]);const[active,setActive]=useState(0);
  const [ativos,setAtivos]=useState([]);                 // lista de integradores aprovados
  const [regress,setRegress]=useState(null);             // {plano, precisaSuspender} quando regredindo
  const [selSusp,setSelSusp]=useState({});               // seleção de quem suspender
  const [loading,setLoading]=useState(true);const[busy,setBusy]=useState(false);
  useEffect(()=>{(async()=>{try{
    if(isFabricante){const[s,p,ints]=await Promise.all([D.fetchSubscription(org.id),D.fetchPlans(),D.fetchChannelIntegrators(org.id)]);
      const ats=(ints||[]).filter(l=>l.status==='aprovado');setSub(s);setPlans(p);setActive(ats.length);setAtivos(ats);}
  }catch(e){console.error(e);}finally{setLoading(false);}})();},[]);
  const fmt=(c)=>'R$ '+((c||0)/100).toLocaleString('pt-BR',{minimumFractionDigits:0});
  const efetivarTroca=async(pid,nome,valor)=>{setBusy(true);try{
    await D.changePlan(org.id,pid,nome);
    // gera a cobrança recorrente no Asaas e leva ao pagamento
    try{
      const r=await D.criarCobranca(pid,'UNDEFINED');
      const s=await D.fetchSubscription(org.id);setSub(s);setRegress(null);setSelSusp({});
      if(r&&r.payment_url){
        toast('Plano definido! Abrindo a página de pagamento…','success');
        window.open(r.payment_url,'_blank');
      }else{
        toast('Plano definido! A cobrança foi criada no Asaas; o link aparecerá em Faturas.','success');
      }
    }catch(pagErr){
      // o plano foi alterado, mas a cobrança falhou (ex.: Asaas não configurado ainda)
      const s=await D.fetchSubscription(org.id);setSub(s);setRegress(null);setSelSusp({});
      toast('Plano atualizado. Não consegui gerar a cobrança automática agora: '+erroAmigavel(pagErr),'error');
    }
  }catch(e){toast(erroAmigavel(e),'error');}finally{setBusy(false);}};
  const trocar=async(pid)=>{
    const pl=(plans||[]).find(x=>x.id===pid);if(!pl)return;
    const valor=fmt(pl.price_cents);
    // precisa suspender? (tem mais integradores ativos do que o novo plano permite)
    if(active>pl.max_integrators){
      setSelSusp({});
      setRegress({plano:pl, precisa:active-pl.max_integrators});
      return;
    }
    if(!confirm('Confirmar mudança para o plano "'+pl.name+'"?\n\nAo confirmar, você concorda que a sua PRÓXIMA FATURA será gerada com o valor deste plano ('+valor+'/mês). A alteração entra em vigor imediatamente.'))return;
    await efetivarTroca(pid,pl.name,valor);
  };
  const confirmarRegressao=async()=>{
    if(!regress)return;
    const escolhidos=ativos.filter(a=>selSusp[a.id]);
    if(escolhidos.length!==regress.precisa){alert('Selecione exatamente '+regress.precisa+' integrador(es) para suspender.');return;}
    if(!confirm('Confirmar? '+escolhidos.length+' integrador(es) serão SUSPENSOS e o plano mudará para "'+regress.plano.name+'" ('+fmt(regress.plano.price_cents)+'/mês). Esta ação pode ser revertida reativando os integradores depois.'))return;
    setBusy(true);
    try{
      for(const a of escolhidos){await D.setLinkStatus(a.id,'suspenso',a.integrador?.name,a.status);}
      await D.changePlan(org.id,regress.plano.id,regress.plano.name);
      const[s,ints]=await Promise.all([D.fetchSubscription(org.id),D.fetchChannelIntegrators(org.id)]);
      const ats=(ints||[]).filter(l=>l.status==='aprovado');
      setSub(s);setActive(ats.length);setAtivos(ats);setRegress(null);setSelSusp({});
      toast('Integradores suspensos e plano atualizado com sucesso.','success');
    }catch(e){toast(erroAmigavel(e),'error');}finally{setBusy(false);}
  };
  const exportarDados=async()=>{
    setBusy(true);
    try{
      const dados={ gerado_em:new Date().toISOString(), usuario:{nome:membership?.full_name,email:user?.email,papel:membership?.role}, empresa:{nome:org?.name,cnpj:org?.cnpj,telefone:org?.phone,tipo:org?.type} };
      try{ if(isFabricante){ dados.projetos=await D.fetchProjects(); } else { dados.projetos=await D.fetchMyProjectsAll(org.id); } }catch(e){}
      const blob=new Blob([JSON.stringify(dados,null,2)],{type:'application/json'});
      const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='meus-dados-'+(org?.name||'portal')+'.json';a.click();URL.revokeObjectURL(url);
    }catch(e){toast(erroAmigavel(e),'error');}finally{setBusy(false);}
  };
  const excluirConta=async()=>{
    if(isAdmin){
      if(!confirm('ATENÇÃO: como administrador, isso vai EXCLUIR a empresa "'+org.name+'" inteira — todos os usuários, vínculos e projetos. Não há volta. Confirmar?'))return;
      if(!confirm('Tem certeza absoluta? Digite OK na próxima caixa para confirmar.'))return;
      setBusy(true);try{await D.callManageUser({action:'delete_own_org'});alert('Empresa excluída.');await signOut();}catch(e){toast(erroAmigavel(e),'error');setBusy(false);}
    }else{
      if(!confirm('Excluir o seu acesso? Você sairá e sua conta de usuário será removida. Os dados da empresa permanecem. Confirmar?'))return;
      setBusy(true);try{await D.callManageUser({action:'delete_self'});alert('Sua conta foi removida.');await signOut();}catch(e){toast(erroAmigavel(e),'error');setBusy(false);}
    }
  };
  return <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}><div className="modal" style={{maxWidth:560}}>
    <div style={{padding:'16px 22px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
      <div style={{fontWeight:800,fontSize:17,color:'#1E293B'}}>Meu perfil</div>
      <button onClick={onClose} style={{background:'none',border:'none',fontSize:18,color:'var(--muted)'}}>✕</button>
    </div>
    <div style={{padding:20,display:'flex',flexDirection:'column',gap:16}}>
      <div>
        <div style={{fontWeight:700,fontSize:13,color:'#1E293B',marginBottom:8}}>Dados de cadastro</div>
        <div className="grid grid-2" style={{gap:8}}>
          {[['Nome',membership?.full_name],['E-mail',user?.email],['Empresa',org?.name],['CNPJ',org?.cnpj||'—'],['Telefone',org?.phone||'—'],['Tipo',isFabricante?'Fabricante':'Integrador'],['Papel',roleLabel(membership?.role)]].map(([l,v])=>
            <div key={l} style={{background:'#F8FAFC',borderRadius:7,padding:'9px 11px'}}><div style={{fontSize:10,color:'var(--muted)',fontWeight:600}}>{l}</div><div style={{fontSize:12,color:'#1E293B',fontWeight:500}}>{v}</div></div>)}
        </div>
      </div>
      {isFabricante&&<div>
        <div style={{fontWeight:700,fontSize:13,color:'#1E293B',marginBottom:8}}>Plano</div>
        {loading?<SkeletonList rows={5}/>:<>
          <div style={{background:'#EAF2FB',border:'1px solid var(--blue)',borderRadius:10,padding:14,marginBottom:12}}>
            <div style={{fontSize:11,color:'var(--muted)',fontWeight:600}}>Plano atual</div>
            <div style={{fontSize:15,fontWeight:800,color:'var(--navy)'}}>{sub?.plans?.name||'—'}</div>
            <div style={{fontSize:12,color:'var(--slate)',marginTop:2}}>{sub?.plans?fmt(sub.plans.price_cents)+'/mês':''} · {active} de {sub?.plans?.max_integrators||'—'} integradores ativos</div>
          </div>
          <div style={{fontSize:12,color:'var(--muted)',fontWeight:600,marginBottom:8}}>Planos disponíveis</div>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {plans.map(p=>{const atual=p.id===sub?.plan_id;const insuf=active>p.max_integrators;const enterprise=p.max_integrators>100;return <div key={p.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',border:`1.5px solid ${atual?'var(--navy)':'var(--border)'}`,borderRadius:9,padding:'10px 13px',background:atual?'#EAF2FB':'#fff'}}>
              <div><div style={{fontSize:13,fontWeight:700,color:'#1E293B'}}>{p.name}</div>{enterprise?<div style={{fontSize:12,color:'var(--muted)',fontWeight:600}}>Sob consulta</div>:<div style={{fontSize:12,color:'var(--blue)',fontWeight:700}}>{fmt(p.price_cents)}<span style={{color:'var(--muted)',fontWeight:400}}>/mês</span></div>}</div>
              {enterprise?<a className="btn btn-ghost" style={{fontSize:12,textDecoration:'none'}} href="mailto:contato@gestaodecanal.com.br?subject=Plano%20personalizado%20Gestao%20de%20Canal">Entrar em contato</a>:atual?<span style={{fontSize:11,color:'var(--navy)',fontWeight:700}}>Plano atual</span>:
                <button className="btn btn-primary" style={{fontSize:12}} disabled={busy} onClick={()=>trocar(p.id)} title={insuf?'Exige suspender integradores para caber':''}>{insuf?'Escolher (ajustar)':'Escolher'}</button>}
            </div>;})}
          </div>
        </>}
      </div>}
      {regress&&<div className="modal-overlay" style={{zIndex:320}} onClick={e=>e.target===e.currentTarget&&!busy&&setRegress(null)}>
        <div className="modal" style={{maxWidth:460,width:'100%'}}>
          <div style={{padding:'16px 20px',borderBottom:'1px solid var(--border)'}}>
            <div style={{fontWeight:800,fontSize:16,color:'#1E293B'}}>Ajustar antes de mudar de plano</div>
            <div style={{fontSize:12,color:'var(--muted)',marginTop:2}}>Plano escolhido: <strong>{regress.plano.name}</strong> (limite de {regress.plano.max_integrators})</div>
          </div>
          <div style={{padding:20}}>
            <div style={{background:'#FEF3C7',border:'1px solid #D97706',borderRadius:9,padding:'10px 12px',marginBottom:14,fontSize:12,color:'#92400E'}}>
              Você tem <strong>{active}</strong> integradores ativos, mas este plano permite <strong>{regress.plano.max_integrators}</strong>. Selecione <strong>{regress.precisa}</strong> para suspender e caber no novo plano.
            </div>
            {(()=>{const sel=ativos.filter(a=>selSusp[a.id]).length;const falta=regress.precisa-sel;return <div style={{fontSize:12,fontWeight:700,color:falta===0?'#10B981':'var(--blue)',marginBottom:10}}>{falta>0?('Selecione mais '+falta+' integrador(es).'):falta<0?('Selecionou '+Math.abs(falta)+' a mais — desmarque algum.'):'Quantidade certa selecionada ✓'}</div>;})()}
            <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:280,overflowY:'auto'}}>
              {ativos.map(a=>{const on=!!selSusp[a.id];return <label key={a.id} style={{display:'flex',alignItems:'center',gap:10,padding:'9px 11px',border:`1.5px solid ${on?'#DC2626':'var(--border)'}`,borderRadius:9,cursor:'pointer',background:on?'#FEE2E2':'#fff'}}>
                <input type="checkbox" checked={on} onChange={()=>setSelSusp(s=>({...s,[a.id]:!s[a.id]}))} style={{width:18,height:18}}/>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:'#1E293B'}}>🔧 {a.integrador?.name||'—'}</div><div style={{fontSize:11,color:'var(--muted)'}}>{a.integrador?.cnpj||''} · nível {a.tier||'silver'}</div></div>
              </label>;})}
            </div>
          </div>
          <div style={{padding:'14px 20px',borderTop:'1px solid var(--border)',display:'flex',gap:8,justifyContent:'flex-end'}}>
            <button className="btn btn-ghost" disabled={busy} onClick={()=>setRegress(null)}>Cancelar</button>
            <button className="btn btn-danger" disabled={busy||ativos.filter(a=>selSusp[a.id]).length!==regress.precisa} onClick={confirmarRegressao}>{busy?'Processando…':'Suspender e mudar de plano'}</button>
          </div>
        </div>
      </div>}
      <div style={{borderTop:'1px solid var(--border)',paddingTop:14,marginTop:4}}>
        <div style={{fontWeight:700,fontSize:13,color:'#1E293B',marginBottom:6}}>Seus dados (LGPD)</div>
        <div style={{fontSize:11,color:'var(--muted)',marginBottom:10}}>Baixe uma cópia dos seus dados em formato JSON.</div>
        <button className="btn btn-ghost" disabled={busy} onClick={exportarDados} style={{marginBottom:18}}>⬇️ Exportar meus dados</button>
        <div style={{fontWeight:700,fontSize:13,color:'#991B1B',marginBottom:6}}>Zona de risco</div>
        <div style={{fontSize:11,color:'var(--muted)',marginBottom:10}}>{isAdmin?'Como administrador, excluir sua conta remove a empresa inteira e todos os dados.':'Excluir sua conta remove apenas o seu acesso. Os dados da empresa permanecem.'}</div>
        <button className="btn btn-danger" disabled={busy} onClick={excluirConta}>{isAdmin?'Excluir empresa e minha conta':'Excluir minha conta'}</button>
      </div>
    </div>
  </div></div>;
}
function GlobalSearch({onPickProject,soProjetos}){
  const [open,setOpen]=useState(false);const[q,setQ]=useState('');const[res,setRes]=useState(null);const[busy,setBusy]=useState(false);
  useEffect(()=>{if(!open)return;const t=q.trim();if(t.length<2){setRes(null);return;}setBusy(true);const id=setTimeout(async()=>{try{setRes(await D.globalSearch(t));}catch(e){console.error(e);}finally{setBusy(false);}},350);return ()=>clearTimeout(id);},[q,open]);

  return <button onClick={()=>setDark(d=>!d)} title={dark?'Modo claro':'Modo escuro'} style={{background:'none',border:'none',cursor:'pointer',fontSize:18,padding:4}}>{dark?'☀️':'🌙'}</button>;
}
function NotificationBell(){

        </div>

          items.map(n=><div key={n.id} style={{padding:'11px 14px',borderBottom:'1px solid #F1F5F9',display:'flex',gap:10,alignItems:'flex-start',background:n.read?'#fff':'#EFF6FF'}}>

function ProjectChat({projectId,isFabricante,linkId}){
  const [msgs,setMsgs]=useState([]);const[txt,setTxt]=useState('');const[busy,setBusy]=useState(false);
  const [pessoas,setPessoas]=useState([]);        // nomes mencionáveis
  const [sugestoes,setSugestoes]=useState(null);  // lista filtrada exibida (ou null)
  const endRef=useRef(null);const inputRef=useRef(null);
  const load=useCallback(async()=>{try{setMsgs(await D.fetchComments(projectId));}catch(e){console.error(e);}},[projectId]);
  useEffect(()=>{load();},[load]);
  useEffect(()=>{if(linkId)D.fetchMencionaveis(linkId).then(setPessoas).catch(()=>{});},[linkId]);
  useEffect(()=>{return D.subComments(projectId,(payload)=>{setMsgs(prev=>prev.find(m=>m.id===payload.new.id)?prev:[...prev,payload.new]);});},[projectId]);
  useEffect(()=>{endRef.current&&endRef.current.scrollIntoView({behavior:'smooth'});},[msgs]);
  const side=isFabricante?'fabricante':'integrador';
  // detecta se o usuário está digitando uma menção (@ seguido de letras, sem espaço)
  const onChange=(v)=>{
    setTxt(v);
    const m=v.match(/@([\p{L}\p{N} ]*)$/u);
    if(m){
      const termo=m[1].toLowerCase().trim();
      const filtradas=pessoas.filter(p=>termo===''||p.toLowerCase().includes(termo)).slice(0,6);
      setSugestoes(filtradas.length?filtradas:null);
    }else{setSugestoes(null);}
  };
  const escolher=(nome)=>{
    // substitui o trecho "@..." final pelo nome escolhido
    const novo=txt.replace(/@([\p{L}\p{N} ]*)$/u,'@'+nome+' ');
    setTxt(novo);setSugestoes(null);
    if(inputRef.current)inputRef.current.focus();
  };
  const send=async()=>{if(!txt.trim())return;setBusy(true);setSugestoes(null);try{await D.addComment(projectId,txt.trim(),side);setTxt('');await load();}catch(e){toast(erroAmigavel(e),'error');}finally{setBusy(false);}};
  return <div>
    <div style={{fontWeight:700,fontSize:12,color:'#1E293B',marginBottom:6}}>💬 Conversa</div>
    <div style={{background:'#F8FAFC',borderRadius:10,padding:10,maxHeight:240,overflowY:'auto',marginBottom:8}}>
      {msgs.length===0?<div style={{fontSize:12,color:'var(--muted)',textAlign:'center',padding:14}}>Nenhuma mensagem ainda. Use este espaço para falar com a outra parte sobre o projeto.</div>:
        msgs.map(m=>{const mine=m.author_side===side;return <div key={m.id} style={{display:'flex',justifyContent:mine?'flex-end':'flex-start',marginBottom:7}}>
          <div style={{maxWidth:'78%',background:mine?'var(--navy)':'#fff',color:mine?'#fff':'#1E293B',border:mine?'none':'1px solid var(--border)',borderRadius:10,padding:'7px 11px'}}>
            <div style={{fontSize:9,opacity:.7,marginBottom:2}}>{m.author_name||'—'} · {m.author_side==='fabricante'?'Fabricante':'Integrador'}</div>
            <div style={{fontSize:12,lineHeight:1.4,whiteSpace:'pre-wrap'}}>{m.body}</div>
            <div style={{fontSize:8,opacity:.6,marginTop:3,textAlign:'right'}}>{new Date(m.created_at).toLocaleString('pt-BR')}</div>
          </div></div>;})}
      <div ref={endRef}/>
    </div>
    <div style={{position:'relative'}}>
      {sugestoes&&<div style={{position:'absolute',bottom:'100%',left:0,right:0,marginBottom:4,background:'#fff',border:'1px solid var(--border)',borderRadius:10,boxShadow:'0 8px 24px rgba(0,0,0,.12)',overflow:'hidden',zIndex:20}}>
        <div style={{fontSize:9,color:'var(--muted)',padding:'6px 12px',borderBottom:'1px solid var(--border)'}}>Mencionar…</div>
        {sugestoes.map(nome=><button key={nome} type="button" onClick={()=>escolher(nome)} style={{display:'block',width:'100%',textAlign:'left',padding:'9px 12px',border:'none',background:'none',cursor:'pointer',fontSize:13,color:'#1E293B'}}>@{nome}</button>)}
      </div>}
      <div style={{display:'flex',gap:8}}>
        <input ref={inputRef} className="input" value={txt} onChange={e=>onChange(e.target.value)} placeholder="Escreva uma mensagem… (use @ para mencionar)" onKeyDown={e=>{if(e.key==='Escape'){setSugestoes(null);}else if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}}/>
        <button className="btn btn-primary" style={{fontSize:12}} disabled={busy||!txt.trim()} onClick={send}>Enviar</button>
      </div>
    </div>
  </div>;
}
function InternalNotes({projectId}){
  const {org,membership}=useAuth();
  const [notes,setNotes]=useState([]);const[txt,setTxt]=useState('');const[busy,setBusy]=useState(false);const[open,setOpen]=useState(false);
  const load=useCallback(async()=>{if(!org?.id)return;try{setNotes(await D.fetchNotes(projectId,org.id));}catch(e){console.error(e);}},[projectId,org?.id]);
  useEffect(()=>{if(open)load();},[open,load]);
  const add=async()=>{if(!txt.trim())return;setBusy(true);try{await D.addNote(projectId,org.id,txt.trim());setTxt('');await load();}catch(e){toast(erroAmigavel(e),'error');}finally{setBusy(false);}};
  const del=async(id)=>{if(!confirm('Excluir esta nota interna?'))return;try{await D.deleteNote(id);await load();}catch(e){alert(e.message);}};
  return <div style={{border:'1px dashed var(--border)',borderRadius:10,padding:12,background:'#FAFAF9'}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}} onClick={()=>setOpen(o=>!o)}>
      <div style={{fontWeight:700,fontSize:12,color:'#1E293B'}}>🔒 Notas internas {notes.length>0&&<span style={{fontSize:10,color:'var(--muted)'}}>({notes.length})</span>}</div>
      <span style={{fontSize:11,color:'var(--muted)'}}>{open?'▲':'▼'}</span>
    </div>

        const temAprovChat=ev.some(e=>e.l==='Aprovado');
        if(project.approved_at&&!temAprovChat)ev.push({t:project.approved_at,ic:'✅',l:'Aprovado',c:'#10B981'});
        const temReprovChat=ev.some(e=>e.l==='Reprovado');
        if(project.status==='reprovado'&&!temReprovChat)ev.push({t:project.updated_at||project.registered_at,ic:'❌',l:'Reprovado',c:'#991B1B'});
        if(project.status==='conflito')ev.push({t:project.updated_at||project.registered_at,ic:'⚠️',l:'Conflito sinalizado',c:'#DC2626'});
        if(project.status==='convertido')ev.push({t:project.updated_at,ic:'🎯',l:'Convertido em venda',c:'#2E6CA8'});
        if(project.expires_at&&['aprovado','convertido'].includes(project.status)){const exp=daysLeft(project.expires_at);ev.push({t:project.expires_at,ic:exp<0?'⛔':'⏳',l:exp<0?'Expirou':'Expira',c:exp<0?'#991B1B':'#64748B'});}
        ev.sort((a,b)=>new Date(a.t)-new Date(b.t));
        if(!ev.length)return null;
        return <div><div style={{fontWeight:700,fontSize:12,color:'#1E293B',margin:'4px 0 8px'}}>📌 Linha do tempo</div>
          <div style={{position:'relative',paddingLeft:18}}>
            {ev.map((e,i)=><div key={i} style={{position:'relative',marginBottom:10}}>

              {i<ev.length-1&&<div style={{position:'absolute',left:-14,top:12,width:2,height:'100%',background:'var(--border)'}}/>}
              <div style={{fontSize:12,fontWeight:600,color:'#1E293B'}}>{e.ic} {e.l}</div>
              {e.d&&<div style={{fontSize:11,color:'var(--slate)'}}>{e.d}</div>}
              {e.quem&&<div style={{fontSize:10,color:'var(--blue)',fontWeight:600}}>por {e.quem}</div>}
              <div style={{fontSize:10,color:'var(--muted)'}}>{e.t?new Date(e.t).toLocaleString('pt-BR'):'—'}</div>
            </div>)}
          </div></div>;
      })()}
      <InternalNotes projectId={project.id}/>
      <ProjectChat projectId={project.id} isFabricante={isFabricante} linkId={project.link_id}/>
      {viewerUrl&&<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setViewerUrl(null)} style={{zIndex:130}}>
        <div className="modal" style={{maxWidth:'92vw',width:'92vw',height:'90vh',display:'flex',flexDirection:'column'}}>
          <div style={{padding:'10px 16px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontWeight:700,fontSize:13,color:'#1E293B'}}>📄 {viewerName}</div>
            <div style={{display:'flex',gap:8}}>
              <a href={viewerUrl} target="_blank" rel="noreferrer" className="btn btn-ghost" style={{fontSize:12}}>Abrir em nova aba ↗</a>
              <button onClick={()=>setViewerUrl(null)} style={{background:'none',border:'none',fontSize:18,color:'var(--muted)'}}>✕</button>
            </div>
          </div>
          {/\.(jpg|jpeg|png|webp)$/i.test(viewerName)
            ?<div style={{flex:1,overflow:'auto',display:'flex',alignItems:'center',justifyContent:'center',background:'#0F172A'}}><img src={viewerUrl} alt={viewerName} style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain'}}/></div>
            :<iframe src={viewerUrl} title="anexo" style={{flex:1,width:'100%',border:'none'}}/>}
        </div>
      </div>}
    </div></div></div>;
}

const Empty=({text,icon})=><div style={{textAlign:'center',padding:'44px 16px',color:'var(--muted)',animation:'fadeIn .3s ease'}}><div style={{fontSize:42,marginBottom:10,opacity:.85}}>{icon||'📁'}</div><div style={{fontWeight:700,fontSize:14,color:'#1E293B',marginBottom:4}}>{text}</div></div>;
function ProjectRow({p,onSelect,showInt,onDuplicate}){const c=CATS[p.category];const days=daysLeft(p.expires_at);const intName=p.channel_links?.integrador?.name;
  const ativo=p.status==='aprovado';const urgente=ativo&&days>=0&&days<=7;const atencao=ativo&&days>7&&days<=15;const expirado=ativo&&days<0;

  const diasParado=Math.floor((Date.now()-ult)/864e5);const parado=ativo&&!expirado&&diasParado>=30;
  const porteProj=(()=>{const ordem=['Pequeno','Médio','Grande','Muito grande'];let melhor=-1;(p.systems||[]).forEach(s=>{const pr=porteDe(s.sistema,s.itens?._qtd);const i=ordem.indexOf(pr);if(i>melhor)melhor=i;});return melhor>=0?ordem[melhor]:null;})();
  return <div onClick={()=>onSelect(p)} className="card" style={{padding:'11px 14px',cursor:'pointer',marginBottom:8,borderLeft:`4px solid ${urgente||expirado?'#DC2626':atencao?'#D97706':c?.color||'#ccc'}`}}>

      <div><div style={{display:'flex',gap:5,marginBottom:3,flexWrap:'wrap'}}><CatBadge cat={p.category}/><StatusBadge status={p.status}/>

        {expirado&&<span style={{fontSize:10,fontWeight:800,color:'#fff',background:'#991B1B',padding:'2px 7px',borderRadius:99}}>⛔ expirado</span>}
        {parado&&<span style={{fontSize:10,fontWeight:800,color:'#92400E',background:'#FEF3C7',padding:'2px 7px',borderRadius:99}}>💤 parado {diasParado}d</span>}
        {porteProj&&<span style={{fontSize:10,fontWeight:800,color:PORTE_COR[porteProj],background:PORTE_COR[porteProj]+'22',padding:'2px 7px',borderRadius:99}}>{porteProj}</span>}
        {p.status==='aprovado'&&p.descontos_sistema&&Object.values(p.descontos_sistema).some(v=>v)&&<span style={{fontSize:10,fontWeight:800,color:'#059669',background:'#D1FAE5',padding:'2px 7px',borderRadius:99}}>💰 {Object.entries(p.descontos_sistema).filter(([k,v])=>v).map(([k,v])=>v).join(' / ')}</span>}</div>
        <div style={{fontWeight:700,fontSize:13,color:'#1E293B'}}>{p.title}</div>
        <div style={{fontSize:11,color:'var(--muted)'}}>{p.registro_num?p.registro_num+' · ':''}{p.client_name} · {p.stage}{showInt&&intName?` · ${intName}`:''}</div></div>
      <div style={{textAlign:'right',flexShrink:0,display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
        <div><div style={{fontSize:10,color:'var(--muted)'}}>Expira</div>
        <div style={{fontSize:12,fontWeight:700,color:days<=15?'#DC2626':'var(--slate)'}}>{days>0?`${days}d`:'Expirado'}</div></div>
        {onDuplicate&&<button onClick={(e)=>{e.stopPropagation();onDuplicate(p);}} title="Duplicar projeto" style={{background:'none',border:'1px solid var(--border)',borderRadius:6,padding:'2px 7px',fontSize:11,cursor:'pointer',color:'var(--blue)'}}>📋</button>}
      </div>
    </div></div>;}
const Filter=({active,onClick,children})=><button onClick={onClick} style={{padding:'4px 10px',borderRadius:6,border:'1.5px solid',borderColor:active?'var(--navy)':'var(--border)',background:active?'#EAF2FB':'#fff',color:active?'var(--navy)':'var(--muted)',fontSize:11,fontWeight:600}}>{children}</button>;
function FiltrosSalvos({chave,atual,onAplicar}){
  const [lista,setLista]=useState(()=>{try{return JSON.parse(localStorage.getItem('rp_filtros_'+chave)||'[]');}catch(e){return [];}});
  const persistir=(l)=>{setLista(l);try{localStorage.setItem('rp_filtros_'+chave,JSON.stringify(l));}catch(e){}};
  const salvar=()=>{const nome=prompt('Nome para este filtro favorito:');if(!nome||!nome.trim())return;const novo=[...lista.filter(f=>f.nome!==nome.trim()),{nome:nome.trim(),valor:atual}];persistir(novo);};
  const remover=(nome)=>{persistir(lista.filter(f=>f.nome!==nome));};
  const temFiltro=atual&&Object.values(atual).some(v=>v&&v!=='todos'&&v!=='todas');
  return <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center',marginBottom:10}}>
    {lista.map(f=><span key={f.nome} style={{display:'inline-flex',alignItems:'center',gap:4,background:'#EAF2FB',border:'1px solid var(--blue)',borderRadius:99,padding:'3px 6px 3px 10px',fontSize:11}}>
      <button onClick={()=>onAplicar(f.valor)} style={{background:'none',border:'none',color:'var(--navy)',fontWeight:600,cursor:'pointer',fontSize:11}}>⭐ {f.nome}</button>
      <button onClick={()=>remover(f.nome)} title="Remover" style={{background:'none',border:'none',color:'var(--muted)',cursor:'pointer',fontSize:12}}>×</button>
    </span>)}
    {temFiltro&&<button onClick={salvar} style={{background:'none',border:'1px dashed var(--border)',borderRadius:99,padding:'3px 10px',fontSize:11,color:'var(--muted)',cursor:'pointer'}}>+ salvar filtro atual</button>}
  </div>;
}

function BeneficiosEditor({orgId,canEdit}){

    const csv='\uFEFF'+[head.join(';'),...linhas].join('\n');

    {[['todas','Todas'],['cat1','CAT 1'],['cat2','CAT 2'],['cat3','CAT 3']].map(([k,l])=><Filter key={k} active={cat===k} onClick={()=>setCat(k)}>{l}</Filter>)}
    <span style={{color:'var(--border)'}}>|</span>

    <span style={{flex:1}}/>

function ReportsPanel({projects,ints,isFabricante,orgName,orgLogo}){
  const [opts,setOpts]=useState({status:true,categoria:true,ranking:true,vencendo:true,lista:true});
  const [de,setDe]=useState('');const[ate,setAte]=useState('');
  const [fInt,setFInt]=useState('');const[fSis,setFSis]=useState('');const[fMarca,setFMarca]=useState('');const[fProj,setFProj]=useState('');const[fDist,setFDist]=useState('');
  const tog=(k)=>setOpts(p=>({...p,[k]:!p[k]}));
  const STLAB={pendente:'Pendentes',aprovado:'Aprovados',reprovado:'Reprovados',convertido:'Convertidos',encerrado:'Encerrados',conflito:'Conflitos'};

  // marcas presentes nos projetos (para o filtro)
  const marcasDisp=(()=>{const s=new Set();projects.forEach(p=>(p.systems||[]).forEach(sy=>{if(sy.itens?._marca)s.add(sy.itens._marca);}));return [...s].sort();})();
  // sistemas presentes nos projetos (chave -> label) — reflete o que o fabricante definiu
  const sistemasDisp=(()=>{const m={};projects.forEach(p=>(p.systems||[]).forEach(sy=>{if(sy.sistema&&!m[sy.sistema])m[sy.sistema]=sy.label||(SISTEMAS[sy.sistema]?SISTEMAS[sy.sistema].label:sy.sistema);}));return m;})();
  const sisLabel=(k)=>sistemasDisp[k]||(SISTEMAS[k]?SISTEMAS[k].label:k);
  const intsDisp=(()=>{const s=new Set();projects.forEach(p=>{const n=p.channel_links?.integrador?.name;if(n)s.add(n);});return [...s].sort();})();
  const distsDisp=(()=>{const s=new Set();projects.forEach(p=>{if(p.distributor)s.add(p.distributor);});return [...s].sort();})();
  const fabsDisp=(()=>{const s=new Set();projects.forEach(p=>{if(p._fabricante)s.add(p._fabricante);});return [...s].sort();})();
  const [fFab,setFFab]=useState('');

  const passaFiltro=(p)=>{
    const d=new Date(p.registered_at);
    if(de&&d<new Date(de))return false;
    if(ate&&d>new Date(ate+'T23:59:59'))return false;
    if(fInt&&(p.channel_links?.integrador?.name||'')!==fInt)return false;
    if(fFab&&(p._fabricante||'')!==fFab)return false;
    if(fProj){const t=fProj.toLowerCase();if(!String(p.title||'').toLowerCase().includes(t)&&!String(p.client_name||'').toLowerCase().includes(t)&&!String(p.registro_num||'').toLowerCase().includes(t))return false;}
    if(fSis&&!(p.systems||[]).some(sy=>sy.sistema===fSis))return false;
    if(fMarca&&!(p.systems||[]).some(sy=>sy.itens?._marca===fMarca))return false;
    if(fDist&&(p.distributor||'')!==fDist)return false;
    return true;
  };
  const ps=projects.filter(passaFiltro);
  const byStatus=()=>{const m={};ps.forEach(p=>{m[p.status]=(m[p.status]||0)+1;});return m;};
  const byCat=()=>{const m={};ps.forEach(p=>{m[p.category]=(m[p.category]||0)+1;});return m;};
  const ranking=()=>{const m={};ps.forEach(p=>{const n=p.channel_links?.integrador?.name||'—';if(!m[n])m[n]={total:0,aprov:0,conv:0};m[n].total++;if(p.status==='aprovado')m[n].aprov++;if(p.status==='convertido')m[n].conv++;});return Object.entries(m).sort((a,b)=>b[1].total-a[1].total);};
  const vencendo=()=>ps.filter(p=>p.status==='aprovado'&&daysLeft(p.expires_at)<=30&&daysLeft(p.expires_at)>=0);
  const descTxt=(p)=>{if(!p.descontos_sistema)return '—';const e=Object.entries(p.descontos_sistema).filter(([k,v])=>v);return e.length?e.map(([k,v])=>sisLabel(k)+' '+v).join(', '):'—';};

  const filtrosTxt=()=>{const a=[];if(de||ate)a.push('período '+(de||'início')+' a '+(ate||'hoje'));if(fInt)a.push('integrador: '+fInt);if(fFab)a.push('fabricante: '+fFab);if(fSis)a.push('sistema: '+sisLabel(fSis));if(fMarca)a.push('marca: '+fMarca);if(fDist)a.push('distribuidor: '+fDist);if(fProj)a.push('busca: '+fProj);return a.length?a.join(' · '):'sem filtros';};

  const gerarHTML=()=>{
    const hoje=new Date().toLocaleString('pt-BR');
    const baseUrl=window.location.href.split('#')[0].replace(/[^/]*$/,'');
    const rpLogo=baseUrl+'icon-192.png';
    const fabLogo=orgLogo?(window.SUPABASE_URL+'/storage/v1/object/public/logos/'+orgLogo):null;
    let h='<html><head><meta charset="utf-8"><title>Relatório</title><style>body{font-family:Arial,sans-serif;color:#1E293B;padding:24px;max-width:820px;margin:auto}h1{color:#1A3C6E;font-size:22px;margin-bottom:2px}h2{color:#2E6CA8;font-size:15px;margin-top:24px;border-bottom:2px solid #EAF2FB;padding-bottom:4px}.sub{color:#64748B;font-size:12px;margin-bottom:18px}table{width:100%;border-collapse:collapse;font-size:12px;margin-top:6px}th,td{text-align:left;padding:7px 9px;border-bottom:1px solid #E2E8F0}th{background:#F8FAFC;color:#475569}.row{display:flex;gap:16px;flex-wrap:wrap}.box{background:#F8FAFC;border-radius:8px;padding:12px 16px;min-width:110px}.box .n{font-size:22px;font-weight:800;color:#1A3C6E}.box .l{font-size:11px;color:#64748B}.hdr{display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #EAF2FB;padding-bottom:14px;margin-bottom:16px}.hdr img{height:46px;width:auto;border-radius:8px}</style></head><body>';
    h+='<div class="hdr"><img src="'+rpLogo+'" alt="Gestão de Canal"/>'+(fabLogo?'<img src="'+fabLogo+'" alt="'+(orgName||'')+'"/>':'<div style="font-weight:800;color:#1A3C6E;font-size:18px">'+(orgName||'')+'</div>')+'</div>';
    h+='<h1>Relatório — '+(orgName||'')+'</h1><div class="sub">Gerado em '+hoje+' · '+filtrosTxt()+' · '+ps.length+' projeto(s)</div>';
    if(opts.status){const m=byStatus();h+='<h2>Projetos por status</h2><div class="row">'+Object.keys(STLAB).map(k=>'<div class="box"><div class="n">'+(m[k]||0)+'</div><div class="l">'+STLAB[k]+'</div></div>').join('')+'</div>';}
    if(opts.categoria){const m=byCat();h+='<h2>Por categoria</h2><div class="row">'+['cat1','cat2','cat3'].map(k=>'<div class="box"><div class="n">'+(m[k]||0)+'</div><div class="l">'+(CATS[k]?CATS[k].label:k)+'</div></div>').join('')+'</div>';}
    if(opts.ranking&&isFabricante){h+='<h2>Ranking de integradores</h2><table><tr><th>Integrador</th><th>Total</th><th>Aprovados</th><th>Convertidos</th></tr>'+ranking().map(([n,v])=>'<tr><td>'+n+'</td><td>'+v.total+'</td><td>'+v.aprov+'</td><td>'+v.conv+'</td></tr>').join('')+'</table>';}
    if(opts.vencendo){const v=vencendo();h+='<h2>Projetos a vencer (30 dias)</h2>'+(v.length?'<table><tr><th>Projeto</th><th>Cliente</th><th>Dias restantes</th></tr>'+v.map(p=>'<tr><td>'+(p.title||'')+'</td><td>'+(p.client_name||'')+'</td><td>'+daysLeft(p.expires_at)+'</td></tr>').join('')+'</table>':'<div class="sub">Nenhum projeto a vencer.</div>');}
    if(opts.lista){h+='<h2>Lista de projetos</h2><table><tr><th>Registro</th><th>Projeto</th><th>Cliente</th>'+(isFabricante?'<th>Integrador</th>':'<th>Fabricante</th>')+'<th>Categoria</th><th>Status</th><th>Descontos</th></tr>'+ps.map(p=>'<tr><td>'+(p.registro_num||'—')+'</td><td>'+(p.title||'')+'</td><td>'+(p.client_name||'')+'</td><td>'+(isFabricante?(p.channel_links?.integrador?.name||'—'):(p._fabricante||'—'))+'</td><td>'+(CATS[p.category]?CATS[p.category].label:p.category)+'</td><td>'+(STLAB[p.status]||p.status)+'</td><td>'+descTxt(p)+'</td></tr>').join('')+'</table>';}
    h+='</body></html>';return h;};

  const imprimir=()=>{const w=window.open('','_blank');if(!w){alert('Permita pop-ups para imprimir/salvar o PDF.');return;}w.document.write(gerarHTML());w.document.close();setTimeout(()=>w.print(),400);};
  const exportarCSV=()=>{

function FaturasPanel({orgId}){
  const [invs,setInvs]=useState([]);const[loading,setLoading]=useState(true);

  const LAB={pago:'Paga',pendente:'A vencer',vencido:'Vencida'};

      {proximas.length>0&&<><div style={{fontWeight:700,fontSize:13,color:'#92400E',margin:'14px 0 8px'}}>⏳ Próximas faturas ({proximas.length})</div>{proximas.map(i=><Card key={i.id} i={i}/>)}</>}

    </>}
  </>;
}

        ['5. Renove se necessário','Se um registro aprovado expirar, você pode solicitar a renovação direto no detalhe do projeto.']
      ]).map(([t,d],i)=><div key={i} style={card}>
        <div style={{fontWeight:700,fontSize:13,color:'var(--navy)',marginBottom:4}}>{t}</div>
        <div style={{fontSize:12,color:'var(--slate)',lineHeight:1.6}}>{d}</div>
      </div>)}
    </>}

    {secao==='faq'&&<>
      <FaqItem q="O que é o número de registro (REG-...)?">É o código único de cada projeto no sistema. Use-o para localizar o projeto nos filtros, relatórios e na página pública de acompanhamento.</FaqItem>
      <FaqItem q="Por que algumas marcas não aparecem ao registrar?">Só aparecem as marcas que o fabricante cadastrou para cada sistema. Se um sistema está indisponível, é porque o fabricante ainda não definiu marcas para ele.</FaqItem>
      <FaqItem q="Quando aparece um conflito de registro?">Quando dois integradores diferentes registram o mesmo cliente (mesmo CNPJ), no mesmo endereço e com sistemas que se sobrepõem. Se for o mesmo integrador, aparece apenas um alerta — e se os sistemas forem diferentes, não há conflito.</FaqItem>
      <FaqItem q="Por quanto tempo um registro fica protegido?">Depende da categoria: CAT 1 por 180 dias, CAT 2 por 120 dias e CAT 3 por 90 dias, contados a partir da aprovação.</FaqItem>
      {!isFabricante&&<FaqItem q="Quando vejo o desconto do meu projeto?">Somente após o fabricante aprovar o registro e definir o desconto autorizado. Antes da aprovação, nenhum valor de desconto é exibido.</FaqItem>}
      {isFabricante&&<FaqItem q="O que acontece se eu atingir o limite de integradores do plano?">Você não consegue aprovar novos vínculos até liberar uma vaga (suspendendo um integrador) ou fazer upgrade de plano. O sistema avisa quando você está perto do limite.</FaqItem>}
      <FaqItem q="Como funciona o compartilhamento do status com o cliente?">No detalhe do projeto há o botão "🔗 Status", que gera um link público. Quem abrir vê um resumo do andamento (sem valores comerciais nem dados sensíveis).</FaqItem>
      <FaqItem q="Esqueci minha senha. E agora?">Na tela de login, clique em "Esqueci minha senha", informe seu e-mail e siga o link enviado para definir uma nova senha.</FaqItem>
      <FaqItem q="Posso usar o sistema no celular?">Sim. A Gestão de Canal funciona no navegador do computador, tablet e smartphone. Também pode ser instalado como aplicativo (PWA).</FaqItem>
      <FaqItem q="Meus dados estão seguros?">Sim. Cada empresa só enxerga os próprios dados, com isolamento garantido no banco. Você pode exportar seus dados a qualquer momento em "Meu perfil".</FaqItem>
    </>}
  </div>;
}
function ResetPasswordPage(){
  const {updatePassword,finishRecovery}=useAuth();
  const [s1,setS1]=useState('');const[s2,setS2]=useState('');const[busy,setBusy]=useState(false);const[err,setErr]=useState('');const[ok,setOk]=useState(false);
  const salvar=async()=>{
    setErr('');
    if(s1.length<6){setErr('A senha deve ter ao menos 6 caracteres.');return;}
    if(s1!==s2){setErr('As senhas não coincidem.');return;}
    setBusy(true);
    try{await updatePassword(s1);setOk(true);}catch(e){setErr(e.message);setBusy(false);}
  };
  return <div style={{minHeight:'100vh',background:'linear-gradient(135deg,#1A3C6E,#2E6CA8)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
    <div className="modal" style={{maxWidth:380,width:'100%',padding:28}}>
      {ok?<div style={{textAlign:'center'}}>
        <div style={{fontSize:42,marginBottom:10}}>✅</div>
        <div style={{fontWeight:800,fontSize:18,color:'var(--navy)',marginBottom:8}}>Senha redefinida!</div>
        <p style={{fontSize:13,color:'var(--slate)',marginBottom:18}}>Sua nova senha foi salva. Faça login novamente com ela.</p>
        <button className="btn btn-primary" style={{width:'100%'}} onClick={finishRecovery}>Ir para o login</button>
      </div>:<>
        <div style={{textAlign:'center',marginBottom:18}}>
          <div style={{fontSize:36,marginBottom:8}}>🔑</div>
          <div style={{fontWeight:800,fontSize:18,color:'var(--navy)'}}>Definir nova senha</div>
          <p style={{fontSize:12,color:'var(--muted)',marginTop:4}}>Escolha uma nova senha para sua conta.</p>
        </div>
        <label className="label">Nova senha</label>
        <PasswordInput value={s1} onChange={setS1} placeholder="Mínimo 6 caracteres"/>
        <div style={{height:10}}/>
        <label className="label">Confirmar nova senha</label>
        <PasswordInput value={s2} onChange={setS2} placeholder="Repita a senha"/>
        {err&&<div style={{color:'#DC2626',fontSize:12,marginTop:10}}>{err}</div>}
        <button className="btn btn-primary" style={{width:'100%',marginTop:16}} disabled={busy||!s1||!s2} onClick={salvar}>{busy?'Salvando…':'Salvar nova senha'}</button>
      </>}
    </div>
  </div>;
}
function App(){
  const {user,org,loading,isDeveloper,recoveryMode}=useAuth();
  const [page,setPage]=useState('login'); // login | signup
  const [hash,setHash]=useState(window.location.hash||'');
  useEffect(()=>{const h=()=>setHash(window.location.hash||'');window.addEventListener('hashchange',h);return ()=>window.removeEventListener('hashchange',h);},[]);
  if(!cfgOk) return <AuthShell title="Configuração necessária" subtitle="Quase lá">
    <div style={{background:'#FEF3C7',border:'1px solid #D97706',borderRadius:10,padding:16,fontSize:13,color:'#92400E',lineHeight:1.6}}>
      Cole suas chaves do Supabase no topo do arquivo <strong>index.html</strong>, nas linhas
      <code> window.SUPABASE_URL </code> e <code> window.SUPABASE_ANON_KEY </code>. Você encontra esses valores em <strong>Supabase → Project Settings → API</strong>.</div>
  </AuthShell>;
  if(loading) return <div className="spinner"/>;
  // redefinição de senha (chegou pelo link do e-mail)
  if(recoveryMode) return <ResetPasswordPage/>;
  // rota pública de status (sem login): #status=TOKEN
  const mStatus=(hash||'').match(/status=([0-9a-fA-F-]{8,})/);
  if(mStatus) return <StatusPublico token={mStatus[1]}/>;
  if(!user||!org){ return page==='signup'?<SignUp go={setPage}/>:<Login go={setPage}/>; }
  // rota do desenvolvedor: precisa do #dev na URL E da flag is_developer no banco
  const wantsDev = (hash||'').toLowerCase().includes('dev');
  if(wantsDev && isDeveloper) return <ErrorBoundary secao="Painel do desenvolvedor"><DeveloperPanel/></ErrorBoundary>;
  return <>
    <ErrorBoundary secao={org.type==='fabricante'?'Painel do fabricante':'Painel do integrador'}>{org.type==='fabricante'?<FabricanteDashboard/>:<IntegradorDashboard/>}</ErrorBoundary>
    <TermosAceite onAceito={()=>window.location.reload()}/>
    {isDeveloper&&<button onClick={()=>{window.location.hash='dev';}} title="Abrir painel do desenvolvedor" style={{position:'fixed',bottom:74,right:16,zIndex:150,background:'#0f172a',color:'#fff',border:'none',borderRadius:99,padding:'10px 16px',fontSize:12,fontWeight:700,boxShadow:'0 6px 20px rgba(0,0,0,.25)',cursor:'pointer',display:'flex',alignItems:'center',gap:7}}>🛠️ Painel DEV</button>}
  </>;
}

const SUPORTE_EMAIL='suporte@gestaodecanal.com.br';
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(err){return {err};}
  componentDidCatch(err,info){console.error('ErrorBoundary',this.props.secao||'',err,info);}
  reportar(){
    const e=this.state.err;
    const secao=this.props.secao||'(não informada)';
    const corpo='Olá, encontrei um erro na Gestão de Canal.%0D%0A%0D%0ASeção: '+secao+'%0D%0AMensagem: '+encodeURIComponent(String(e&&e.message||e))+'%0D%0AQuando: '+encodeURIComponent(new Date().toLocaleString('pt-BR'))+'%0D%0APágina: '+encodeURIComponent(location.href)+'%0D%0A%0D%0ADescreva o que você estava fazendo: ';
    window.location.href='mailto:'+SUPORTE_EMAIL+'?subject='+encodeURIComponent('Erro na Gestão de Canal — '+secao)+'&body='+corpo;
  }
  render(){
    if(this.state.err){
      const compacto=this.props.compacto;
      return <div style={{padding:compacto?16:24,fontFamily:'sans-serif',maxWidth:560,margin:compacto?'12px auto':'40px auto',background:'#fff',borderRadius:12,border:'1px solid #FCA5A5'}}>
        <div style={{fontSize:compacto?30:40,marginBottom:8}}>⚠️</div>
        <h2 style={{color:'#991B1B',fontSize:compacto?15:18,margin:'0 0 6px'}}>Algo deu errado{this.props.secao?(' em: '+this.props.secao):''}</h2>
        <p style={{color:'#475569',fontSize:13,lineHeight:1.5}}>Ocorreu um erro inesperado nesta parte do app. Você pode tentar de novo ou reportar para o suporte.</p>
        <pre style={{background:'#FEE2E2',color:'#7F1D1D',padding:12,borderRadius:8,fontSize:11,whiteSpace:'pre-wrap',overflow:'auto',maxHeight:120}}>{String(this.state.err&&this.state.err.message||this.state.err)}</pre>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button onClick={()=>{this.setState({err:null});}} style={{background:'#1A3C6E',color:'#fff',border:'none',borderRadius:8,padding:'10px 16px',fontSize:13,fontWeight:600,cursor:'pointer'}}>Tentar de novo</button>
          <button onClick={()=>location.reload()} style={{background:'#fff',color:'#1A3C6E',border:'1.5px solid #1A3C6E',borderRadius:8,padding:'10px 16px',fontSize:13,fontWeight:600,cursor:'pointer'}}>Recarregar página</button>
          <button onClick={()=>this.reportar()} style={{background:'#fff',color:'#B45309',border:'1.5px solid #D97706',borderRadius:8,padding:'10px 16px',fontSize:13,fontWeight:600,cursor:'pointer'}}>✉️ Reportar erro</button>
        </div>
      </div>;
    }
    return this.props.children;
  }
}
