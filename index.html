      if(rem.length)mud.push((SISTEMAS[k]?SISTEMAS[k].label:k)+': removeu '+rem.join(', '));});

    if(mud.length)await D.audit('marca.editar','marca',orgId,'Atualizou marcas — '+mud.join('; '));
    setOrig(JSON.parse(JSON.stringify(marcas)));setSaved(true);
  }catch(e){alert('Erro: '+e.message);}finally{setBusy(false);}};
  if(loading)return <div className="spinner"/>;
  return <>
    <div className="card" style={{padding:16,marginBottom:16}}>
      <div style={{fontWeight:700,fontSize:13,color:'#1E293B',marginBottom:8}}>Logo da empresa</div>

        {org?.logo_path?<img src={D.logoUrl(org.logo_path)} alt="logo" style={{width:56,height:56,borderRadius:10,objectFit:'cover',border:'1px solid var(--border)'}}/>:<div style={{width:56,height:56,borderRadius:10,background:'#F1F5F9',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>🏭</div>}
        <label className="btn btn-ghost" style={{fontSize:12,cursor:'pointer'}}>{logoBusy?'Enviando…':'Enviar logo (PNG/JPG, até 2MB)'}<input type="file" accept="image/*" style={{display:'none'}} disabled={logoBusy} onChange={onLogo}/></label>
      </div>
      <div style={{fontSize:11,color:'var(--muted)',marginTop:8}}>A logo aparece no topo do seu painel e ao lado do seu nome quando integradores buscam fabricantes.</div>
    </div>

    <div style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>Selecione, por sistema, as marcas que sua empresa oferece. Os integradores do seu canal só poderão escolher entre estas marcas ao registrar projetos.</div>

      <div style={{fontWeight:700,fontSize:13,color:'#1E293B',marginBottom:8}}>{sd.icon} {sd.label}</div>
      {sel.length>0?<div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:8}}>
        {sel.map(m=><span key={m} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'5px 11px',borderRadius:99,background:'#EAF2FB',border:'1.5px solid var(--navy)',color:'var(--navy)',fontSize:12,fontWeight:600}}>{m} <button type="button" onClick={()=>removeMarca(sk,m)} style={{background:'none',border:'none',color:'#DC2626',cursor:'pointer',fontSize:14,lineHeight:1,padding:0}}>×</button></span>)}
      </div>:<div style={{fontSize:11,color:'var(--muted)',marginBottom:8}}>Nenhuma marca cadastrada para este sistema.</div>}
      <div style={{display:'flex',gap:6}}><input className="input" style={{fontSize:12}} placeholder="Adicionar marca…" value={novo[sk]||''} onChange={e=>setNovo(p=>({...p,[sk]:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&addOutra(sk)}/>
        <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>addOutra(sk)}>Adicionar</button></div>
    </div>;})}
    <div style={{display:'flex',alignItems:'center',gap:12,marginTop:8}}>
      <button className="btn btn-primary" disabled={busy} onClick={salvar}>{busy?'Salvando…':'Salvar marcas'}</button>
      {saved&&<span style={{color:'#10B981',fontSize:13,fontWeight:600}}>✓ Salvo</span>}
    </div>
  </>;
}

  return <><SearchBox value={q} onChange={setQ} placeholder="Buscar por projeto, cliente, CNPJ…"/>
    <div style={{marginBottom:12}}><label style={{fontSize:11,color:'var(--muted)',fontWeight:600,display:'block',marginBottom:3}}>Filtrar por integrador</label>

        <div style={{flex:1}}><ProjectRow p={p} onSelect={()=>toggleSel(p.id)} showInt/></div>

          {[['todos','Todas'],['fabricantes','Fabricantes'],['integradores','Integradores']].map(([k,l])=>
            <button key={k} onClick={()=>setFilter(k)} style={{padding:'4px 10px',borderRadius:6,border:'1.5px solid',borderColor:filter===k?'#0f172a':'var(--border)',background:filter===k?'#e2e8f0':'#fff',color:filter===k?'#0f172a':'var(--muted)',fontSize:11,fontWeight:600}}>{l}</button>)}
          <button className="btn btn-ghost" style={{fontSize:11,marginLeft:'auto'}} onClick={()=>{
            const esc=(v)=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
            const head=['Empresa','Tipo','CNPJ','Telefone','Usuário','Papel','E-mail'];
            const linhas=[];
            orgs.forEach(o=>{(o.memberships||[]).forEach(m=>{const inf=userInfo[m.id]||{};linhas.push([o.name,o.type,o.cnpj,o.phone,m.full_name,m.role,inf.email].map(esc).join(';'));});if(!(o.memberships||[]).length)linhas.push([o.name,o.type,o.cnpj,o.phone,'','',''].map(esc).join(';'));});
            const csv='\\uFEFF'+[head.map(esc).join(';'),...linhas].join('\\r\\n');
            const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='empresas-usuarios.csv';a.click();URL.revokeObjectURL(url);
          }}>📊 Exportar tudo (CSV)</button>
        </div>
        {shownOrgs.map(o=><DevOrgCard key={o.id} o={o} busy={busy} myMembershipId={membership.id} userInfo={userInfo} onChanged={load} onBusy={setBusy}/>)}
        {shownOrgs.length===0&&<Empty text="Nenhuma empresa encontrada."/>}
      </>:tab==='pagamentos'?<>
        {/* PAGAMENTOS */}
        <div style={{display:'flex',gap:12,marginBottom:16,flexWrap:'wrap'}}>
          <div className="card" style={{padding:'11px 16px',flex:1,minWidth:120}}><div style={{fontSize:20,fontWeight:800,color:'#10B981'}}>{fmt(totPago)}</div><div style={{fontSize:11,color:'var(--muted)'}}>✅ Recebido (pago)</div></div>
          <div className="card" style={{padding:'11px 16px',flex:1,minWidth:120}}><div style={{fontSize:20,fontWeight:800,color:'#D97706'}}>{fmt(totPend)}</div><div style={{fontSize:11,color:'var(--muted)'}}>⏳ A receber (pendente)</div></div>
          <div className="card" style={{padding:'11px 16px',flex:1,minWidth:120}}><div style={{fontSize:20,fontWeight:800,color:'#DC2626'}}>{nCancel}</div><div style={{fontSize:11,color:'var(--muted)'}}>🚫 Cancelados</div></div>
        </div>
        <div style={{background:'#FEF3C7',border:'1px solid #D97706',borderRadius:9,padding:'9px 13px',marginBottom:14,fontSize:11,color:'#92400E'}}>A cobrança automática (Stripe/Pagar.me) será integrada depois. Por ora, marque o status manualmente — a estrutura já está pronta para o gateway atualizar sozinho no futuro.</div>
        <div style={{display:'flex',gap:4,marginBottom:14,flexWrap:'wrap'}}>
          {[['todos','Todos'],['pago','Pagos'],['pendente','Pendentes'],['cancelado','Cancelados']].map(([k,l])=>
            <button key={k} onClick={()=>setPayFilter(k)} style={{padding:'4px 10px',borderRadius:6,border:'1.5px solid',borderColor:payFilter===k?'#0f172a':'var(--border)',background:payFilter===k?'#e2e8f0':'#fff',color:payFilter===k?'#0f172a':'var(--muted)',fontSize:11,fontWeight:600}}>{l}</button>)}
        </div>
        <div style={{display:'flex',gap:4,marginBottom:14,flexWrap:'wrap',alignItems:'center'}}>
          <span style={{fontSize:11,color:'var(--muted)',fontWeight:600,marginRight:4}}>Pagos em:</span>
          {[['todos','Qualquer data'],['semana','Última semana'],['mes','Último mês'],['trimestre','Último trimestre']].map(([k,l])=>
            <button key={k} onClick={()=>setPayPeriod(k)} style={{padding:'4px 10px',borderRadius:6,border:'1.5px solid',borderColor:payPeriod===k?'#2E6CA8':'var(--border)',background:payPeriod===k?'#EAF2FB':'#fff',color:payPeriod===k?'#2E6CA8':'var(--muted)',fontSize:11,fontWeight:600}}>{l}</button>)}
        </div>
        {shownSubs.map(s=>{const st=s.payment_status||'pendente';return <div key={s.fabricante_id} className="card" style={{padding:14,marginBottom:10,borderLeft:`4px solid ${PAYCOL[st]}`}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:8}}>
            <div><div style={{fontWeight:700,fontSize:14,color:'#1E293B'}}>🏭 {s.fabricante?.name||'—'}</div>
              <div style={{fontSize:11,color:'var(--muted)'}}>{s.fabricante?.cnpj||'sem CNPJ'} · {s.plans?.name||'—'} · {fmt(s.plans?.price_cents)}/mês</div>
              <div style={{fontSize:11,marginTop:4}}><span style={{color:PAYCOL[st],fontWeight:700}}>● {PAYLAB[st]}</span>
                {s.last_payment_at&&st==='pago'&&<span style={{color:'var(--muted)'}}> · último pgto {new Date(s.last_payment_at).toLocaleDateString('pt-BR')}</span>}
                {s.canceled_at&&st==='cancelado'&&<span style={{color:'var(--muted)'}}> · cancelado em {new Date(s.canceled_at).toLocaleDateString('pt-BR')}</span>}</div></div>
          </div>
          <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap'}}>
            <button className="btn btn-success" style={{fontSize:11,padding:'5px 10px'}} disabled={busy||st==='pago'} onClick={()=>setPay(s.fabricante_id,'pago')}>Marcar pago</button>
            <button className="btn btn-ghost" style={{fontSize:11,padding:'5px 10px'}} disabled={busy||st==='pendente'} onClick={()=>setPay(s.fabricante_id,'pendente')}>Marcar pendente</button>
            <button className="btn btn-danger" style={{fontSize:11,padding:'5px 10px'}} disabled={busy||st==='cancelado'} onClick={()=>setPay(s.fabricante_id,'cancelado')}>Marcar cancelado</button>
          </div>
        </div>;})}
        {shownSubs.length===0&&<Empty text="Nenhuma assinatura nesta categoria."/>}
      </>:tab==='acessos'?<>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}}>
          <div style={{fontSize:12,color:'var(--muted)'}}>Últimos {accessLog.length} acessos registrados</div>
          <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>{
            const esc=(v)=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
            const head=['Usuário','Empresa','Data/hora'];
            const linhas=accessLog.map(a=>[a.user_name,a.org_name,new Date(a.created_at).toLocaleString('pt-BR')].map(esc).join(';'));
            const csv='\\uFEFF'+[head.map(esc).join(';'),...linhas].join('\\r\\n');
            const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='acessos.csv';a.click();URL.revokeObjectURL(url);
          }}>📊 Exportar CSV</button>
        </div>
        {accessLog.length===0?<Empty text="Nenhum acesso registrado ainda. Os acessos passam a ser registrados a partir de agora."/>:
          accessLog.map(a=><div key={a.id} className="card" style={{padding:'10px 14px',marginBottom:6,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:6}}>
            <div><div style={{fontSize:13,fontWeight:600,color:'#1E293B'}}>👤 {a.user_name||'—'}</div><div style={{fontSize:11,color:'var(--muted)'}}>{a.org_name||'—'}</div></div>
            <div style={{fontSize:11,color:'var(--muted)'}}>{new Date(a.created_at).toLocaleString('pt-BR')}</div>
          </div>)}
      </>:null}
    </main>
  </div>;
}

// ============================ APP ROOT ======================================
function Onboarding(){
  const {membership,isFabricante,refresh}=useAuth();
  const [step,setStep]=useState(0);
  const [show,setShow]=useState(()=>membership&&!membership.onboarded);
  if(!show||!membership)return null;
  const passosFab=[
    {ic:'🏭',t:'Bem-vindo ao portal!',d:'Você é o fabricante. Aqui você aprova integradores, analisa registros de projetos e concede descontos.'},
    {ic:'🏷️',t:'1. Cadastre suas marcas',d:'Na aba Marcas, informe quais marcas você fabrica por sistema. Os integradores só poderão registrar projetos com essas marcas.'},
    {ic:'🤝',t:'2. Aprove integradores',d:'Na aba Integradores, aprove as solicitações de vínculo e defina o nível (Silver/Gold/Platinum) de cada um.'},
    {ic:'📁',t:'3. Analise os projetos',d:'Quando um integrador registrar um projeto, ele aparece no Pipeline para você aprovar ou reprovar, com desconto por sistema.'},
  ];
  const passosInt=[
    {ic:'🔧',t:'Bem-vindo ao portal!',d:'Você é o integrador. Aqui você se vincula a fabricantes e registra seus projetos para garantir desconto.'},
    {ic:'🤝',t:'1. Vincule-se a um fabricante',d:'Na aba Fabricantes, busque a empresa e solicite vínculo. Aguarde a aprovação dela.'},
    {ic:'📁',t:'2. Registre seus projetos',d:'Com o vínculo aprovado, clique em "+ Novo Registro" e informe os dados, sistemas e evidências (com anexos).'},
    {ic:'🎁',t:'3. Acompanhe descontos e prazos',d:'Veja seus descontos por projeto e fique de olho nos prazos de validade para não perder o benefício.'},
  ];
  const passos=isFabricante?passosFab:passosInt;
  const p=passos[step];const ultimo=step>=passos.length-1;
  const concluir=async()=>{setShow(false);try{await sb.from('memberships').update({onboarded:true}).eq('id',membership.id);refresh&&refresh();}catch(e){console.error(e);}};
  return <div className="modal-overlay" style={{zIndex:300}}>
    <div className="modal" style={{maxWidth:420}}>
      <div style={{padding:'28px 24px',textAlign:'center'}}>
        <div style={{fontSize:46,marginBottom:10}}>{p.ic}</div>
        <div style={{fontWeight:800,fontSize:18,color:'var(--navy)',marginBottom:8}}>{p.t}</div>
        <p style={{fontSize:13,color:'var(--slate)',lineHeight:1.5,marginBottom:18}}>{p.d}</p>
        <div style={{display:'flex',justifyContent:'center',gap:5,marginBottom:18}}>
          {passos.map((_,i)=><div key={i} style={{width:8,height:8,borderRadius:99,background:i===step?'var(--navy)':'var(--border)'}}/>)}
        </div>
        <div style={{display:'flex',gap:8,justifyContent:'center'}}>
          <button className="btn btn-ghost" style={{fontSize:13}} onClick={concluir}>Pular</button>
          {!ultimo?<button className="btn btn-primary" style={{fontSize:13}} onClick={()=>setStep(s=>s+1)}>Próximo →</button>
          :<button className="btn btn-primary" style={{fontSize:13}} onClick={concluir}>Começar 🚀</button>}
        </div>
      </div>
    </div>
  </div>;
}
function LgpdBanner(){
  const [show,setShow]=useState(()=>!window.__lgpd_ok);
  const [showPriv,setShowPriv]=useState(false);
  if(!show&&!showPriv)return null;
  const aceitar=()=>{window.__lgpd_ok=true;setShow(false);};
  return <>
    {show&&<div style={{position:'fixed',bottom:0,left:0,right:0,background:'#0f172a',color:'#fff',padding:'14px 18px',zIndex:200,display:'flex',gap:14,alignItems:'center',justifyContent:'center',flexWrap:'wrap',animation:'slidedown .3s ease'}}>
      <span style={{fontSize:12,maxWidth:560}}>Usamos seus dados apenas para operar o programa de canal (registro de oportunidades). Ao continuar, você concorda com nossa <a onClick={()=>setShowPriv(true)} style={{color:'#7DD3FC',cursor:'pointer',textDecoration:'underline'}}>Política de Privacidade</a>.</span>
      <button onClick={aceitar} className="btn btn-primary" style={{fontSize:12,padding:'7px 16px'}}>Concordar</button>
    </div>}
    {showPriv&&<div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setShowPriv(false)} style={{zIndex:210}}><div className="modal" style={{maxWidth:600}}>
      <div style={{padding:'16px 22px',borderBottom:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{fontWeight:800,fontSize:16,color:'#1E293B'}}>Política de Privacidade (LGPD)</div>
        <button onClick={()=>setShowPriv(false)} style={{background:'none',border:'none',fontSize:18,color:'var(--muted)'}}>✕</button></div>
      <div style={{padding:20,fontSize:13,color:'var(--slate)',lineHeight:1.6,maxHeight:'60vh',overflowY:'auto'}}>
        <p style={{marginBottom:10}}><strong>1. Quais dados coletamos.</strong> Nome, e-mail, telefone, CNPJ da empresa e dados dos projetos registrados (cliente, endereço, contatos e documentos anexados).</p>
        <p style={{marginBottom:10}}><strong>2. Para que usamos.</strong> Exclusivamente para operar o programa de canal: registrar oportunidades, gerenciar vínculos entre fabricantes e integradores, conceder descontos e emitir faturas.</p>
        <p style={{marginBottom:10}}><strong>3. Compartilhamento.</strong> Os dados de um projeto são visíveis apenas ao integrador que o criou e ao fabricante do canal correspondente. Não vendemos nem cedemos dados a terceiros.</p>
        <p style={{marginBottom:10}}><strong>4. Seus direitos.</strong> Você pode acessar, corrigir, exportar ou excluir seus dados a qualquer momento, pelo seu perfil (menu no canto superior direito).</p>
        <p style={{marginBottom:10}}><strong>5. Retenção.</strong> Os dados são mantidos enquanto a conta estiver ativa. Ao excluir a conta/empresa, os dados associados são removidos.</p>
        <p style={{marginBottom:10}}><strong>6. Segurança.</strong> O acesso é protegido por autenticação e regras de isolamento por empresa. Documentos ficam em armazenamento privado.</p>
        <p><strong>7. Contato.</strong> Para exercer seus direitos ou tirar dúvidas, fale com o administrador da sua empresa ou com o suporte da plataforma.</p>
      </div>
    </div></div>}
  </>;
}
function App(){
  const {user,org,loading,isDeveloper}=useAuth();
  const [page,setPage]=useState('login'); // login | signup
  const [hash,setHash]=useState(window.location.hash||'');
  useEffect(()=>{const h=()=>setHash(window.location.hash||'');window.addEventListener('hashchange',h);return ()=>window.removeEventListener('hashchange',h);},[]);
  if(!cfgOk) return <AuthShell title="Configuração necessária" subtitle="Quase lá">
    <div style={{background:'#FEF3C7',border:'1px solid #D97706',borderRadius:10,padding:16,fontSize:13,color:'#92400E',lineHeight:1.6}}>
      Cole suas chaves do Supabase no topo do arquivo <strong>index.html</strong>, nas linhas
      <code> window.SUPABASE_URL </code> e <code> window.SUPABASE_ANON_KEY </code>. Você encontra esses valores em <strong>Supabase → Project Settings → API</strong>.</div>
  </AuthShell>;
  if(loading) return <div className="spinner"/>;
  if(!user||!org){ return page==='signup'?<SignUp go={setPage}/>:<Login go={setPage}/>; }
  // rota do desenvolvedor: precisa do #dev na URL E da flag is_developer no banco
  const wantsDev = (hash||'').toLowerCase().includes('dev');
  if(wantsDev && isDeveloper) return <DeveloperPanel/>;
  return <>
    {org.type==='fabricante'?<FabricanteDashboard/>:<IntegradorDashboard/>}
    {isDeveloper&&<button onClick={()=>{window.location.hash='dev';}} title="Abrir painel do desenvolvedor" style={{position:'fixed',bottom:74,right:16,zIndex:150,background:'#0f172a',color:'#fff',border:'none',borderRadius:99,padding:'10px 16px',fontSize:12,fontWeight:700,boxShadow:'0 6px 20px rgba(0,0,0,.25)',cursor:'pointer',display:'flex',alignItems:'center',gap:7}}>🛠️ Painel DEV</button>}
  </>;
}

// ===== TESTE DE FUMAÇA: verifica componentes essenciais antes de montar =====
(function(){
  const essenciais={AuthProvider,App,LgpdBanner,Onboarding,Header,Login,SignUp,NewProjectModal,ProjectDetailModal,FabricanteDashboard,IntegradorDashboard,DeveloperPanel,NotificationBell,ReportsPanel,ProjectChat,GlobalSearch,DarkToggle};
  const faltando=Object.keys(essenciais).filter(k=>typeof essenciais[k]!=='function');
  if(faltando.length){
    document.getElementById('root').innerHTML='<div style=\"padding:24px;font-family:sans-serif;color:#b00\"><h3>Erro de inicialização</h3><p>Componentes ausentes: '+faltando.join(', ')+'</p><p>Recarregue a página. Se persistir, avise o suporte.</p></div>';
    throw new Error('Smoke test falhou: '+faltando.join(', '));
  }
})();
ReactDOM.createRoot(document.getElementById('root')).render(<AuthProvider><App/><Onboarding/><LgpdBanner/></AuthProvider>);
